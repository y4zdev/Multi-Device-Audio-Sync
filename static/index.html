<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z // RECEIVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(0,240,255,0.06);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050608;color:var(--text-main);font-family:var(--font-ui);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    body::after{content:" ";display:block;position:fixed;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),linear-gradient(90deg,rgba(255,0,0,0.05),rgba(0,255,0,0.02),rgba(0,0,255,0.05));background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;}
    .grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:30px 30px;}
    .hud{display:flex;flex-direction:column;height:100dvh;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));gap:8px;}
    .header-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--bg-panel);border:1px solid var(--neon-cyan);border-left:4px solid var(--neon-cyan);clip-path:var(--clip-a);box-shadow:0 0 12px rgba(0,240,255,0.15);}
    .brand h1{font-size:1.4rem;letter-spacing:3px;color:var(--neon-cyan);text-transform:uppercase;line-height:1;}
    .brand span{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:0.8rem;}
    .role-badge{padding:3px 10px;border:1px solid var(--neon-cyan);color:var(--neon-cyan);font-size:0.7rem;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .nav-link{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);text-decoration:none;padding:3px 8px;border:1px solid rgba(255,136,0,0.2);}
    .nav-link:hover{color:var(--neon-orange);border-color:var(--neon-orange);}
    .sys-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);}
    .sys-dot.live{background:var(--neon-green);box-shadow:0 0 8px var(--neon-green);}
    .sys-dot.warn{background:var(--neon-yellow);box-shadow:0 0 8px var(--neon-yellow);animation:blink 1s infinite;}
    .sys-dot.err{background:var(--neon-magenta);box-shadow:0 0 8px var(--neon-magenta);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .core{display:flex;flex:1;gap:8px;min-height:0;}
    .viz-wrap{flex:1;position:relative;background:radial-gradient(circle at center,rgba(0,240,255,0.04) 0%,transparent 60%),#000;border:1px solid rgba(0,240,255,0.2);clip-path:var(--clip-b);overflow:hidden;}
    canvas{width:100%;height:100%;display:block;}
    .viz-label{position:absolute;bottom:10px;left:14px;font-family:var(--font-mono);font-size:0.7rem;color:var(--neon-cyan);opacity:0.6;}
    .side{width:330px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .panel{background:var(--bg-panel);border:1px solid rgba(0,240,255,0.18);padding:14px;clip-path:var(--clip-a);}
    .panel-hdr{font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-cyan);text-transform:uppercase;border-bottom:1px dashed rgba(0,240,255,0.25);padding-bottom:5px;margin-bottom:10px;display:flex;justify-content:space-between;}
    .btn-row{display:flex;flex-wrap:wrap;gap:6px;}
    button{flex:1;min-width:70px;background:transparent;color:var(--text-main);border:1px solid rgba(0,240,255,0.35);padding:7px 10px;font-family:var(--font-mono);font-size:0.78rem;text-transform:uppercase;cursor:pointer;transition:all 0.18s ease;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);}
    button:hover{background:rgba(0,240,255,0.1);border-color:var(--neon-cyan);}
    button:active{transform:scale(0.97);}
    button.primary{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,240,255,0.04);}
    button.primary:hover{background:var(--neon-cyan);color:#000;}
    button.danger{border-color:var(--neon-magenta);color:var(--neon-magenta);}
    button.danger:hover{background:var(--neon-magenta);color:#000;}
    button.warn-btn{border-color:var(--neon-orange);color:var(--neon-orange);}
    button.warn-btn:hover{background:var(--neon-orange);color:#000;}
    button:disabled{opacity:0.35;cursor:not-allowed;}
    .stream-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
    .stream-card{border:1px solid rgba(0,240,255,0.2);padding:8px 10px;display:flex;align-items:center;gap:8px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:background 0.2s;}
    .stream-card:hover{background:rgba(0,240,255,0.05);}
    .stream-card input[type=checkbox]{accent-color:var(--neon-cyan);width:14px;height:14px;cursor:pointer;}
    .stream-name{flex:1;font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);}
    .stream-state{font-family:var(--font-mono);font-size:0.65rem;width:70px;text-align:right;}
    .stream-state.live{color:var(--neon-green);}
    .stream-state.err{color:var(--neon-magenta);}
    .vol-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-cyan);height:4px;cursor:pointer;}
    .vol-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);min-width:28px;text-align:right;}
    .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .dk{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;}
    .dv{font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .terminal{font-family:var(--font-mono);font-size:0.68rem;color:var(--neon-green);background:rgba(0,255,65,0.04);border:1px solid rgba(0,255,65,0.15);padding:8px;height:110px;overflow-y:auto;clip-path:var(--clip-b);}
    .lg{margin-bottom:3px;word-break:break-all;}
    .lt{color:var(--text-muted);margin-right:4px;}
    .le{color:var(--neon-magenta);}
    .lw{color:var(--neon-yellow);}
    .energy-track{height:4px;background:rgba(0,240,255,0.08);margin-top:8px;}
    .energy-fill{height:100%;width:0%;background:var(--neon-cyan);box-shadow:0 0 8px var(--neon-cyan);transition:width 0.1s linear;}
    .reconnect-overlay{position:fixed;inset:0;background:rgba(5,6,8,0.88);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    .reconnect-overlay.show{display:flex;}
    .reconnect-msg{font-family:var(--font-mono);font-size:1rem;color:var(--neon-yellow);text-align:center;}
    .spin{width:40px;height:40px;border:2px solid rgba(0,240,255,0.2);border-top:2px solid var(--neon-cyan);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    audio{display:none;}
    @media(max-width:800px){.core{flex-direction:column;}.side{width:100%;flex:0 0 auto;}.viz-wrap{min-height:35vh;}}
  </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="reconnect-overlay" id="reconnectOverlay">
  <div class="spin"></div>
  <div class="reconnect-msg">SERVER_OFFLINE</div>
  <div style="font-family:var(--font-mono);font-size:0.75rem;color:#6b7280;">Attempting reconnect...</div>
</div>

<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>Audio_Sync_LINK</h1>
      <span>// RECEIVER — Y4Z.DEV</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">▶ Sender</a>
      <span class="role-badge">RECEIVER</span>
      <span class="sys-dot" id="sysDot"></span>
      <span id="sysText" style="font-family:var(--font-mono);font-size:0.8rem;">IDLE</span>
    </div>
  </header>

  <main class="core">
    <section class="viz-wrap">
      <canvas id="viz"></canvas>
      <div class="viz-label">› <span id="vizLabel">AWAITING_SIGNAL</span></div>
    </section>
    <aside class="side">
      <div class="panel">
        <div class="panel-hdr"><span>[01] Streams</span><span id="streamCount">0 found</span></div>
        <div class="stream-list" id="streamList">
          <div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">Fetching streams...</div>
        </div>
        <div class="btn-row" style="margin-top:10px;">
          <button class="primary" id="connectBtn">▶ Connect Selected</button>
          <button id="refreshBtn">Refresh</button>
          <button class="warn-btn" id="forcePlayBtn" style="display:none;">Force Play</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span>[02] Status</span></div>
        <div class="data-grid">
          <div><div class="dk">NET.STATE</div><div class="dv" id="netState">OFFLINE</div></div>
          <div><div class="dk">ICE</div><div class="dv" id="iceState">STANDBY</div></div>
          <div><div class="dk">TRACKS</div><div class="dv" id="trackCount">0</div></div>
          <div><div class="dk">PLAYBACK</div><div class="dv" id="playbackState">HALTED</div></div>
        </div>
        <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span>[03] Active Streams</span></div>
        <div id="activeStreamsList" style="display:flex;flex-direction:column;gap:6px;"></div>
      </div>
      <div class="panel" style="padding:10px 14px;">
        <div class="panel-hdr"><span>[04] Jitter Buffer</span></div>
        <div class="vol-row">
          <input type="range" min="0" max="300" step="10" value="80" id="jitterSlider">
          <span class="vol-label" id="jitterLabel">80ms</span>
        </div>
      </div>
      <div class="terminal" id="logBox"></div>
    </aside>
  </main>
</div>

<script>
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
let analyserNodes = [];

function resizeCanvas(){
  const r=canvas.parentNode.getBoundingClientRect();
  const d=window.devicePixelRatio||1;
  canvas.width=r.width*d;canvas.height=r.height*d;
  ctx.setTransform(d,0,0,d,0,0);
}
window.addEventListener('resize',resizeCanvas);

function vizLoop(){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,240,255,0.05)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<w;x+=40){ctx.moveTo(x,0);ctx.lineTo(x,h);}
  for(let y=0;y<h;y+=40){ctx.moveTo(0,y);ctx.lineTo(w,y);}
  ctx.stroke();
  if(analyserNodes.length===0){
    ctx.fillStyle='rgba(0,240,255,0.15)';ctx.fillRect(0,h/2-1,w,2);
  } else {
    const colors=['#00f0ff','#ff003c','#fcee0a','#00ff41','#ff8800'];
    analyserNodes.forEach((an,idx)=>{
      const col=colors[idx%colors.length];
      const data=new Uint8Array(an.frequencyBinCount);
      an.getByteFrequencyData(data);
      const bars=60,step=Math.floor(data.length/bars),bw=w/bars,cy=h/2;
      for(let i=0;i<bars;i++){
        let s=0;for(let j=0;j<step;j++)s+=data[i*step+j]||0;
        const norm=Math.pow(s/step/255,1.5);
        const bh=Math.max(2,norm*(h*0.4));
        ctx.fillStyle=col;ctx.shadowBlur=8*norm;ctx.shadowColor=col;
        ctx.fillRect(i*bw+1+(idx*2),cy-bh,bw-2,bh);
        ctx.fillRect(i*bw+1+(idx*2),cy,bw-2,bh);
      }
      ctx.shadowBlur=0;
    });
  }
  requestAnimationFrame(vizLoop);
}

const logEl   = document.getElementById('logBox');
const sysDot  = document.getElementById('sysDot');
const sysText = document.getElementById('sysText');
const overlay = document.getElementById('reconnectOverlay');

function log(msg,type=''){
  const d=document.createElement('div');
  d.className='lg'+(type==='err'?' le':type==='warn'?' lw':'');
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  d.innerHTML=`<span class="lt">[${t}]</span>${msg}`;
  logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
}
function setSys(text,level='idle'){
  sysText.textContent=text;
  sysDot.className='sys-dot '+(level==='live'?'live':level==='warn'?'warn':level==='err'?'err':'');
}
function makePC(){
  return new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}],iceTransportPolicy:'all'});
}
async function sendOffer(endpoint,body){
  const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(12000)});
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Single shared AudioContext (critical for iOS / mobile) ────────────────────
let sharedACtx=null;
function getACtx(){
  if(!sharedACtx||sharedACtx.state==='closed')
    sharedACtx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'playback',sampleRate:48000});
  return sharedACtx;
}
function resumeACtx(){const c=getACtx();if(c.state==='suspended')c.resume();return c;}

// Resume on first touch/click (mandatory on iOS to avoid silent audio)
document.addEventListener('touchstart',()=>resumeACtx(),{once:true,passive:true});
document.addEventListener('click',()=>resumeACtx(),{once:true});

// ── Jitter buffer ─────────────────────────────────────────────────────────────
let jitterMs=80;
const jitterSlider=document.getElementById('jitterSlider');
const jitterLabel =document.getElementById('jitterLabel');
jitterSlider.addEventListener('input',e=>{
  jitterMs=parseInt(e.target.value);
  jitterLabel.textContent=jitterMs+'ms';
  Object.values(activeStreams).forEach(s=>{if(s.delay)s.delay.delayTime.value=jitterMs/1000;});
  log('Jitter buffer: '+jitterMs+'ms');
});

function connectStreamToOutput(stream,audioCtx){
  const src=audioCtx.createMediaStreamSource(stream);
  const analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
  const gain=audioCtx.createGain();gain.gain.value=1.0;
  // Delay node = jitter buffer: smooths bursty WebRTC packet delivery
  const delay=audioCtx.createDelay(1.0);
  delay.delayTime.value=jitterMs/1000;
  src.connect(analyser);
  src.connect(delay);
  delay.connect(gain);
  gain.connect(audioCtx.destination);
  return{src,analyser,delay,gain};
}

// ── State ─────────────────────────────────────────────────────────────────────
let pc=null;
let activeStreams={};
let selectedStreams=new Set();
let backoff=2000;
let autoReconnectFn=null;
let serverWasDown=false;

async function fetchStreams(){
  try{
    const r=await fetch('/streams',{signal:AbortSignal.timeout(3000)});
    return(await r.json()).streams||[];
  }catch{return[];}
}

async function renderStreamList(){
  const streams=await fetchStreams();
  const listEl=document.getElementById('streamList');
  document.getElementById('streamCount').textContent=streams.length+' found';
  if(streams.length===0){
    listEl.innerHTML='<div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">No streams available.</div>';
    return;
  }
  listEl.innerHTML='';
  streams.forEach(name=>{
    const card=document.createElement('div');card.className='stream-card';
    const isActive=!!activeStreams[name];
    card.innerHTML=`<input type="checkbox" id="chk_${name}" ${selectedStreams.has(name)||isActive?'checked':''}><span class="stream-name">${name}</span><span class="stream-state ${isActive?'live':''}">  ${isActive?'● LIVE':'○ IDLE'}</span>`;
    card.querySelector('input').addEventListener('change',e=>{
      if(e.target.checked)selectedStreams.add(name);
      else selectedStreams.delete(name);
    });
    if(selectedStreams.has(name)||isActive)selectedStreams.add(name);
    listEl.appendChild(card);
  });
}

function cleanupConnection(){
  analyserNodes=[];
  const el=document.getElementById('activeStreamsList');
  if(el)el.innerHTML='';
  Object.values(activeStreams).forEach(s=>{
    try{s.src.disconnect();s.delay.disconnect();s.gain.disconnect();}catch{}
  });
  activeStreams={};
  document.getElementById('trackCount').textContent='0';
}

async function connect(){
  if(selectedStreams.size===0){
    const s=await fetchStreams();s.forEach(n=>selectedStreams.add(n));
  }
  if(selectedStreams.size===0){log('No streams to connect to.','warn');return;}

  setSys('CONNECTING','warn');
  document.getElementById('netState').textContent='INIT';

  try{
    if(pc){try{pc.close();}catch{}pc=null;}
    cleanupConnection();

    const audioCtx=resumeACtx();
    pc=makePC();

    pc.oniceconnectionstatechange=()=>{
      document.getElementById('iceState').textContent=pc.iceConnectionState.toUpperCase();
      log('ICE: '+pc.iceConnectionState);
    };

    pc.onconnectionstatechange=()=>{
      const s=pc.connectionState;
      document.getElementById('netState').textContent=s.toUpperCase();
      if(s==='connected'){setSys('ONLINE','live');backoff=2000;log('Connected: '+[...selectedStreams].join(', '));}
      if(s==='failed'||s==='disconnected'){
        setSys('LINK_FAIL','err');
        log('Link lost. Reconnecting in '+(backoff/1000)+'s...','err');
        setTimeout(connect,backoff);backoff=Math.min(backoff*2,30000);
      }
    };

    let trackIdx=0;
    const activeEl=document.getElementById('activeStreamsList');

    pc.ontrack=(event)=>{
      const stream=event.streams[0];
      const names=[...selectedStreams];
      const name=names[trackIdx]||'stream_'+trackIdx;
      trackIdx++;
      document.getElementById('trackCount').textContent=String(trackIdx);

      // Route through AudioContext with jitter delay — no <audio> element needed
      const{src,analyser,delay,gain}=connectStreamToOutput(stream,audioCtx);
      analyserNodes.push(analyser);
      activeStreams[name]={src,analyser,delay,gain,stream};

      document.getElementById('playbackState').textContent='ACTIVE';
      document.getElementById('vizLabel').textContent='RX // '+Object.keys(activeStreams).join(' + ');
      log('Track live: '+name);

      // Per-stream volume control card
      const wrapper=document.createElement('div');
      wrapper.style.cssText='display:flex;flex-direction:column;gap:4px;width:100%;';
      const card=document.createElement('div');card.className='stream-card';
      card.innerHTML=`<span class="stream-name">${name}</span><span class="stream-state live">● LIVE</span>`;
      const volRow=document.createElement('div');volRow.className='vol-row';
      volRow.innerHTML=`<input type="range" min="0" max="2" step="0.01" value="1"><span class="vol-label">100%</span>`;
      volRow.querySelector('input').addEventListener('input',e=>{
        gain.gain.value=parseFloat(e.target.value);
        volRow.querySelector('.vol-label').textContent=Math.round(e.target.value*100)+'%';
      });
      wrapper.appendChild(card);wrapper.appendChild(volRow);
      activeEl.appendChild(wrapper);

      // Energy meter
      function energyTick(){
        if(!activeStreams[name])return;
        const data=new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const avg=data.reduce((a,b)=>a+b,0)/data.length;
        const ef=document.getElementById('energyFill');
        if(ef)ef.style.width=Math.min(100,avg/255*100*2)+'%';
        requestAnimationFrame(energyTick);
      }
      energyTick();
    };

    [...selectedStreams].forEach(()=>pc.addTransceiver('audio',{direction:'recvonly'}));

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    log('Sending offer for: '+[...selectedStreams].join(', '));
    const answer=await sendOffer('/receiver/offer',{streams:[...selectedStreams],sdp:pc.localDescription});
    await pc.setRemoteDescription(answer);
    log('Remote SDP accepted. Waiting for tracks...');

  }catch(err){
    setSys('FAIL','err');
    log('Connection failed: '+err.message,'err');
    setTimeout(connect,backoff);backoff=Math.min(backoff*2,30000);
  }
}

autoReconnectFn=()=>{backoff=2000;connect();};

// Server health check
async function checkServer(){
  try{
    await fetch('/streams',{signal:AbortSignal.timeout(3000)});
    if(serverWasDown){serverWasDown=false;overlay.classList.remove('show');log('Server back online. Reconnecting...','warn');if(autoReconnectFn)autoReconnectFn();}
  }catch{
    if(!serverWasDown){serverWasDown=true;overlay.classList.add('show');log('Server unreachable.','err');}
  }
}
setInterval(checkServer,5000);

document.getElementById('connectBtn').addEventListener('click',()=>{backoff=2000;connect();});
document.getElementById('refreshBtn').addEventListener('click',renderStreamList);
document.getElementById('forcePlayBtn').addEventListener('click',()=>{
  resumeACtx();
  document.getElementById('forcePlayBtn').style.display='none';
  log('Force play triggered.');
});

renderStreamList();
setInterval(renderStreamList,5000);
