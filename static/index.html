<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z // RECEIVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(0,240,255,0.06);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050608;color:var(--text-main);font-family:var(--font-ui);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    body::after{content:" ";display:block;position:fixed;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),linear-gradient(90deg,rgba(255,0,0,0.05),rgba(0,255,0,0.02),rgba(0,0,255,0.05));background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;}
    .grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:30px 30px;}
    .hud{display:flex;flex-direction:column;height:100dvh;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));gap:8px;}
    .header-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--bg-panel);border:1px solid var(--neon-cyan);border-left:4px solid var(--neon-cyan);clip-path:var(--clip-a);box-shadow:0 0 12px rgba(0,240,255,0.15);}
    .brand h1{font-size:1.4rem;letter-spacing:3px;color:var(--neon-cyan);text-transform:uppercase;line-height:1;}
    .brand span{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:0.8rem;}
    .role-badge{padding:3px 10px;border:1px solid var(--neon-cyan);color:var(--neon-cyan);font-size:0.7rem;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .nav-link{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);text-decoration:none;padding:3px 8px;border:1px solid rgba(255,136,0,0.2);}
    .nav-link:hover{color:var(--neon-orange);border-color:var(--neon-orange);}
    .sys-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);}
    .sys-dot.live{background:var(--neon-green);box-shadow:0 0 8px var(--neon-green);}
    .sys-dot.warn{background:var(--neon-yellow);box-shadow:0 0 8px var(--neon-yellow);animation:blink 1s infinite;}
    .sys-dot.err{background:var(--neon-magenta);box-shadow:0 0 8px var(--neon-magenta);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .core{display:flex;flex:1;gap:8px;min-height:0;}
    .viz-wrap{flex:1;position:relative;background:radial-gradient(circle at center,rgba(0,240,255,0.04) 0%,transparent 60%),#000;border:1px solid rgba(0,240,255,0.2);clip-path:var(--clip-b);overflow:hidden;}
    canvas{width:100%;height:100%;display:block;}
    .viz-label{position:absolute;bottom:10px;left:14px;font-family:var(--font-mono);font-size:0.7rem;color:var(--neon-cyan);opacity:0.6;}
    .side{width:330px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .panel{background:var(--bg-panel);border:1px solid rgba(0,240,255,0.18);padding:14px;clip-path:var(--clip-a);}
    .panel-hdr{font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-cyan);text-transform:uppercase;border-bottom:1px dashed rgba(0,240,255,0.25);padding-bottom:5px;margin-bottom:10px;display:flex;justify-content:space-between;}
    .btn-row{display:flex;flex-wrap:wrap;gap:6px;}
    button{flex:1;min-width:70px;background:transparent;color:var(--text-main);border:1px solid rgba(0,240,255,0.35);padding:7px 10px;font-family:var(--font-mono);font-size:0.78rem;text-transform:uppercase;cursor:pointer;transition:all 0.18s ease;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);}
    button:hover{background:rgba(0,240,255,0.1);border-color:var(--neon-cyan);}
    button:active{transform:scale(0.97);}
    button.primary{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,240,255,0.04);}
    button.primary:hover{background:var(--neon-cyan);color:#000;}
    button.danger{border-color:var(--neon-magenta);color:var(--neon-magenta);}
    button.danger:hover{background:var(--neon-magenta);color:#000;}
    button.warn-btn{border-color:var(--neon-orange);color:var(--neon-orange);}
    button.warn-btn:hover{background:var(--neon-orange);color:#000;}
    button:disabled{opacity:0.35;cursor:not-allowed;}
    .stream-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
    .stream-card{border:1px solid rgba(0,240,255,0.2);padding:8px 10px;display:flex;flex-direction:column;gap:6px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:background 0.2s;}
    .stream-card:hover{background:rgba(0,240,255,0.05);}
    .stream-card-row{display:flex;align-items:center;gap:8px;}
    .stream-name{font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-cyan);flex:1;}
    .scard-badge{font-family:var(--font-mono);font-size:0.65rem;padding:2px 6px;border:1px solid;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);}
    .scard-badge.live{color:var(--neon-green);border-color:var(--neon-green);}
    .scard-badge.wait{color:var(--neon-yellow);border-color:var(--neon-yellow);}
    .scard-badge.manager{color:var(--neon-orange);border-color:var(--neon-orange);}
    .vol-row{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-cyan);cursor:pointer;}
    .vol-val{min-width:36px;text-align:right;color:var(--neon-yellow);}
    .vu-bar{height:4px;background:rgba(0,240,255,0.08);overflow:hidden;}
    .vu-fill{height:100%;width:0%;background:var(--neon-cyan);box-shadow:0 0 6px var(--neon-cyan);transition:width 0.08s linear;}
    .jitter-row{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);}
    .jitter-row input[type=range]{flex:1;accent-color:var(--neon-magenta);cursor:pointer;}
    .field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
    .field label{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;}
    .field input{background:rgba(0,0,0,0.5);border:1px solid rgba(0,240,255,0.3);color:var(--text-main);padding:6px 8px;font-family:var(--font-mono);font-size:0.8rem;width:100%;outline:none;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .field input:focus{border-color:var(--neon-cyan);}
    .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .dk{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;}
    .dv{font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .terminal{font-family:var(--font-mono);font-size:0.68rem;color:var(--neon-green);background:rgba(0,255,65,0.04);border:1px solid rgba(0,255,65,0.15);padding:8px;height:110px;overflow-y:auto;clip-path:var(--clip-b);}
    .lg{margin-bottom:3px;word-break:break-all;}
    .lt{color:var(--text-muted);margin-right:4px;}
    .le{color:var(--neon-magenta);}
    .lw{color:var(--neon-yellow);}
    @media(max-width:800px){.core{flex-direction:column;}.side{width:100%;flex:0 0 auto;}.viz-wrap{min-height:30vh;}}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>Audio_Sync_LINK</h1>
      <span>// RECEIVER — Y4Z.DEV</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">▶ Sender</a>
      <a class="nav-link" href="/manager">▶ Manager</a>
      <span class="role-badge">SPEAKER</span>
      <span class="sys-dot" id="sysDot"></span>
      <span id="sysText" style="font-family:var(--font-mono);font-size:0.8rem;">IDLE</span>
    </div>
  </header>
  <main class="core">
    <section class="viz-wrap">
      <canvas id="viz"></canvas>
      <div class="viz-label">› <span id="vizLabel">RX_STANDBY</span></div>
    </section>
    <aside class="side">

      <!-- [01] Device identity -->
      <div class="panel">
        <div class="panel-hdr"><span>[01] Speaker Identity</span><span id="devRegState" style="color:var(--text-muted);">UNREGISTERED</span></div>
        <div class="field">
          <label>Speaker Name</label>
          <input type="text" id="deviceName" placeholder="e.g. Living Room, Headphones" maxlength="40">
        </div>
        <div class="data-grid" style="margin-bottom:8px;">
          <div><div class="dk">DEVICE ID</div><div class="dv" id="devIdDisplay" style="font-size:0.65rem;word-break:break-all;">—</div></div>
          <div><div class="dk">STATUS</div><div class="dv" id="devStatusDisplay">OFFLINE</div></div>
        </div>
        <div class="btn-row">
          <button class="primary" id="registerDevBtn">⬆ Register Speaker</button>
        </div>
      </div>

      <!-- [02] Available Streams -->
      <div class="panel">
        <div class="panel-hdr"><span>[02] Available Streams</span><span id="streamCount">0</span></div>
        <div id="streamList" class="stream-list">
          <div id="noStreams" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">Waiting for streams…</div>
        </div>
      </div>

      <!-- [03] Status -->
      <div class="panel">
        <div class="panel-hdr"><span>[03] Status</span></div>
        <div class="data-grid">
          <div><div class="dk">CONNECTED</div><div class="dv" id="connCount">0</div></div>
          <div><div class="dk">WS</div><div class="dv" id="wsState">DISCONNECTED</div></div>
          <div><div class="dk">HEARTBEAT</div><div class="dv" id="hbState">—</div></div>
          <div><div class="dk">DEVICE</div><div class="dv" id="devNameDisplay">—</div></div>
        </div>
      </div>

      <div class="terminal" id="logBox"></div>
    </aside>
  </main>
</div>
<script>
// ── Device identity ───────────────────────────────────────────────────────
let deviceId   = sessionStorage.getItem('receiver_device_id') || '';
let deviceName = sessionStorage.getItem('receiver_device_name') || '';
let registered = false;
let ws         = null;
let hbInterval = null;

if (deviceId)   document.getElementById('devIdDisplay').textContent = deviceId.slice(0,18)+'...';
if (deviceName) { document.getElementById('deviceName').value = deviceName; document.getElementById('devNameDisplay').textContent = deviceName; }

async function registerDevice() {
  const name = document.getElementById('deviceName').value.trim();
  if (!name) { log('Enter a speaker name first.', 'warn'); return; }
  try {
    const body = { name, role: 'speaker' };
    if (deviceId) body.id = deviceId;
    const res = await fetch('/device/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(5000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const dev = await res.json();
    deviceId   = dev.id;
    deviceName = dev.name;
    registered = true;
    sessionStorage.setItem('receiver_device_id',   deviceId);
    sessionStorage.setItem('receiver_device_name', deviceName);
    document.getElementById('devIdDisplay').textContent     = deviceId.slice(0,18)+'...';
    document.getElementById('devStatusDisplay').textContent = 'ONLINE';
    document.getElementById('devNameDisplay').textContent   = deviceName;
    document.getElementById('devRegState').textContent      = 'REGISTERED';
    document.getElementById('devRegState').style.color      = 'var(--neon-green)';
    log('Speaker registered: ' + deviceName + ' [' + deviceId.slice(0,8) + ']');
    connectWs();
    startHeartbeat();
  } catch (err) {
    log('Registration failed: ' + err.message, 'err');
  }
}

document.getElementById('registerDevBtn').addEventListener('click', registerDevice);

// ── WebSocket control bus ─────────────────────────────────────────────────
function connectWs() {
  if (ws && ws.readyState < 2) return;
  ws = new WebSocket('wss://' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('wsState').textContent = 'CONNECTED';
    log('WS connected. Live stream updates active.');
    refreshStreams();
  };
  ws.onclose = () => {
    document.getElementById('wsState').textContent = 'DISCONNECTED';
    setTimeout(connectWs, 4000);
  };
  ws.onerror = () => { document.getElementById('wsState').textContent = 'ERROR'; };
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleWsEvent(msg);
    } catch {}
  };
}

function handleWsEvent(msg) {
  switch (msg.type) {
    case 'snapshot':
      // Populate stream list from full snapshot on WS connect
      if (Array.isArray(msg.streams)) {
        msg.streams.forEach(n => addStreamCard(n, false));
        document.getElementById('streamCount').textContent = document.getElementById('streamList').querySelectorAll('.stream-card').length;
        const ph = document.getElementById('noStreams');
        if (msg.streams.length > 0 && ph) ph.remove();
      }
      break;
    case 'stream_added':
      log('Stream available: ' + msg.name);
      addStreamCard(msg.name, false);
      break;
    case 'stream_removed':
      log('Stream gone: ' + msg.name, 'warn');
      removeStreamCard(msg.name);
      break;
    case 'set_volume':
      if (msg.device_id === deviceId) {
        applyRemoteVolume(msg.stream, msg.volume);
      }
      break;
    case 'route_changed':
      if (msg.speaker_id === deviceId) {
        if (msg.connected) {
          log('[Manager] Assigned stream: ' + msg.source, 'warn');
          addStreamCard(msg.source, true);
        } else {
          log('[Manager] Removed stream: ' + msg.source, 'warn');
          removeStreamCard(msg.source);
        }
      }
      break;
  }
}

function applyRemoteVolume(streamName, volume) {
  const gain = gainNodes[streamName];
  if (gain) {
    gain.gain.setTargetAtTime(volume, gain.context.currentTime, 0.02);
    const slider = document.getElementById('vol_' + streamName);
    const valEl  = document.getElementById('volval_' + streamName);
    if (slider) slider.value = volume * 100;
    if (valEl)  valEl.textContent = Math.round(volume * 100) + '%';
    log('[Manager] Volume set: ' + streamName + ' -> ' + Math.round(volume * 100) + '%', 'warn');
  }
}

function startHeartbeat() {
  if (hbInterval) clearInterval(hbInterval);
  hbInterval = setInterval(() => {
    if (ws && ws.readyState === 1 && deviceId) {
      ws.send(JSON.stringify({ type: 'heartbeat', device_id: deviceId }));
      const t = new Date().toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('hbState').textContent = t;
    }
  }, 10000);
}

// ── Stream state ─────────────────────────────────────────────────────────────
const peerConns   = {};
const gainNodes   = {};
const analyserMap = {};
const jitterMs    = {};

async function refreshStreams() {
  try {
    const res = await fetch('/streams', { signal: AbortSignal.timeout(5000) });
    if (!res.ok) return;
    const data = await res.json();
    // /streams returns { streams: [...] }
    const names = Array.isArray(data) ? data : (data.streams || []);
    names.forEach(n => addStreamCard(n, false));
    document.getElementById('streamCount').textContent = document.getElementById('streamList').querySelectorAll('.stream-card').length;
    const ph = document.getElementById('noStreams');
    if (names.length > 0 && ph) ph.remove();
  } catch {}
}

function addStreamCard(name, managerAssigned) {
  const list = document.getElementById('streamList');
  if (document.getElementById('scard_' + name)) return;
  const ph = document.getElementById('noStreams'); if (ph) ph.remove();

  const card = document.createElement('div');
  card.id = 'scard_' + name;
  card.className = 'stream-card';

  const badge = managerAssigned
    ? '<span class="scard-badge manager">ASSIGNED</span>'
    : '<span class="scard-badge wait" id="badge_' + name + '">AVAILABLE</span>';

  card.innerHTML = `
    <div class="stream-card-row">
      <span class="stream-name">○ ${name}</span>
      ${badge}
      <button style="flex:0;min-width:56px;padding:3px 6px;font-size:0.68rem;" onclick="toggleSubscribe('${name}')"
        id="subbtn_${name}">▶ SUB</button>
      <button class="danger" style="flex:0;min-width:46px;padding:3px 6px;font-size:0.68rem;" onclick="disconnectStream('${name}')">■</button>
    </div>
    <div class="vol-row">
      <span>VOL</span>
      <input type="range" min="0" max="100" value="100" id="vol_${name}"
        oninput="setGain('${name}',this.value/100);document.getElementById('volval_${name}').textContent=this.value+'%'">
      <span class="vol-val" id="volval_${name}">100%</span>
    </div>
    <div class="jitter-row">
      <span>JITTER</span>
      <input type="range" min="0" max="200" value="40" id="jitter_${name}"
        oninput="setJitter('${name}',+this.value);document.getElementById('jitterval_${name}').textContent=this.value+'ms'">
      <span style="min-width:40px;text-align:right;color:var(--neon-magenta);" id="jitterval_${name}">40ms</span>
    </div>
    <div class="vu-bar"><div class="vu-fill" id="vu_${name}"></div></div>
  `;
  list.appendChild(card);
  jitterMs[name] = 40;
  document.getElementById('streamCount').textContent = list.querySelectorAll('.stream-card').length;

  if (managerAssigned) toggleSubscribe(name);
}

function removeStreamCard(name) {
  disconnectStream(name);
  const card = document.getElementById('scard_' + name); if (card) card.remove();
  const list = document.getElementById('streamList');
  if (!list.querySelector('.stream-card')) {
    const ph = document.createElement('div');
    ph.id = 'noStreams';
    ph.style.cssText = 'font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);';
    ph.textContent = 'Waiting for streams…';
    list.appendChild(ph);
  }
  document.getElementById('streamCount').textContent = list.querySelectorAll('.stream-card').length;
}

window.setGain = function(name, val) {
  const g = gainNodes[name]; if (g) g.gain.setTargetAtTime(val, g.context.currentTime, 0.02);
};
window.setJitter = function(name, ms) { jitterMs[name] = ms; };

window.disconnectStream = function(name) {
  const pc = peerConns[name]; if (pc) { pc.close(); delete peerConns[name]; }
  delete gainNodes[name]; delete analyserMap[name]; delete jitterMs[name];
  const badge = document.getElementById('badge_' + name);
  if (badge) { badge.className = 'scard-badge wait'; badge.textContent = 'AVAILABLE'; }
  const btn = document.getElementById('subbtn_' + name);
  if (btn) btn.textContent = '▶ SUB';
  updateConnCount();
  log('Disconnected: ' + name, 'warn');
};

window.toggleSubscribe = async function(name) {
  if (peerConns[name]) { window.disconnectStream(name); return; }
  const btn = document.getElementById('subbtn_' + name);
  if (btn) btn.textContent = 'CONN...';
  try {
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    peerConns[name] = pc;

    pc.addTransceiver('audio', { direction: 'recvonly' });
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // FIX: server ReceiverOfferRequest expects { streams: Vec<String>, sdp }
    // Previously sent { name, jitter_buffer_ms, sdp } which caused HTTP 422
    const res = await fetch('/receiver/offer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        streams: [name],
        sdp: pc.localDescription,
      }),
      signal: AbortSignal.timeout(12000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const answer = await res.json();
    await pc.setRemoteDescription(answer);

    const actx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    if (actx.state === 'suspended') await actx.resume();

    pc.ontrack = (ev) => {
      const src  = actx.createMediaStreamSource(new MediaStream([ev.track]));
      const gain = actx.createGain();
      gain.gain.value = parseFloat(document.getElementById('vol_' + name)?.value || 100) / 100;
      gain.context = actx;
      const an   = actx.createAnalyser(); an.fftSize = 256;
      src.connect(gain); gain.connect(an); an.connect(actx.destination);
      gainNodes[name]   = gain;
      analyserMap[name] = an;

      const badge = document.getElementById('badge_' + name);
      if (badge) { badge.className = 'scard-badge live'; badge.textContent = 'LIVE'; }
      const btn2 = document.getElementById('subbtn_' + name);
      if (btn2) btn2.textContent = '■ DROP';

      setSys('RECEIVING','live');
      document.getElementById('vizLabel').textContent = 'RX // ' + name;
      updateConnCount();
      log('Subscribed: ' + name);

      function vuTick() {
        if (!analyserMap[name]) return;
        const d = new Uint8Array(an.frequencyBinCount);
        an.getByteFrequencyData(d);
        const avg = d.reduce((a,b)=>a+b,0)/d.length;
        const vu  = document.getElementById('vu_' + name);
        if (vu) vu.style.width = Math.min(100, avg/255*100*2.5) + '%';
        requestAnimationFrame(vuTick);
      }
      vuTick();
    };

    pc.onconnectionstatechange = () => {
      log('[' + name + '] ' + pc.connectionState);
      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
        disconnectStream(name);
      }
    };
  } catch (err) {
    log('Subscribe failed [' + name + ']: ' + err.message, 'err');
    if (peerConns[name]) { peerConns[name].close(); delete peerConns[name]; }
    const btn2 = document.getElementById('subbtn_' + name);
    if (btn2) btn2.textContent = '▶ SUB';
  }
};

function updateConnCount() {
  const n = Object.keys(peerConns).length;
  document.getElementById('connCount').textContent = n;
  if (n === 0) setSys('IDLE', 'idle');
}

// ── Canvas visualizer ───────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const r = canvas.parentNode.getBoundingClientRect();
  const d = window.devicePixelRatio || 1;
  canvas.width = r.width * d; canvas.height = r.height * d;
  ctx.setTransform(d, 0, 0, d, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

function vizLoop() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  const analysers = Object.values(analyserMap);
  if (analysers.length === 0) {
    ctx.fillStyle = 'rgba(0,240,255,0.15)'; ctx.fillRect(0, h/2-1, w, 2);
  } else {
    analysers.forEach((an) => {
      const data = new Uint8Array(an.frequencyBinCount);
      an.getByteFrequencyData(data);
      const bars = 60, step = Math.floor(data.length / bars), bw = w / bars, cy = h / 2;
      for (let i = 0; i < bars; i++) {
        let s = 0; for (let j = 0; j < step; j++) s += data[i*step+j] || 0;
        const norm = Math.pow(s/step/255, 1.5);
        const bh   = Math.max(2, norm * (h * 0.4));
        ctx.fillStyle = '#00f0ff'; ctx.shadowBlur = 8*norm; ctx.shadowColor = '#00f0ff';
        ctx.fillRect(i*bw+1, cy-bh, bw-2, bh);
        ctx.fillRect(i*bw+1, cy,    bw-2, bh);
      }
      ctx.shadowBlur = 0;
    });
  }
  requestAnimationFrame(vizLoop);
}

// ── Logging ─────────────────────────────────────────────────────────────────
const logEl   = document.getElementById('logBox');
const sysDot  = document.getElementById('sysDot');
const sysText = document.getElementById('sysText');

function log(msg, type='') {
  const d = document.createElement('div');
  d.className = 'lg' + (type==='err'?' le':type==='warn'?' lw':'');
  const t = new Date().toLocaleTimeString('en-US', { hour12: false });
  d.innerHTML = `<span class="lt">[${t}]</span>${msg}`;
  logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
}
function setSys(text, level='idle') {
  sysText.textContent = text;
  sysDot.className = 'sys-dot ' + (level==='live'?'live':level==='warn'?'warn':level==='err'?'err':'');
}

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas();
requestAnimationFrame(vizLoop);
refreshStreams();
log('RECEIVER READY. Register as speaker to enable remote control.');

if (deviceId && deviceName) {
  registerDevice();
}
</script>
