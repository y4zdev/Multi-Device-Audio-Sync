<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AirLink // SENDER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-hover: #2563eb;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .bg-static {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.04), transparent 50%),
                  radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.03), transparent 50%);
    }

    .hud {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      gap: 24px;
      position: relative;
      z-index: 10;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; color: #fff; }
    .brand span { font-size: 0.8rem; color: var(--accent-primary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

    .header-right { display: flex; align-items: center; gap: 24px; font-size: 0.85rem; font-weight: 500; }
    .nav-link { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--text-main); }

    .sys-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      padding: 6px 14px;
      border: 1px solid var(--border-color);
      border-radius: 20px;
    }
    .sys-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: 0.3s; }
    .sys-dot.live { background: var(--accent-success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
    .sys-dot.warn { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
    .sys-dot.err { background: var(--accent-danger); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

    .core { display: flex; flex: 1; gap: 24px; min-height: 0; }

    .viz-wrap {
      flex: 1;
      position: relative;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { width: 100%; height: 100%; display: block; position: absolute; inset: 0; opacity: 0.8; }
    
    .viz-label {
      position: absolute;
      bottom: 24px;
      left: 24px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .side {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .side::-webkit-scrollbar { width: 4px; }
    .side::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
    }
    
    .panel-hdr {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); }
    .field input, .field select {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent-primary); background: rgba(0, 0, 0, 0.5); }
    .field select option { background: #18181b; }

    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    button {
      flex: 1; border: none; border-radius: 8px; padding: 14px 20px;
      font-size: 0.9rem; font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer; transition: all 0.2s ease;
    }
    button.primary { background: var(--accent-primary); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:active { transform: scale(0.98); }
    button.danger { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    button.danger:hover { background: rgba(239, 68, 68, 0.2); }

    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 8px; }
    .dk { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .dv { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .vu-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .vu-fill { height: 100%; width: 0%; background: var(--accent-primary); transition: width 0.08s linear; }

    .terminal {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px; height: 140px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    .terminal::-webkit-scrollbar { width: 4px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .lg { line-height: 1.4; word-break: break-all; }
    .lt { color: rgba(255,255,255,0.2); margin-right: 8px; }
    .le { color: var(--accent-danger); }
    .lw { color: #f59e0b; }

    /* Custom Source List Styles */
    .source-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .source-list::-webkit-scrollbar { width: 4px; }
    .source-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .source-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .source-item:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); }
    .source-item.active {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.4);
    }
    .source-item.active .si-check { opacity: 1; color: var(--accent-primary); }
    .si-check { opacity: 0; transition: 0.2s; width: 16px; height: 16px; }
    .si-label { flex: 1; font-size: 0.85rem; font-weight: 500; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    @media (max-width: 900px) {
      .core { flex-direction: column; }
      .side { width: 100%; flex: 0 0 auto; }
      .viz-wrap { min-height: 35vh; }
    }
  </style>
</head>
<body>
<div class="bg-static"></div>

<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>AirLink</h1>
      <span>Sender</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">Sender</a>
      <a class="nav-link" href="/receiver">Receiver</a>
      <a class="nav-link" href="/controller">Controller</a>
      <a class="nav-link" href="/admin">Admin</a>
      <div class="user-profile" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color);" title="User Profile" onclick="window.location.href='/logout'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
    </div>
  </header>

  <main class="core">
    <section class="viz-wrap">
      <canvas id="viz"></canvas>
      <div class="viz-label"><span id="vizLabel">STANDBY</span></div>
    </section>

    <aside class="side">
      <!-- SETUP PANEL -->
      <div class="panel">
        <div class="panel-hdr"><span>01 / Configuration</span></div>
        <div class="field">
          <label>Device Name (Node ID)</label>
          <input type="text" id="deviceName" placeholder="e.g. Workstation" maxlength="40">
        </div>
        <div class="field">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
            <label>Audio Sources</label>
            <button id="btnScan" style="background:none;border:none;color:var(--accent-primary);cursor:pointer;font-size:0.75rem;padding:0;font-weight:600;">Scan Devices</button>
          </div>
          <div id="sourceList" class="source-list">
            <div class="source-item active" data-val="display">
              <svg class="si-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
              <span class="si-label">Screen Audio (Browser)</span>
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="primary" id="startStreamBtn">Connect & Stream</button>
          <button class="danger" id="stopStreamBtn" style="display:none;">Disconnect</button>
        </div>
      </div>

      <!-- SYSTEM STATUS / TELEMETRY -->
      <div class="panel">
        <div class="panel-hdr">
          <span>02 / Telemetry</span>
          <div class="sys-indicator">
            <span class="sys-dot" id="sysDot"></span>
            <span id="sysText">IDLE</span>
          </div>
        </div>
        <div class="data-grid">
          <div><div class="dk">Node ID</div><div class="dv" id="devIdDisplay">—</div></div>
          <div><div class="dk">Connection</div><div class="dv" id="wsState">Disconnected</div></div>
          <div><div class="dk">Up Speed</div><div class="dv" id="upSpeedDisplay">—</div></div>
          <div><div class="dk">Latency (RTT)</div><div class="dv" id="rtcLatencyDisplay">—</div></div>
          <div style="grid-column: span 2;"><div class="dk">Audio Output</div><div class="vu-bar"><div class="vu-fill" id="vu_meter"></div></div></div>
        </div>
      </div>

      <!-- TERMINAL -->
      <div class="terminal" id="logBox"></div>
    </aside>
  </main>
</div>

<script>
// ── State & Variables ───────────────────────────────────────────────────────
let deviceId   = sessionStorage.getItem('sender_device_id') || '';
let deviceName = sessionStorage.getItem('sender_device_name') || '';
let registered = !!deviceId;
let ws         = null;
let hbInterval = null;
let selectedSources = new Set(['display']);
let sourceStreamMap = {};
let pendingChanges = false;
const activeConnections = {};
let globalVolume = 1.0;

if (deviceName) document.getElementById('deviceName').value = deviceName;
if (deviceId) {
  document.getElementById('devIdDisplay').textContent = deviceId.slice(0, 12) + '...';
  connectWs();
}

// ── Unified Setup Logic ─────────────────────────────────────────────────────
async function establishUplink() {
  if (selectedSources.size === 0) { log('Error: No source selected.', 'err'); return; }

  const dName = document.getElementById('deviceName').value.trim();
  if (!dName) { log('Error: Device Name is required.', 'err'); return; }

  if (!registered || deviceName !== dName) {
    try {
      log('Registering Node: ' + dName + '...');
      const body = { name: dName, role: 'mic' };
      if (deviceId) body.id = deviceId;
      
      const res = await fetch('/device/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: AbortSignal.timeout(5000),
      });
      
      if (res.status === 409) {
        alert('Device name is already online. Please change the name.');
        throw new Error('Device name conflict');
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const dev = await res.json();
      
      deviceId   = dev.id;
      deviceName = dev.name;
      registered = true;
      sessionStorage.setItem('sender_device_id', deviceId);
      sessionStorage.setItem('sender_device_name', deviceName);
      
      document.getElementById('devIdDisplay').textContent = deviceId.slice(0, 12) + '...';
      log('Node Verified. ID: ' + deviceId.slice(0, 8));
      
      if (!ws || ws.readyState > 1) connectWs();
    } catch (err) {
      log('Node Registration Failed: ' + err.message, 'err');
      return;
    }
  }

  for (const srcVal of selectedSources) {
    const sName = deviceName;
    if (!sourceStreamMap[srcVal]) {
      sourceStreamMap = { [srcVal]: sName };
      await startStream(sName, srcVal);
    }
  }
}

function checkChanges() {
  const isStreaming = Object.keys(activeConnections).length > 0;
  const stopBtn = document.getElementById('stopStreamBtn');
  if (!isStreaming) {
    pendingChanges = false;
    stopBtn.textContent = 'Disconnect';
    stopBtn.classList.remove('primary');
    stopBtn.classList.add('danger');
    stopBtn.style.background = '';
    document.getElementById('deviceName').readOnly = false;
    return;
  }
  
  document.getElementById('deviceName').readOnly = true;
  
  const currentActive = new Set(Object.keys(sourceStreamMap));
  let hasChanges = false;
  if (selectedSources.size !== currentActive.size) {
    hasChanges = true;
  } else {
    for (let s of selectedSources) {
      if (!currentActive.has(s)) { hasChanges = true; break; }
    }
  }
  
  pendingChanges = hasChanges;
  if (hasChanges) {
    stopBtn.textContent = 'Apply Changes';
    stopBtn.classList.remove('danger');
    stopBtn.classList.add('primary');
    stopBtn.style.background = 'var(--accent-warning)';
  } else {
    stopBtn.textContent = 'Disconnect';
    stopBtn.classList.remove('primary');
    stopBtn.classList.add('danger');
    stopBtn.style.background = '';
  }
}

document.getElementById('sourceList').addEventListener('click', (e) => {
  const item = e.target.closest('.source-item');
  if (!item) return;
  const val = item.dataset.val;
  
  if (selectedSources.has(val)) return;
  
  selectedSources.clear();
  document.querySelectorAll('.source-item').forEach(el => el.classList.remove('active'));
  
  selectedSources.add(val);
  item.classList.add('active');
  
  checkChanges();
});

async function scanDevices(promptPerms = false) {
  try {
    if (promptPerms) {
      const s = await navigator.mediaDevices.getUserMedia({audio:true});
      s.getTracks().forEach(t=>t.stop());
    }
    const devs = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('sourceList');
    
    sel.innerHTML = `
      <div class="source-item ${selectedSources.has('display')?'active':''}" data-val="display">
        <svg class="si-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        <span class="si-label">Screen Audio (Browser)</span>
      </div>
    `;
    
    devs.filter(d=>d.kind==='audioinput').forEach(d => {
      const val = 'mic:' + d.deviceId;
      const isAct = selectedSources.has(val);
      const div = document.createElement('div');
      div.className = 'source-item ' + (isAct ? 'active' : '');
      div.dataset.val = val;
      div.innerHTML = `
        <svg class="si-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        <span class="si-label">${d.label || 'Microphone'}</span>
      `;
      sel.appendChild(div);
    });
  } catch (err) {
    log('Failed to scan devices: ' + err.message, 'err');
  }
}

scanDevices(false);
if (navigator.mediaDevices && navigator.mediaDevices.addEventListener) {
  navigator.mediaDevices.addEventListener('devicechange', () => scanDevices(false));
}

document.getElementById('btnScan').addEventListener('click', (e) => {
  e.preventDefault();
  scanDevices(true);
});

document.getElementById('startStreamBtn').addEventListener('click', establishUplink);

document.getElementById('stopStreamBtn').addEventListener('click', async () => {
  if (pendingChanges) {
    const src = Array.from(selectedSources)[0];
    const dName = document.getElementById('deviceName').value.trim() || 'Node';
    const isStreaming = Object.keys(activeConnections).length > 0;
    
    if (isStreaming) {
      await swapStreamSource(dName, src);
      sourceStreamMap = { [src]: dName };
    } else {
      await startStream(dName, src);
      sourceStreamMap = { [src]: dName };
    }
    checkChanges();
  } else {
    for (const name in activeConnections) { stopStream(name); }
    sourceStreamMap = {};
    checkChanges();
  }
});

// ── Websocket ───────────────────────────────────────────────────────────────
function connectWs() {
  if (ws && ws.readyState < 2) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  
  ws.onopen = () => { 
    document.getElementById('wsState').textContent = 'Connected'; 
    document.getElementById('wsState').style.color = 'var(--accent-success)';
    log('Server connection established.'); 
  };
  
  ws.onclose = () => { 
    document.getElementById('wsState').textContent = 'Disconnected'; 
    document.getElementById('wsState').style.color = 'var(--text-muted)';
    // Don't stop audio streams - they use separate WebSocket connections
    // Just silently reconnect the control channel
    setTimeout(connectWs, 2000); 
  };
  
  ws.onerror = () => { document.getElementById('wsState').textContent = 'Error'; };
  
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'pong') {
        const rtt = Date.now() - msg.ts;
        document.getElementById('rtcLatencyDisplay').textContent = rtt + ' ms';
      } else if (msg.type === 'set_volume' && (msg.device_id === deviceId || msg.device_id === deviceName)) {
        globalVolume = msg.volume;
        log('Remote Override: Gain set to ' + Math.round(msg.volume * 100) + '%', 'warn');
      }
    } catch {}
  };
}

// ── Streaming Logic ─────────────────────────────────────────────────────────
const backoffMap = {};

function updateCount() {
  const n = Object.keys(activeConnections).length;
  if (n === 0) {
    setSys('IDLE', 'idle');
    document.getElementById('startStreamBtn').style.display = 'block';
    document.getElementById('stopStreamBtn').style.display = 'none';
    document.getElementById('upSpeedDisplay').textContent = '—';
    document.getElementById('vu_meter').style.width = '0%';
  } else {
    document.getElementById('startStreamBtn').style.display = 'none';
    document.getElementById('stopStreamBtn').style.display = 'block';
  }
  checkChanges();
}

let totalBytesSent = 0;
let lastBytesSent = 0;

setInterval(() => {
  if (ws && ws.readyState === 1) {
    if (deviceName) {
      ws.send(JSON.stringify({ type: 'heartbeat', device_id: deviceName }));
    }
    ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
  }

  const active = Object.keys(activeConnections).length > 0;
  if (active) {
    const diff = totalBytesSent - lastBytesSent;
    lastBytesSent = totalBytesSent;
    const kbps = (diff * 8) / 2 / 1000;
    document.getElementById('upSpeedDisplay').textContent = kbps.toFixed(1) + ' kbps';
  } else {
    document.getElementById('upSpeedDisplay').textContent = '—';
  }
}, 1000);

window.stopStream = function(name) {
  const conn = activeConnections[name];
  if (conn) {
    if (conn.pc) conn.pc.close();
    if (conn.stream) conn.stream.getTracks().forEach(t => t.stop());
    if (conn.srcNode) conn.srcNode.disconnect();
    if (conn.an) analyserNodes = analyserNodes.filter(a => a !== conn.an);
    delete activeConnections[name];
  }
  fetch('/stream/' + encodeURIComponent(name), { method: 'DELETE' }).catch(() => {});
  
  updateCount();
  log(`Stream terminated: ${name}`, 'warn');
  document.getElementById('vizLabel').textContent = 'STANDBY';
};

async function sendOffer(endpoint, body) {
  // Not used for WS, but kept for compatibility if needed elsewhere
}

function makePC() {
  // Not used for WS
}

async function swapStreamSource(name, source) {
  const conn = activeConnections[name];
  if (!conn) return startStream(name, source);
  
  log(`Swapping audio source to ${source}...`);
  try {
    let newStream;
    if (source === 'display') {
      newStream = await navigator.mediaDevices.getDisplayMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 2, sampleRate: 48000 }, video: true });
      newStream.getVideoTracks().forEach(t => t.stop());
    } else if (source.startsWith('mic:')) {
      const devId = source.split('mic:')[1];
      const constraints = { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 2, sampleRate: 48000 } };
      if (devId && devId !== 'default') constraints.audio.deviceId = { exact: devId };
      newStream = await navigator.mediaDevices.getUserMedia(constraints);
    }
    
    if (conn.stream) conn.stream.getTracks().forEach(t => t.stop());
    if (conn.srcNode) conn.srcNode.disconnect();
    
    const newSrc = conn.actx.createMediaStreamSource(newStream);
    newSrc.connect(conn.processor);
    newSrc.connect(conn.an);
    
    conn.stream = newStream;
    conn.srcNode = newSrc;
    log(`Successfully swapped mic without disconnecting WebSocket.`);
  } catch(err) {
    log(`Failed to swap mic: ${err.message}`, 'err');
  }
}

async function startStream(name, source) {
  if (activeConnections[name]) { log(`"${name}" is already transmitting.`, 'warn'); return; }
  
  setSys('TRANSMITTING', 'live');
  log(`Initializing stream: ${name} [${source}]`);
  document.getElementById('vizLabel').textContent = `LIVE: ${Object.keys(activeConnections).length + 1} stream(s)`;

  let stream;
  try {
    if (source === 'display') {
      stream = await navigator.mediaDevices.getDisplayMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 2, sampleRate: 48000 }, video: true });
      stream.getVideoTracks().forEach(t => t.stop());
    } else if (source.startsWith('mic:')) {
      const devId = source.split('mic:')[1];
      const constraints = { audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, channelCount: 2, sampleRate: 48000 } };
      if (devId && devId !== 'default') constraints.audio.deviceId = { exact: devId };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    }
  } catch (err) {
    log(`Hardware capture failed: ${err.message}`, 'err');
    setSys('ERROR', 'err');
    return;
  }

  try {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${proto}://${location.host}/ws/sender/${encodeURIComponent(name)}`);
    
    socket.onclose = () => {
      log(`Connection Lost: ${name}`, 'warn');
      if (activeConnections[name]) stopStream(name);
    };

    socket.onerror = () => {
      log(`WebSocket error on stream ${name}`, 'err');
    };

    socket.onopen = () => {
      log(`WebSocket stream connected: ${name}`);
      
      const actx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
      if (actx.state === 'suspended') actx.resume();
      const src2 = actx.createMediaStreamSource(stream);
      
      // Use AudioWorklet or ScriptProcessor to get raw PCM
      // For broad compatibility, we use ScriptProcessor for now
      const processor = actx.createScriptProcessor(4096, 2, 2);
      
      src2.connect(processor);
      processor.connect(actx.destination); // Required to make it process

      processor.onaudioprocess = (e) => {
        if (socket.readyState !== WebSocket.OPEN) return;
        const left = e.inputBuffer.getChannelData(0);
        const right = e.inputBuffer.getChannelData(e.inputBuffer.numberOfChannels > 1 ? 1 : 0);
        
        // Interleave left and right into a single Float32Array
        const interleaved = new Float32Array(left.length * 2);
        for (let i = 0; i < left.length; i++) {
          interleaved[i*2] = left[i] * globalVolume;
          interleaved[i*2+1] = right[i] * globalVolume;
        }
        
        socket.send(interleaved.buffer);
        totalBytesSent += interleaved.byteLength;
      };

      const an2 = actx.createAnalyser(); 
      an2.fftSize = 256;
      src2.connect(an2);
      analyserNodes.push(an2);

      activeConnections[name] = { 
        pc: { close: () => socket.close() }, // Mock pc for close()
        stream, 
        an: an2,
        processor,
        actx,
        srcNode: src2
      };
      updateCount();
      log(`Stream Active: ${name}`);

      function vuTick() {
        if (!activeConnections[name]) return;
        const data = new Uint8Array(an2.frequencyBinCount);
        an2.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        const vu = document.getElementById('vu_meter');
        if (vu) vu.style.width = Math.min(100, (avg / 255) * 100 * 2.5) + '%';
        requestAnimationFrame(vuTick);
      }
      vuTick();
    };
  } catch (err) {
    log(`Initialization failed: ${err.message}`, 'err');
    setSys('ERROR', 'err');
  }
}

// ── Visualizer & Logging ────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
let analyserNodes = [];

function resizeCanvas() {
  const r = canvas.parentNode.getBoundingClientRect();
  const d = window.devicePixelRatio || 1;
  canvas.width = r.width * d;
  canvas.height = r.height * d;
  ctx.setTransform(d, 0, 0, d, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

function vizLoop() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  
  if (analyserNodes.length === 0) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.fillRect(0, h / 2 - 1, w, 2);
  } else {
    analyserNodes.forEach((an) => {
      const data = new Uint8Array(an.frequencyBinCount);
      an.getByteFrequencyData(data);
      const bars = 80, step = Math.floor(data.length / bars), bw = w / bars, cy = h / 2;
      
      for (let i = 0; i < bars; i++) {
        let s = 0; 
        for (let j = 0; j < step; j++) s += data[i * step + j] || 0;
        const norm = Math.pow(s / step / 255, 1.5);
        const bh = Math.max(2, norm * (h * 0.45));
        
        ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
        ctx.fillRect(i * bw + 1, cy - bh, bw - 2, bh * 2);
      }
    });
  }
  requestAnimationFrame(vizLoop);
}

const logEl = document.getElementById('logBox');
const sysDot = document.getElementById('sysDot');
const sysText = document.getElementById('sysText');

function log(msg, type = '') {
  const d = document.createElement('div');
  d.className = 'lg' + (type === 'err' ? ' le' : type === 'warn' ? ' lw' : '');
  const t = new Date().toLocaleTimeString('en-US', { hour12: false });
  d.innerHTML = `<span class="lt">[${t}]</span> ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function setSys(text, level = 'idle') {
  sysText.textContent = text;
  sysDot.className = 'sys-dot ' + (level === 'live' ? 'live' : level === 'warn' ? 'warn' : level === 'err' ? 'err' : '');
}

// Initialization
resizeCanvas();
requestAnimationFrame(vizLoop);
log('System ready.');
</script>
