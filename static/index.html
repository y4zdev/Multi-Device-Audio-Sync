<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AirLink // RECEIVER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-hover: #2563eb;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .bg-static {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.04), transparent 50%),
                  radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.03), transparent 50%);
    }

    .hud {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      gap: 24px;
      position: relative;
      z-index: 10;
    }

    /* header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .brand span {
      font-size: 0.8rem;
      color: var(--accent-primary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text-main); }
    
    .role-badge {
      padding: 4px 10px;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      font-size: 0.75rem;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.1);
    }

    .sys-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      padding: 6px 14px;
      border: 1px solid var(--border-color);
      border-radius: 20px;
    }
    .sys-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: 0.3s; }
    .sys-dot.live { background: var(--accent-success); box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
    .sys-dot.warn { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
    .sys-dot.err { background: var(--accent-danger); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

    /* layout */
    .core { display: flex; flex: 1; gap: 24px; min-height: 0; }

    /* visualizer */
    .viz-wrap {
      flex: 1;
      position: relative;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { width: 100%; height: 100%; display: block; position: absolute; inset: 0; opacity: 0.8; }
    
    .viz-label {
      position: absolute;
      bottom: 24px;
      left: 24px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    /* side panels */
    .side {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .side::-webkit-scrollbar { width: 4px; }
    .side::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
    }
    
    .panel-hdr {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    /* forms */
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); }
    .field input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: all 0.2s;
    }
    .field input:focus { border-color: var(--accent-primary); background: rgba(0, 0, 0, 0.5); }

    /* buttons */
    .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }
    button {
      flex: 1;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent-primary); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.danger { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    button.danger:hover { background: rgba(239, 68, 68, 0.2); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* data grid */
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 8px; }
    .dk { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .dv { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* stream list */
    .stream-list { display: flex; flex-direction: column; gap: 10px; }
    .stream-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stream-item input[type=checkbox] { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
    .stream-item .sname { flex: 1; font-weight: 500; font-size: 0.9rem; color: var(--text-main); }
    .gain-wrap { display: flex; align-items: center; gap: 8px; }
    .gain-wrap input[type=range] { width: 80px; accent-color: var(--accent-primary); cursor: pointer; }
    .gain-val { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.75rem; min-width: 40px; text-align: right; }

    /* assigned streams display */
    .assigned-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .stream-chip {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--accent-primary);
      border-radius: 6px;
    }

    /* terminal log */
    .terminal {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .terminal::-webkit-scrollbar { width: 4px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .lg { line-height: 1.4; word-break: break-all; }
    .lt { color: rgba(255,255,255,0.2); margin-right: 8px; }
    .le { color: var(--accent-danger); }
    .lw { color: #f59e0b; }
    .empty-hint { font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 12px; }

    @media (max-width: 900px) {
      .core { flex-direction: column; }
      .side { width: 100%; flex: 0 0 auto; }
      .viz-wrap { min-height: 35vh; }
    }
  </style>
</head>
<body>
<div class="bg-static"></div>
<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>AirLink</h1>
      <span>Receiver</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">Sender</a>
      <a class="nav-link" href="/receiver">Receiver</a>
      <a class="nav-link" href="/controller">Controller</a>
      <a class="nav-link" href="/admin">Admin</a>
      <div class="user-profile" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color);" title="User Profile" onclick="window.location.href='/logout'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
    </div>
  </header>

  <main class="core">
    <!-- visualizer -->
    <section class="viz-wrap">
      <canvas id="viz"></canvas>
      <div class="viz-label"><span id="vizLabel">STANDBY</span></div>
    </section>

    <!-- side -->
    <aside class="side">

      <!-- [01] Device Identity -->
      <div class="panel">
        <div class="panel-hdr"><span>01 / Configuration</span><span id="devRegState" style="color:var(--text-muted);font-size:0.7rem;">Unregistered</span></div>
        <div class="field">
          <label>Speaker Name</label>
          <input type="text" id="speakerName" placeholder="e.g. Living Room, Headset" maxlength="40" value="Speaker" />
        </div>
        <div class="data-grid" style="margin-bottom:8px;">
          <div><div class="dk">Node ID</div><div class="dv" id="devIdDisplay" style="font-size:0.7rem;">—</div></div>
          <div><div class="dk">Status</div><div class="dv" id="devStatusDisplay">Offline</div></div>
        </div>
      </div>

      <!-- [02] Available Streams -->
      <div class="panel">
        <div class="panel-hdr"><span>02 / Available Streams</span><span id="streamCount" style="color:var(--accent-primary);">0</span></div>
        <div id="streamList" class="stream-list">
          <div class="empty-hint">Waiting for streams...</div>
        </div>
      </div>

      <!-- [03] Assigned by Manager -->
      <div class="panel">
        <div class="panel-hdr"><span>03 / Manager Assigned</span></div>
        <div id="assignedStreams" class="assigned-list">
          <span style="font-size:0.8rem;color:var(--text-muted);">None</span>
        </div>
      </div>

      <!-- [04] Connect -->
      <div class="panel">
        <div class="panel-hdr">
          <span>04 / Connection</span>
          <div class="sys-indicator">
            <span class="sys-dot" id="sysDot"></span>
            <span id="sysText">IDLE</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="primary" id="btnConnect">Connect</button>
          <button class="danger" id="btnDisconnect" disabled>Disconnect</button>
        </div>
        <div class="data-grid">
          <div><div class="dk">Audio Engine</div><div class="dv" id="audioState">—</div></div>
          <div><div class="dk">Connection</div><div class="dv" id="wsState">Disconnected</div></div>
          <div><div class="dk">Down Speed</div><div class="dv" id="downSpeedDisplay">—</div></div>
          <div><div class="dk">Latency (RTT)</div><div class="dv" id="rtcLatencyDisplay">—</div></div>
        </div>
      </div>

      <div class="terminal" id="logBox"></div>
    </aside>
  </main>
</div>

<script>
'use strict';
// ── state ─────────────────────────────────────────────────────────────────────
let deviceId       = null;
let ws             = null;
let audioCtx       = null;
let gainNodes      = {};   
let pc             = null;
let hbTimer        = null;
let knownStreams    = new Set();
let assignedStreams = [];
let checkedStreams  = new Set();
let isConnected    = false;

// ── DOM ───────────────────────────────────────────────────────────────────────
const elName      = () => document.getElementById('speakerName').value.trim() || 'Speaker';
const elDevReg    = document.getElementById('devRegState');
const elDevId     = document.getElementById('devIdDisplay');
const elDevStatus = document.getElementById('devStatusDisplay');
const elStreamList= document.getElementById('streamList');
const elAssigned  = document.getElementById('assignedStreams');
const elStreamCnt = document.getElementById('streamCount');
const elAudio     = document.getElementById('audioState');
const elWs        = document.getElementById('wsState');
const elDownSpeed = document.getElementById('downSpeedDisplay');
const elLatency   = document.getElementById('rtcLatencyDisplay');
const elSysDot    = document.getElementById('sysDot');
const elSysText   = document.getElementById('sysText');
const btnConnect  = document.getElementById('btnConnect');
const btnDiscon   = document.getElementById('btnDisconnect');

// ── log ───────────────────────────────────────────────────────────────────────
const logEl = document.getElementById('logBox');
function log(msg, type='') {
  const d = document.createElement('div');
  d.className = 'lg' + (type==='err' ? ' le' : type==='warn' ? ' lw' : '');
  const t = new Date().toLocaleTimeString('en-US', {hour12:false});
  d.innerHTML = `<span class="lt">[${t}]</span>${msg}`;
  logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
}
function setSys(text, level='idle') {
  elSysText.textContent = text;
  elSysDot.className = 'sys-dot ' + (level==='live'?'live':level==='warn'?'warn':level==='err'?'err':'');
}

// ── canvas visualizer ─────────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
let analyserNodes = [];
function resizeCanvas() {
  const r = canvas.parentNode.getBoundingClientRect();
  const d = window.devicePixelRatio || 1;
  canvas.width  = r.width  * d;
  canvas.height = r.height * d;
  ctx.setTransform(d,0,0,d,0,0);
}
window.addEventListener('resize', resizeCanvas);
function vizLoop() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  if (analyserNodes.length === 0) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.fillRect(0, h/2-1, w, 2);
  } else {
    analyserNodes.forEach(an => {
      const data = new Uint8Array(an.frequencyBinCount);
      an.getByteFrequencyData(data);
      const bars=80, step=Math.floor(data.length/bars), bw=w/bars, cy=h/2;
      for (let i=0; i<bars; i++) {
        let s=0; for(let j=0;j<step;j++) s+=data[i*step+j]||0;
        const norm = Math.pow(s/step/255, 1.5);
        const bh = Math.max(2, norm*(h*0.45));
        ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
        ctx.fillRect(i*bw+1, cy-bh, bw-2, bh);
        ctx.fillRect(i*bw+1, cy,    bw-2, bh);
      }
    });
  }
  requestAnimationFrame(vizLoop);
}

// ── render stream list ────────────────────────────────────────────────────────
function renderStreamList() {
  elStreamCnt.textContent = knownStreams.size;
  if (knownStreams.size === 0) {
    elStreamList.innerHTML = '<div class="empty-hint">No active streams</div>';
    return;
  }
  elStreamList.innerHTML = '';
  knownStreams.forEach(name => {
    const div = document.createElement('div');
    div.className = 'stream-item';
    const cbId = 'cb_' + name;
    div.innerHTML = `
      <input type="checkbox" id="${cbId}" data-stream="${name}"
             ${checkedStreams.has(name) || assignedStreams.includes(name) ? 'checked' : ''}>
      <label for="${cbId}" class="sname">${name}</label>
      <div class="gain-wrap">
        <input type="range" min="0" max="2" step="0.05" value="1"
               data-gain="${name}" title="Gain">
        <span class="gain-val" id="gv_${name}">1.00x</span>
      </div>`;
    elStreamList.appendChild(div);
    div.querySelector('input[type=checkbox]').addEventListener('change', e => {
      if (e.target.checked) checkedStreams.add(name);
      else checkedStreams.delete(name);
    });
    div.querySelector('input[type=range]').addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      document.getElementById('gv_'+name).textContent = v.toFixed(2)+'x';
      if (gainNodes[name]) gainNodes[name].gain.value = v;
    });
  });
}

// ── render assigned streams ───────────────────────────────────────────────────
function renderAssigned() {
  if (assignedStreams.length === 0) {
    elAssigned.innerHTML = '<span style="font-size:0.8rem;color:var(--text-muted);">None</span>';
    return;
  }
  elAssigned.innerHTML = assignedStreams.map(s =>
    `<span class="stream-chip">${s}</span>`).join('');
}

// ── device registration ───────────────────────────────────────────────────────
async function registerDevice() {
  const name = elName();
  const id   = deviceId || ('spk-' + Math.random().toString(36).slice(2,10));
  const res  = await fetch('/device/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, name, role: 'speaker' })
  });
  if (!res.ok) throw new Error('Register failed ' + res.status);
  const d = await res.json();
  deviceId = d.id;
  elDevId.textContent     = deviceId.slice(0,14) + '...';
  elDevStatus.textContent = 'Online';
  elDevStatus.style.color = 'var(--accent-success)';
  elDevReg.textContent    = 'Registered';
  elDevReg.style.color    = 'var(--accent-success)';
  log('Device registered: ' + name + ' [' + deviceId.slice(0,8) + ']');
}

// ── heartbeat & stats ────────────────────────────────────────────────────────
let totalBytesRecv = 0;
let lastBytesRecv = 0;
let statTimer = null;

function startHb() {
  stopHb();
  hbTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN && deviceId) {
      ws.send(JSON.stringify({ type: 'heartbeat', device_id: deviceId }));
    }
  }, 10_000);
  
  if (statTimer) clearInterval(statTimer);
  totalBytesRecv = 0;
  lastBytesRecv = 0;
  statTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
    }
    if (isConnected) {
      const diff = totalBytesRecv - lastBytesRecv;
      lastBytesRecv = totalBytesRecv;
      const kbps = (diff * 8) / 2 / 1000;
      if (elDownSpeed) elDownSpeed.textContent = kbps.toFixed(1) + ' kbps';
    } else {
      if (elDownSpeed) elDownSpeed.textContent = '—';
    }
  }, 2000);
}

function stopHb() { 
  if (hbTimer) { clearInterval(hbTimer); hbTimer = null; } 
  if (statTimer) { clearInterval(statTimer); statTimer = null; }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { elWs.textContent = 'Connected'; elWs.style.color='var(--accent-success)'; log('Server connection established'); if(deviceId) startHb(); };
  ws.onclose = () => { elWs.textContent = 'Disconnected'; elWs.style.color='var(--text-muted)'; setTimeout(connectWS, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'pong') {
      const rtt = Date.now() - msg.ts;
      if (elLatency) elLatency.textContent = rtt + ' ms';
      return;
    }
    if (msg.type === 'snapshot') {
      knownStreams = new Set(msg.streams || []);
      if (deviceId) {
        const me = (msg.devices || []).find(d => d.id === deviceId);
        if (me) { assignedStreams = me.assigned_streams || []; renderAssigned(); }
      }
      renderStreamList(); return;
    }
    if (msg.type === 'stream_added')   { knownStreams.add(msg.name);    renderStreamList(); return; }
    if (msg.type === 'stream_removed') { knownStreams.delete(msg.name); renderStreamList(); return; }
    if (msg.type === 'route_changed' && msg.speaker_id === deviceId) {
      if (msg.connected)  assignedStreams = [...new Set([...assignedStreams, msg.source])];
      else                assignedStreams = assignedStreams.filter(s => s !== msg.source);
      renderAssigned();
      log('Manager ' + (msg.connected?'assigned':'removed') + ': ' + msg.source, 'warn');
    }
    if (msg.type === 'set_volume' && msg.device_id === deviceId) {
      const vol = parseFloat(msg.volume);
      if (msg.stream) { if (gainNodes[msg.stream]) gainNodes[msg.stream].gain.value = vol; }
      else { Object.values(gainNodes).forEach(g => g.gain.value = vol); }
      log('Remote Override: Volume set to ' + Math.round(vol*100) + '%', 'warn');
    }
  };
}

// ── Audio Streaming via WebSocket ─────────────────────────────────────────────
function getSelectedStreams() {
  const result = [];
  document.querySelectorAll('#streamList input[type=checkbox]:checked').forEach(cb => {
    result.push(cb.dataset.stream);
  });
  return result;
}

let audioSockets = [];

async function connect() {
  let streams = assignedStreams.length > 0 ? [...assignedStreams] : getSelectedStreams();
  if (streams.length === 0) streams = getSelectedStreams();
  if (streams.length === 0) { log('Select or wait for manager to assign streams.', 'warn'); return; }

  btnConnect.disabled = true;
  setSys('REGISTERING...', 'warn');

  try { await registerDevice(); }
  catch(e) { log('Register failed: '+e.message,'err'); btnConnect.disabled=false; setSys('ERROR','err'); return; }

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  elAudio.textContent = audioCtx.state.toUpperCase();

  // Close old sockets
  audioSockets.forEach(s => s.close());
  audioSockets = [];
  gainNodes = {}; analyserNodes = [];

  setSys('CONNECTING...','warn');
  
  for (const streamName of streams) {
    log('Connecting to stream: ' + streamName);
    
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${proto}://${location.host}/ws/receiver/${encodeURIComponent(streamName)}`);
    socket.binaryType = 'arraybuffer';
    
    const gain = audioCtx.createGain();
    const an = audioCtx.createAnalyser(); an.fftSize = 256;
    gain.gain.value = 1.0;
    gain.connect(an);
    gain.connect(audioCtx.destination);
    
    gainNodes[streamName] = gain;
    analyserNodes.push(an);
    
    let nextPlayTime = 0;
    
    socket.onopen = () => {
      log(`WebSocket audio connected: ${streamName}`);
      document.getElementById('vizLabel').textContent = 'LIVE: ' + streamName;
      setSys('PLAYING', 'live');
      if (audioCtx.state === 'suspended') audioCtx.resume();
      elAudio.textContent = 'RUNNING';
      
      const sl = document.querySelector(`[data-gain="${streamName}"]`);
      if (sl) sl.addEventListener('input', () => { gain.gain.value = parseFloat(sl.value); });
    };
    
    socket.onmessage = (e) => {
      totalBytesRecv += e.data.byteLength;
      if (audioCtx.state === 'suspended') return;
      const f32 = new Float32Array(e.data);
      const frames = f32.length / 2;
      const buffer = audioCtx.createBuffer(2, frames, 48000);
      const left = buffer.getChannelData(0);
      const right = buffer.getChannelData(1);
      
      for (let i = 0; i < frames; i++) {
        left[i] = f32[i*2];
        right[i] = f32[i*2+1];
      }
      
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(gain);
      
      const currentTime = audioCtx.currentTime;
      if (nextPlayTime < currentTime) {
        nextPlayTime = currentTime + 0.05; // 50ms buffer for latency smoothing
      }
      src.start(nextPlayTime);
      nextPlayTime += buffer.duration;
    };
    
    socket.onclose = () => {
      log(`Stream ${streamName} disconnected.`, 'warn');
      const idx = analyserNodes.indexOf(an);
      if (idx > -1) analyserNodes.splice(idx, 1);
    };
    
    socket.onerror = () => {
      log(`Error on stream ${streamName}.`, 'err');
    };
    
    audioSockets.push(socket);
  }

  startHb();
  isConnected = true;
  btnConnect.disabled  = false;
  btnDiscon.disabled   = false;
  log('Connected successfully.');
}

async function disconnect() {
  stopHb();
  isConnected = false;
  
  audioSockets.forEach(s => s.close());
  audioSockets = [];
  
  gainNodes = {}; analyserNodes = [];
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  elAudio.textContent = '—';
  if (elLatency) elLatency.textContent = '—';
  if (elDownSpeed) elDownSpeed.textContent = '—';
  document.getElementById('vizLabel').textContent = 'STANDBY';
  setSys('IDLE','idle');
  if (deviceId) {
    await fetch('/device/'+deviceId, {method:'DELETE'}).catch(()=>{});
    deviceId = null;
  }
  elDevId.textContent     = '—';
  elDevStatus.textContent = 'Offline';
  elDevStatus.style.color = 'var(--text-main)';
  elDevReg.textContent    = 'Unregistered';
  elDevReg.style.color    = 'var(--text-muted)';
  btnConnect.disabled  = false;
  btnDiscon.disabled   = true;
  log('Disconnected.', 'warn');
}

btnConnect.addEventListener('click', connect);
btnDiscon.addEventListener ('click', disconnect);

resizeCanvas();
requestAnimationFrame(vizLoop);
connectWS();
log('System ready.');
</script>
