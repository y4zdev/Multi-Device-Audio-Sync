<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AirLink // MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-hover: #2563eb;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-purple: #a855f7;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      display: grid;
      grid-template-rows: 72px 1fr 80px;
      grid-template-columns: 1fr 350px;
      grid-template-areas: 'hdr hdr' 'center side' 'player player';
      gap: 16px;
      padding: 16px;
    }
    
    .bg-static {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.04), transparent 50%),
                  radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.03), transparent 50%);
    }

    /* ── header ── */
    header {
      grid-area: hdr;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    
    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .brand span {
      font-size: 0.8rem;
      color: var(--accent-primary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .hdr-right { display: flex; align-items: center; gap: 24px; margin-left: auto; font-size: 0.85rem; font-weight: 500; }
    .nav-link { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--text-main); }
    
    .ws-badge {
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
    }
    .ws-ok { color: var(--accent-success); border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.1); }
    .ws-err { color: var(--accent-danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
    .ws-wait { color: var(--text-muted); }

    /* ── panels ── */
    .panel-wrap {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panelCenter { grid-area: center; }
    
    .panel-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .node-popup {
      position: absolute; background: var(--bg-panel); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px; width: 280px; z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; flex-direction: column; gap: 12px;
      pointer-events: auto;
    }
    .np-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .np-title { font-weight: 600; font-size: 0.95rem; color: #fff; margin-bottom: 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .np-role { font-size: 0.7rem; font-weight: 500; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; display:inline-block; }
    .np-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display:flex; align-items:center; justify-content:center; }
    .np-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    
    .np-vol-row { display: flex; align-items: center; gap: 12px; margin-top:4px; }
    .np-vol-row input[type=range] { flex: 1; accent-color: var(--accent-primary); cursor: pointer; }
    .np-vol-val { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); min-width: 44px; text-align: right; }
    
    .np-btn-remove {
      width: 100%; padding: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--accent-danger); font-size: 0.85rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top:8px;
    }
    .np-btn-remove:hover { background: rgba(239, 68, 68, 0.2); }
    .role-mic { background: rgba(168, 85, 247, 0.1); color: var(--accent-purple); border: 1px solid rgba(168, 85, 247, 0.2); }
    .role-speaker { background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); border: 1px solid rgba(59, 130, 246, 0.2); }
    .role-controller { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); border: 1px solid rgba(245, 158, 11, 0.2); }

    /* ── diagram (Center) ── */
    #diagram { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    #diagramSvg { width: 100%; height: 100%; flex: 1; user-select: none; }
    .diag-hint { position: absolute; bottom: 20px; left: 20px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; pointer-events: none; }
    .diag-mode { position: absolute; top: 20px; right: 20px; font-size: 0.75rem; color: var(--accent-warning); font-weight: 600; pointer-events: none; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; }

    .toolbar {
      position: absolute; bottom: 24px; right: 24px;
      background: rgba(15, 15, 20, 0.85); border: 1px solid rgba(255,255,255,0.1);
      padding: 8px; border-radius: 16px; display: flex; gap: 8px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .tool-btn {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 12px; cursor: pointer; color: var(--text-muted);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }
    .tool-btn.active { background: var(--accent-primary); color: #000; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

    /* ── right panel detail ── */
    .detail-content { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .detail-section { display: flex; flex-direction: column; gap: 8px; }
    .detail-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; }
    .detail-val { font-size: 0.95rem; font-weight: 500; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
    
    .vol-row { display: flex; align-items: center; gap: 12px; }
    .vol-row input[type=range] { flex: 1; accent-color: var(--accent-primary); cursor: pointer; }
    .vol-val { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); min-width: 44px; text-align: right; }
    
    .assign-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; }
    .assign-row input[type=checkbox] { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
    .assign-row label { flex: 1; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    
    .btn-remove {
      width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--accent-danger); font-size: 0.85rem; font-weight: 600; border-radius: 8px;
      cursor: pointer; transition: all 0.2s; margin-top: auto;
    }
    .btn-remove:hover { background: rgba(239, 68, 68, 0.2); }
    .empty-hint { font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 20px; }
    
    hr.sep { border: none; border-top: 1px solid var(--border-color); margin: 8px 0; }

    /* ── terminal ── */
    .terminal {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
      background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px; flex: 1; min-height: 150px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    .terminal::-webkit-scrollbar { width: 4px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .lg { line-height: 1.4; word-break: break-all; }
    .lt { color: rgba(255,255,255,0.2); margin-right: 8px; }
    .le { color: var(--accent-danger); }
    .lw { color: #f59e0b; }

    /* Toast Container */
    #toastContainer { position: fixed; top: 96px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; pointer-events: none; }
    .toast { background: var(--bg-panel); border: 1px solid var(--border-color); backdrop-filter: blur(16px); padding: 12px 16px; border-radius: 12px; color: #fff; font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s forwards; pointer-events: auto; display: flex; align-items: center; gap: 12px; }
    .toast.out { animation: toastOut 0.3s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(50px); } }

    /* ── BGM Player ── */
    #panelPlayer { grid-area: player; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-direction: row; }
    .player-left { display: flex; align-items: center; gap: 16px; width: 300px; }
    .player-cover { width: 48px; height: 48px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .player-meta { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .player-title { font-size: 0.9rem; font-weight: 600; color: #fff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .player-artist { font-size: 0.75rem; color: var(--text-muted); }
    
    .player-center { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; justify-content: center; }
    .player-controls { display: flex; align-items: center; gap: 16px; }
    .player-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; }
    .player-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .player-btn.play-btn { background: #fff; color: #000; width: 44px; height: 44px; }
    .player-btn.play-btn:hover { transform: scale(1.05); background: #f8fafc; }
    .player-btn.power-btn { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .player-btn.power-btn.active { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .player-btn.active-state { color: var(--accent-primary); }
    
    .timeline-wrap { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 400px; }
    .timeline-time { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); min-width: 40px; text-align: center; }
    .timeline-slider { flex: 1; accent-color: var(--accent-primary); cursor: pointer; height: 4px; }
    
    .player-right { display: flex; align-items: center; gap: 16px; width: 350px; justify-content: flex-end; }
    .upload-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; color: var(--text-main); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .upload-btn:hover { background: rgba(255,255,255,0.1); }
    
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-muted); }
    .player-volume input[type=range] { width: 80px; accent-color: var(--text-main); cursor: pointer; }
    
    #bgmInput { display: none; }

    @media (max-width: 1000px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 72px 1fr 200px 80px;
        grid-template-areas: 'hdr' 'center' 'side' 'player';
      }
    }
  </style>
</head>
<body>
<script>
const lockBc = new BroadcastChannel('controller_lock');
let isPrimaryController = true;
lockBc.onmessage = (e) => {
  if (e.data === 'ping' && isPrimaryController) {
    lockBc.postMessage('pong');
  } else if (e.data === 'pong' && isPrimaryController) {
    isPrimaryController = false;
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-main);color:var(--text-main);font-size:1.5rem;font-family:sans-serif;flex-direction:column;gap:16px;">
        <div>Controller is already in use in another window.</div>
        <button onclick="lockBc.postMessage('takeover'); window.location.reload();" style="padding:12px 24px; background:var(--accent-primary); color:white; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer; font-weight:bold; transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">Use Here Instead</button>
      </div>`;
  } else if (e.data === 'takeover' && isPrimaryController) {
    isPrimaryController = false;
    if (typeof ws !== 'undefined' && ws) ws.close();
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-main);color:var(--text-main);font-size:1.5rem;font-family:sans-serif;flex-direction:column;gap:16px;">
        <div>Controller session was taken over by another window.</div>
        <button onclick="lockBc.postMessage('takeover'); window.location.reload();" style="padding:12px 24px; background:var(--accent-primary); color:white; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer; font-weight:bold; transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">Take Back Control</button>
      </div>`;
  }
};
lockBc.postMessage('ping');
</script>
<div class="bg-static"></div>
<div id="toastContainer"></div>

<header>
  <div class="brand">
    <h1>AirLink</h1>
    <span>Controller</span>
  </div>
  <div class="hdr-right">
    <a class="nav-link" href="/sender">Sender</a>
    <a class="nav-link" href="/receiver">Receiver</a>
    <a class="nav-link" href="/controller">Controller</a>
    <a class="nav-link" href="/admin">Admin</a>
    <div class="user-profile" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color);" title="User Profile" onclick="window.location.href='/logout'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </div>
</header>

<!-- CENTER: diagram -->
<div class="panel-wrap" id="panelCenter">
  <div class="panel-title">
    <span>Routing Diagram</span>
    <div style="display:flex;gap:16px;align-items:center;">
      <span id="diagStreamCount" style="color:var(--text-muted); font-weight:500; font-size:0.8rem;">0 streams</span>
      <span id="wsBadge" class="ws-badge ws-wait">Connecting...</span>
    </div>
  </div>
  <div id="diagram">
    <div class="toolbar" id="toolbar">
      <button class="tool-btn" id="toolAlign" title="Auto Align" onclick="autoAlign()">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      </button>
      <button class="tool-btn active" id="toolSelect" title="Select / Move" onclick="setTool('select')">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      </button>
      <button class="tool-btn" id="toolConnect" title="Connect Nodes" onclick="setTool('connect')">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
      </button>
    </div>
    <svg id="diagramSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="diag-hint" id="diagHint">Drag nodes to organize. Use Connect tool to route.</div>
    <div class="diag-mode" id="diagMode" style="display:none;"></div>
    <div id="devicePopup" class="node-popup"></div>
    <div id="queuePopup" class="node-popup" style="width: 320px; right: 24px; left: auto; top: auto; bottom: 96px;">
      <div class="np-header">
        <div class="np-title">Play Queue</div>
        <button class="np-close" onclick="document.getElementById('queuePopup').style.display='none'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="queueList" style="max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
  </div>
</div>

<!-- SIDE: Terminal Log -->
<div class="panel-wrap" style="grid-area: side; display: flex; flex-direction: column;">
  <div class="panel-title">System Log</div>
  <div class="terminal" id="logBox" style="margin: 16px; margin-top: 0;"></div>
</div>

<!-- PLAYER -->
<div class="panel-wrap" id="panelPlayer">
  <div class="player-left">
    <button class="player-btn power-btn active" id="btnPower" title="Power ON/OFF">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
    </button>
    <div class="player-cover">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    </div>
    <div class="player-meta">
      <div class="player-title" id="playerTitle">No Track Selected</div>
      <div class="player-artist" id="playerStatus">0 tracks in queue</div>
    </div>
  </div>
  
  <div class="player-center">
    <div class="player-controls">
      <button class="player-btn" id="btnShuffle" title="Shuffle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
      </button>
      <button class="player-btn" id="btnPrev" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
      </button>
      <button class="player-btn play-btn" id="btnPlayPause" title="Play">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      </button>
      <button class="player-btn" id="btnNext" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
      </button>
      <button class="player-btn" id="btnRepeat" title="Repeat Queue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
      </button>
    </div>
    <div class="timeline-wrap">
      <span class="timeline-time" id="timeCurrent">0:00</span>
      <input type="range" class="timeline-slider" id="bgmTimeline" min="0" max="100" value="0" step="1">
      <span class="timeline-time" id="timeTotal">0:00</span>
    </div>
  </div>
  
  <div class="player-right">
    <div class="player-volume">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
      <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="1">
      <span id="bgmVolumePct" style="min-width: 40px; font-size: 0.8rem;">100%</span>
    </div>
    <button class="upload-btn" onclick="toggleQueue()">Queue</button>
    <input type="file" id="bgmInput" multiple accept="audio/*">
    <label for="bgmInput" class="upload-btn">Add Tracks</label>
    <div style="font-size: 0.75rem; color: var(--text-muted); display:flex; align-items:center; gap:6px; margin-left: 8px;">
       <span id="playerWsDot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--text-muted);"></span>
       BGM
    </div>
  </div>
</div>

<script>
'use strict';
// ── state ─────────────────────────────────────────────────────────────────────
const OFFLINE_MS = 15_000;
let devices    = {};  
let streams    = {};
let selectedId = null;
let ws         = null;
let pendingMic = null;  

let currentTool = 'select';
let customPos = JSON.parse(localStorage.getItem('airlink_pos')||'{}');

function setTool(t) {
  currentTool = t;
  document.getElementById('toolSelect').classList.toggle('active', t==='select');
  document.getElementById('toolConnect').classList.toggle('active', t==='connect');
  pendingMic = null;
  elDiagMode.style.display = t==='connect' ? 'block' : 'none';
  elDiagMode.textContent = t==='connect' ? 'CONNECT MODE: Click Mic, then Speaker' : '';
  elDiagHint.textContent = t==='connect' ? 'Select a MIC source node to begin routing.' : 'Drag nodes to organize. Click to select.';
  renderDiagram();
}

function autoAlign() {
  const H = elDiagSvg.clientHeight || 400;
  const W = elDiagSvg.clientWidth || 600;
  const cy = H / 2;
  
  const streamNodes = Object.keys(streams);
  if (!streamNodes.includes('System BGM')) streamNodes.push('System BGM');
  const gapMics = Math.min(90, (H-80) / Math.max(streamNodes.length, 1));
  const startYMics = cy - ((streamNodes.length-1)*gapMics)/2;
  streamNodes.forEach((id, i) => { customPos['STR_'+id] = { x: 100, y: startYMics + i*gapMics }; });

  const spks = Object.values(devices).filter(d => d.role !== 'controller');
  const gapSpks = Math.min(90, (H-80) / Math.max(spks.length, 1));
  const startYSpks = cy - ((spks.length-1)*gapSpks)/2;
  spks.forEach((dev, i) => { customPos[dev.id] = { x: W - 100, y: startYSpks + i*gapSpks }; });

  localStorage.setItem('airlink_pos', JSON.stringify(customPos));
  renderDiagram();
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const elWsBadge   = document.getElementById('wsBadge');
const elDiagSvg   = document.getElementById('diagramSvg');
const elDiagHint  = document.getElementById('diagHint');
const elDiagMode  = document.getElementById('diagMode');
const elStreamCnt = document.getElementById('diagStreamCount');

// ── helpers ───────────────────────────────────────────────────────────────────
function isOffline(dev) { return String(dev.status).toLowerCase() === 'offline'; }
function roleClass(r) { return {mic:'role-mic',speaker:'role-speaker',controller:'role-controller'}[r]||'role-controller'; }

const logEl = document.getElementById('logBox');
function log(msg, type='') {
  const d = document.createElement('div');
  d.className = 'lg' + (type==='err' ? ' le' : type==='warn' ? ' lw' : '');
  const t = new Date().toLocaleTimeString('en-US', {hour12:false});
  d.innerHTML = `<span class="lt">[${t}]</span>${msg}`;
  if (logEl) {
    logEl.appendChild(d); 
    logEl.scrollTop = logEl.scrollHeight;
  }
}

function showToast(msg, isMic=false) {
  log(msg, 'warn');
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const t = document.createElement('div');
  t.className = 'toast';
  const iconCol = isMic ? 'var(--accent-purple)' : 'var(--accent-primary)';
  t.innerHTML = `<div style="width: 8px; height: 8px; border-radius: 50%; background: ${iconCol}; box-shadow: 0 0 8px ${iconCol};"></div><div>${msg}</div>`;
  container.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 4000);
}

// ── render diagram ────────────────────────────────────────────────────────────
function renderDiagram() {
  const svg = elDiagSvg;
  const W = svg.clientWidth  || svg.parentElement.clientWidth  || 600;
  const H = svg.clientHeight || svg.parentElement.clientHeight || 400;
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  elStreamCnt.textContent = Object.keys(streams).filter(k => streams[k].online).length + ' active streams';

  svg.innerHTML = `
    <defs>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(59, 130, 246, 0.8)"/>
      </marker>
    </defs>`;

  const spks = Object.values(devices).filter(d => d.role === 'speaker');

  const streamNodesSet = new Set(Object.keys(streams));
  streamNodesSet.add('System BGM');
  spks.forEach(spk => {
    (spk.assigned_streams||[]).forEach(s => streamNodesSet.add(s));
  });
  
  // BGM server player is always treated as a stream node on the left side

  const streamNodes = Array.from(streamNodesSet);

  const cy = H / 2;
  const LX = 100;
  const RX = W - 100;
  const NODE_R = 30;

  function placeNodes(list, defaultX, isStream) {
    const gap = Math.min(90, (H-80) / Math.max(list.length,1));
    const totalH = (list.length-1)*gap;
    const startY = cy - totalH/2;
    list.forEach((item, i) => {
      const id = isStream ? 'STR_'+item : item.id;
      if (!customPos[id]) customPos[id] = { x: defaultX, y: startY + i*gap };
    });
  }
  placeNodes(streamNodes, LX, true);
  placeNodes(spks, RX, false);

  const drawnRoutes = new Set();
  spks.forEach(spk => {
    (spk.assigned_streams||[]).forEach(sname => {
      const sId = 'STR_'+sname;
      if (!customPos[sId] || !customPos[spk.id]) return;
      const key = sId+'->'+spk.id;
      if (drawnRoutes.has(key)) return;
      drawnRoutes.add(key);
      const p1 = customPos[sId], p2 = customPos[spk.id];
      const mx1 = p1.x + NODE_R + 10, mx2 = p2.x - NODE_R - 10;
      const cmx = (mx1+mx2)/2;
      const pathData = `M${mx1},${p1.y} C${cmx},${p1.y} ${cmx},${p2.y} ${mx2},${p2.y}`;
      
      // Invisible thicker hit-box for easier clicking
      const hitPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      hitPath.setAttribute('d', pathData);
      hitPath.setAttribute('fill', 'none');
      hitPath.setAttribute('stroke', 'transparent');
      hitPath.setAttribute('stroke-width', '20');
      hitPath.setAttribute('pointer-events', 'stroke');
      
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', pathData);
      path.setAttribute('fill','none');
      path.setAttribute('pointer-events', 'none'); // Let hitPath catch events
      
      const isSrcActive = sname === 'System BGM' || streams[sname]?.online;
      const isSpkActive = !isOffline(spk);
      const isActiveFlow = isSrcActive && isSpkActive;
      
      path.setAttribute('stroke', isActiveFlow ? 'rgba(59, 130, 246, 0.8)' : 'rgba(107, 114, 128, 0.4)');
      path.setAttribute('stroke-width','2');
      if (isActiveFlow) {
        path.setAttribute('marker-end','url(#arr)');
        path.setAttribute('stroke-dasharray', '8 4');
        path.style.animation = 'flowAnim 0.8s linear infinite';
      } else {
        path.setAttribute('stroke-dasharray', 'none');
      }

      const disconnectFn = (e) => { e.stopPropagation(); disconnectRoute(sname, spk.id); };
      const stopProp = (e) => e.stopPropagation();
      hitPath.addEventListener('mousedown', stopProp);
      hitPath.addEventListener('click', disconnectFn);
      
      svg.appendChild(hitPath);
      svg.appendChild(path);
      
      // Draw disconnect "X" button in the middle
      const lx = (mx1+mx2)/2, ly = (p1.y+p2.y)/2;
      const xBtn = document.createElementNS('http://www.w3.org/2000/svg','g');
      xBtn.style.cursor = 'pointer';
      
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', lx); c.setAttribute('cy', ly); c.setAttribute('r', '8');
      c.setAttribute('fill', 'var(--bg)');
      c.setAttribute('stroke', 'var(--border-color)');
      c.setAttribute('stroke-width', '1.5');
      
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', lx); t.setAttribute('y', ly+3);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('font-family', 'sans-serif');
      t.setAttribute('font-weight', 'bold');
      t.setAttribute('font-size', '9');
      t.setAttribute('fill', 'var(--text-muted)');
      t.textContent = '✕';
      
      xBtn.appendChild(c);
      xBtn.appendChild(t);
      
      xBtn.addEventListener('mousedown', stopProp);
      xBtn.addEventListener('click', disconnectFn);
      // Hover effect for X button
      xBtn.addEventListener('mouseenter', () => { c.setAttribute('stroke', 'var(--accent-danger)'); t.setAttribute('fill', 'var(--accent-danger)'); });
      xBtn.addEventListener('mouseleave', () => { c.setAttribute('stroke', 'var(--border-color)'); t.setAttribute('fill', 'var(--text-muted)'); });
      svg.appendChild(xBtn);
      
      const text_ly = (p1.y+p2.y)/2 - 12;
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', lx); txt.setAttribute('y', text_ly);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family',"'Inter', sans-serif");
      txt.setAttribute('font-size','10');
      txt.setAttribute('font-weight','500');
      txt.setAttribute('fill', isActiveFlow ? 'rgba(255, 255, 255, 0.8)' : 'rgba(107, 114, 128, 0.8)');
      txt.textContent = sname;
      svg.appendChild(txt);
    });
  });



  if (pendingMic && customPos['STR_'+pendingMic]) {
    const pp = customPos['STR_'+pendingMic];
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',pp.x); ring.setAttribute('cy',pp.y); ring.setAttribute('r', NODE_R+8);
    ring.setAttribute('fill','none'); ring.setAttribute('stroke',"var(--accent-warning)"); ring.setAttribute('stroke-width','2');
    ring.setAttribute('stroke-dasharray','4 4');
    svg.appendChild(ring);
  }

  streamNodes.forEach(sname => {
    const p   = customPos['STR_'+sname];
    const isSrcActive = sname === 'System BGM' || streams[sname]?.online;
    const col = isSrcActive ? (sname===pendingMic ? 'var(--accent-warning)' : 'var(--accent-purple)') : 'var(--accent-danger)';
    let statusTxt = isSrcActive ? 'LIVE' : 'OFFLINE';
    let label = 'MIC';
    let statusCol = isSrcActive ? '#10b981' : '#ef4444'; // green or red
    
    if (sname === 'System BGM') {
      const isPlaying = window.playerState && window.playerState.playing;
      statusTxt = isPlaying ? 'PLAYING' : 'PAUSED';
      statusCol = isPlaying ? '#10b981' : '#f59e0b'; // green or yellow
      
      const isMuted = streams[sname]?.volume === 0;
      const spectrum = isPlaying && !isMuted ? `
        <rect x="${p.x - 14}" y="${p.y + 14}" width="4" height="10" fill="var(--accent-primary)"><animate attributeName="height" values="4;10;4" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+20};${p.y+14};${p.y+20}" dur="0.6s" repeatCount="indefinite"/></rect>
        <rect x="${p.x - 6}" y="${p.y + 10}" width="4" height="14" fill="var(--accent-primary)"><animate attributeName="height" values="8;14;8" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+16};${p.y+10};${p.y+16}" dur="0.7s" repeatCount="indefinite"/></rect>
        <rect x="${p.x + 2}" y="${p.y + 16}" width="4" height="8" fill="var(--accent-primary)"><animate attributeName="height" values="4;8;4" dur="0.5s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+20};${p.y+16};${p.y+20}" dur="0.5s" repeatCount="indefinite"/></rect>
        <rect x="${p.x + 10}" y="${p.y + 12}" width="4" height="12" fill="var(--accent-primary)"><animate attributeName="height" values="4;12;4" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+20};${p.y+12};${p.y+20}" dur="0.8s" repeatCount="indefinite"/></rect>
      ` : `
        <rect x="${p.x - 14}" y="${p.y + 20}" width="4" height="4" fill="#6b7280" />
        <rect x="${p.x - 6}" y="${p.y + 20}" width="4" height="4" fill="#6b7280" />
        <rect x="${p.x + 2}" y="${p.y + 20}" width="4" height="4" fill="#6b7280" />
        <rect x="${p.x + 10}" y="${p.y + 20}" width="4" height="4" fill="#6b7280" />
      `;

      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.style.cursor = currentTool==='select'?'grab':'pointer';
      g.setAttribute('data-node', 'STR_'+sname);
      g.setAttribute('onclick', 'window.toggleBgmPlay(event)');
      g.innerHTML = `
        <path d="M${p.x},${p.y-36} L${p.x+31},${p.y-18} L${p.x+31},${p.y+18} L${p.x},${p.y+36} L${p.x-31},${p.y+18} L${p.x-31},${p.y-18} Z" fill="rgba(255,255,255,0.02)" stroke="${statusCol}" stroke-width="${sname===pendingMic?2.5:1.5}" pointer-events="all"/>
        <text x="${p.x}" y="${p.y-18}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="700" font-size="9" fill="${statusCol}" pointer-events="none">BGM</text>
        ${spectrum}
      `;
      svg.appendChild(g);
      return;
    }
    
    if (sname === pendingMic) statusCol = 'var(--accent-warning)';
    
    const isMuted = streams[sname]?.volume === 0;
    const muteIcon = `
      <g transform="translate(${p.x + NODE_R - 8}, ${p.y - NODE_R - 8})" onmousedown="window.quickMute(event, 'STR_${sname}')" cursor="pointer">
        <circle cx="8" cy="8" r="8" fill="${isMuted ? 'var(--accent-danger)' : 'var(--bg-secondary)'}" stroke="var(--border-color)" stroke-width="1"/>
        <text x="8" y="11" text-anchor="middle" font-size="8" fill="var(--text-main)" font-family="sans-serif">${isMuted ? '🔇' : '🔊'}</text>
      </g>
    `;
    
    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = currentTool==='select'?'grab':'pointer';
    g.setAttribute('data-node', 'STR_'+sname);
    g.innerHTML = `
      <circle cx="${p.x}" cy="${p.y}" r="${NODE_R}" fill="rgba(255,255,255,0.02)" stroke="${statusCol}" stroke-width="${sname===pendingMic?2.5:1.5}"/>
      <text x="${p.x}" y="${p.y-10}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="9" fill="${statusCol}">${label}</text>
      <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="500" font-size="10" fill="${isSrcActive?'#d1d5db':'#6b7280'}">${truncate(sname,10)}</text>
      <text x="${p.x}" y="${p.y+16}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="700" font-size="8" fill="${statusCol}">${statusTxt}</text>
      ${muteIcon}`;
    svg.appendChild(g);
  });

  spks.forEach(dev => {
    const p   = customPos[dev.id];
    const off = isOffline(dev);
    const col = off ? 'var(--accent-danger)' : 'var(--accent-primary)';
    const sqR = NODE_R + 6; // Make square slightly bigger
    
    // Check if it's playing sound
    let isPlaying = false;
    if (!off && dev.assigned_streams && dev.assigned_streams.length > 0) {
      isPlaying = dev.assigned_streams.some(s => {
        if (s === 'System BGM') return window.playerState && window.playerState.playing;
        return streams[s] && streams[s].online;
      });
    }
    
    const isMuted = dev.volume === 0;
    
    let spectrum = '';
    if (isPlaying && !isMuted) {
      // Small spectrum animation below the name
      spectrum = `
        <rect x="${p.x - 12}" y="${p.y + 14}" width="4" height="6" fill="${col}"><animate attributeName="height" values="2;6;2" dur="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+18};${p.y+14};${p.y+18}" dur="0.6s" repeatCount="indefinite"/></rect>
        <rect x="${p.x - 4}" y="${p.y + 12}" width="4" height="8" fill="${col}"><animate attributeName="height" values="4;8;4" dur="0.7s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+16};${p.y+12};${p.y+16}" dur="0.7s" repeatCount="indefinite"/></rect>
        <rect x="${p.x + 4}" y="${p.y + 16}" width="4" height="4" fill="${col}"><animate attributeName="height" values="2;4;2" dur="0.5s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+18};${p.y+16};${p.y+18}" dur="0.5s" repeatCount="indefinite"/></rect>
        <rect x="${p.x + 12}" y="${p.y + 10}" width="4" height="10" fill="${col}"><animate attributeName="height" values="3;10;3" dur="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="${p.y+17};${p.y+10};${p.y+17}" dur="0.8s" repeatCount="indefinite"/></rect>
      `;
    } else if (isPlaying && isMuted) {
      spectrum = `
        <rect x="${p.x - 12}" y="${p.y + 18}" width="4" height="2" fill="#6b7280" />
        <rect x="${p.x - 4}" y="${p.y + 18}" width="4" height="2" fill="#6b7280" />
        <rect x="${p.x + 4}" y="${p.y + 18}" width="4" height="2" fill="#6b7280" />
        <rect x="${p.x + 12}" y="${p.y + 18}" width="4" height="2" fill="#6b7280" />
      `;
    }
    
    const muteIcon = `
      <g transform="translate(${p.x + sqR - 10}, ${p.y - sqR - 6})" onmousedown="window.quickMute(event, '${dev.id}')" cursor="pointer">
        <circle cx="8" cy="8" r="8" fill="${isMuted ? 'var(--accent-danger)' : 'var(--bg-secondary)'}" stroke="var(--border-color)" stroke-width="1"/>
        <text x="8" y="11" text-anchor="middle" font-size="8" fill="var(--text-main)" font-family="sans-serif">${isMuted ? '🔇' : '🔊'}</text>
      </g>
    `;

    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = currentTool==='select'?'grab':'pointer';
    g.setAttribute('data-node', dev.id);
    g.innerHTML = `
      <rect x="${p.x-sqR}" y="${p.y-sqR}" width="${sqR*2}" height="${sqR*2}" rx="8" fill="rgba(255,255,255,0.02)" stroke="${col}" stroke-width="1.5" />
      <text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="10" fill="${col}">SPK</text>
      <text x="${p.x}" y="${p.y+4}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="500" font-size="10" fill="${off?'#6b7280':'#d1d5db'}">${truncate(dev.name,12)}</text>
      ${spectrum}
      ${muteIcon}`;
    svg.appendChild(g);
  });
}

const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes dashIn { to { stroke-dashoffset: 0; } }
  @keyframes flowAnim { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
`;
document.head.appendChild(styleEl);

// ── Drag & Interaction ────────────────────────────────────────────────────────
let isDragging = false;
let dragNodeId = null;

elDiagSvg.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const target = e.target.closest('g[data-node]');
  if (target) {
    const id = target.dataset.node;
    selectDevice(id);
  }
});

elDiagSvg.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const target = e.target.closest('g[data-node]');
  if (!target) {
    pendingMic = null; 
    if(currentTool==='connect') {
       elDiagMode.textContent = 'CONNECT MODE: Click Mic, then Speaker';
       elDiagHint.textContent = 'Select a MIC source node to begin routing.';
    }
    renderDiagram();
    return;
  }
  const id = target.dataset.node;

  if (currentTool === 'select') {
    isDragging = true;
    dragNodeId = id;
  } else if (currentTool === 'connect') {
    if (id.startsWith('STR_')) {
      pendingMic = id.slice(4);
      elDiagMode.textContent = 'CONNECT MODE: Select Speaker Destination';
      elDiagHint.textContent = 'Now click a SPEAKER node to route audio.';
      renderDiagram();
    } else {
      if (pendingMic) onSpkClick(id);
    }
  }
});

elDiagSvg.addEventListener('mousemove', (e) => {
  if (isDragging && dragNodeId && currentTool === 'select') {
    const pt = elDiagSvg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(elDiagSvg.getScreenCTM().inverse());
    customPos[dragNodeId] = { x: svgP.x, y: svgP.y };
    renderDiagram();
  }
});

const stopDrag = () => {
  if (isDragging) {
    isDragging = false;
    dragNodeId = null;
    localStorage.setItem('airlink_pos', JSON.stringify(customPos));
  }
};
elDiagSvg.addEventListener('mouseup', stopDrag);
elDiagSvg.addEventListener('mouseleave', stopDrag);

function truncate(s,n) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

// ── logic wrappers ────────────────────────────────────────────────────────────

function onStreamClick(sname) {
  setTool('connect');
  pendingMic = sname;
  elDiagMode.textContent = 'CONNECT MODE: Select Speaker Destination';
  elDiagHint.textContent = 'Now click a SPEAKER node to route audio.';
  renderDiagram();
}

function onSpkClick(id) {
  if (isOffline(devices[id])) return;
  if (pendingMic) {
    const spk = devices[id];
    const current = new Set(spk.assigned_streams||[]);
    current.add(pendingMic);
    fetch('/device/'+id+'/streams', {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ streams: Array.from(current) })
    }).then(() => {
      if (devices[id]) devices[id].assigned_streams = Array.from(current);
      pendingMic = null;
      elDiagMode.textContent = 'IDLE';
      elDiagHint.textContent = 'Click a MIC, then click a SPEAKER to route.';
      renderDiagram();
      if (selectedId === id) renderDetail();
    });
  } else {
    selectDevice(id);
  }
}

function disconnectRoute(streamName, spkId) {
  const spk = devices[spkId];
  if (!spk) return;
  const newStreams = (spk.assigned_streams||[]).filter(s => s !== streamName);
  fetch('/device/'+spkId+'/streams', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ streams: newStreams })
  }).then(() => {
    if (devices[spkId]) devices[spkId].assigned_streams = newStreams;
    renderDiagram();
  });
}

let selectedPopupId = null;

window.toggleBgmPlay = function(e) {

function selectDevice(id) {
  if (id === 'STR_System BGM') return;
  
  const dName = id.startsWith('STR_') ? id.replace('STR_','') : null;
  const isMic = !!dName;
  let initialVol = 1.0;
  if (isMic) {
    if (dName === 'System BGM' && devices['bgm-server-player']) initialVol = devices['bgm-server-player'].volume;
    else initialVol = streams[dName]?.volume ?? 1.0;
  }

  const dev = isMic ? { 
    id, name: dName, role: 'mic', volume: initialVol, 
    status: streams[dName]?.online ? 'online' : 'offline', assigned_streams: [] 
  } : devices[id];
  if (!dev) return;

  selectedPopupId = id;
  const popup = document.getElementById('devicePopup');
  const p = customPos[id];
  if (!p) return;
  
  // calculate center of screen vs node
  const svgRect = elDiagSvg.getBoundingClientRect();
  let left = p.x + 30; // offset right
  if (left + 280 > svgRect.width) left = p.x - 310; // flip left if offscreen
  
  popup.style.left = left + 'px';
  popup.style.top = (p.y - 40) + 'px';
  popup.style.display = 'flex';
  
  const off = isOffline(dev);
  
  popup.innerHTML = `
    <div class="np-header">
      <div style="flex:1; min-width:0; margin-right:8px;">
        <div class="np-title">${dev.name}</div>
        <span class="np-role ${roleClass(dev.role)}">${dev.role}</span>
        <span style="font-size:0.7rem; color:${off?'var(--accent-danger)':'var(--accent-success)'}; margin-left:6px; font-weight:600;">${off?'OFFLINE':'ONLINE'}</span>
      </div>
      <button class="np-close" onclick="closePopup()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    
    <div class="np-vol-row" ${dName === 'System BGM' ? 'style="display:none;"' : ''}>
      <input type="range" id="popVol" min="0" max="1" step="0.05" value="${dev.volume}">
      <span class="np-vol-val" id="popVolVal">${(dev.volume*100).toFixed(0)}%</span>
      <button id="popMute" style="padding:4px 8px; font-size:0.75rem; border-radius:4px; border:1px solid var(--border-color); background:${dev.volume===0?'var(--accent-danger)':'transparent'}; color:var(--text-main); cursor:pointer;">MUTE</button>
    </div>
    
    <button class="np-btn-remove" id="popRemove">Delete Device Data</button>
  `;

  let volT = null;
  const sl = document.getElementById('popVol');
  const vd = document.getElementById('popVolVal');
  const bm = document.getElementById('popMute');
  let lastVol = dev.volume > 0 ? dev.volume : 1.0;

  function pushVol(v) {
    vd.textContent = (v*100).toFixed(0)+'%';
    bm.style.background = v===0 ? 'var(--accent-danger)' : 'transparent';
    if (isMic) {
      if (streams[dName]) streams[dName].volume = v;
      if (dName === 'System BGM' && devices['bgm-server-player']) devices['bgm-server-player'].volume = v;
      // We send this to backend (although backend handles it loosely, sender will apply it)
      clearTimeout(volT);
      volT = setTimeout(() => {
        fetch('/device/'+dName+'/volume', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({volume:v}) }).catch(e=>{});
      }, 150);
    } else {
      if (devices[id]) devices[id].volume = v;
      clearTimeout(volT);
      volT = setTimeout(() => {
        fetch('/device/'+id+'/volume', {
          method:'PATCH', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({volume:v})
        });
      }, 150);
    }
  }

  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    if (v > 0) lastVol = v;
    pushVol(v);
  });

  bm.addEventListener('click', () => {
    const isMuted = isMic ? (streams[dName]?.volume === 0) : (devices[id].volume === 0);
    const newVol = isMuted ? lastVol : 0;
    sl.value = newVol;
    pushVol(newVol);
  });

  document.getElementById('popRemove').addEventListener('click', () => {
    if (isMic) {
      delete streams[dName];
      closePopup();
      renderDiagram();
    } else {
      fetch('/device/'+id, {method:'DELETE'}).then(() => {
        closePopup();
        delete devices[id];
        renderDiagram();
      });
    }
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function setWs(state) {
  const m = {ok:['ws-badge ws-ok','Connected'],err:['ws-badge ws-err','Offline'],wait:['ws-badge ws-wait','Connecting...']};
  const [cls,txt] = m[state]||m.wait;
  elWsBadge.className=cls; elWsBadge.textContent=txt;
}

let pingInt;
function connectWS() {
  setWs('wait');
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { 
    setWs('ok'); 
    log('WebSocket connected');
    clearInterval(pingInt);
    pingInt = setInterval(() => {
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'ping', ts: Date.now() }));
        if (myDeviceId) ws.send(JSON.stringify({ type: 'heartbeat', device_id: myDeviceId }));
      }
    }, 1000);
  };
  ws.onclose = () => { 
    setWs('err'); 
    log('WebSocket disconnected. Reconnecting...', 'err');
    clearInterval(pingInt);
    setTimeout(connectWS,3000); 
  };
  ws.onerror = () => {
    log('WebSocket error', 'err');
    ws.close();
  };
  ws.onmessage = (e) => {
    let msg; try { msg=JSON.parse(e.data); } catch { return; }
    if (msg.type === 'pong') return;
    log('WS Rx: ' + msg.type);
    applyEvent(msg);
  };
}

function applyEvent(msg) {
  switch(msg.type) {
    case 'snapshot':
      const newIds = new Set((msg.devices||[]).map(d=>d.id));
      Object.keys(devices).forEach(id => { if(!newIds.has(id)) delete devices[id]; });
      (msg.devices||[]).forEach(d=>{ if(!devices[d.id]) devices[d.id]=d; else Object.assign(devices[d.id],d); });
      
      const newStreams = new Set(msg.streams||[]);
      Object.keys(streams).forEach(s => { if(!newStreams.has(s)) delete streams[s]; });
      (msg.streams||[]).forEach(s=>{ if(!streams[s]) streams[s]={online:true, volume:1.0}; else streams[s].online=true; }); 
      
      if (myDeviceId) {
        const me = (msg.devices||[]).find(d=>d.id===myDeviceId);
        if (me) {
          const newAssigned = me.assigned_streams || [];
          newAssigned.forEach(s => { if (!activeMonitors[s]) startMonitor(s); });
          Object.keys(activeMonitors).forEach(s => { if (!newAssigned.includes(s)) stopMonitor(s); });
        }
      }
      
      if (devices['bgm-server-player']) {
        const vol = devices['bgm-server-player'].volume;
        const v = document.getElementById('bgmVolume');
        if (document.activeElement !== v) {
          v.value = vol;
          document.getElementById('bgmVolumePct').textContent = Math.round(vol * 100) + '%';
        }
        const powerBtn = document.getElementById('btnPower');
        if (vol === 0) powerBtn.classList.remove('active');
        else powerBtn.classList.add('active');
      }
      break;
    case 'device_joined': 
      if(msg.device) {
        if(!devices[msg.device.id]) devices[msg.device.id]=msg.device; else Object.assign(devices[msg.device.id],msg.device);
        if(msg.device.id !== myDeviceId) showToast(`New Speaker joined: ${msg.device.name}`);
      }
      break;
    case 'device_updated':
      if (msg.device) {
        if(!devices[msg.device.id]) devices[msg.device.id]=msg.device; else Object.assign(devices[msg.device.id],msg.device);
        
        if (msg.device.id === 'bgm-server-player') {
          const v = document.getElementById('bgmVolume');
          if (document.activeElement !== v) {
            v.value = msg.device.volume;
            document.getElementById('bgmVolumePct').textContent = Math.round(msg.device.volume * 100) + '%';
          }
          const powerBtn = document.getElementById('btnPower');
          if (msg.device.volume === 0) powerBtn.classList.remove('active');
          else powerBtn.classList.add('active');
        }
        
        if (selectedPopupId === msg.device.id || selectedPopupId === 'STR_' + msg.device.id) {
          const pVol = document.getElementById('popVol');
          if (pVol && document.activeElement !== pVol) {
            pVol.value = msg.device.volume;
            document.getElementById('popVolVal').textContent = Math.round(msg.device.volume * 100) + '%';
            const pMute = document.getElementById('popMute');
            if (pMute) pMute.style.background = msg.device.volume === 0 ? 'var(--accent-danger)' : 'transparent';
          }
        }
      }
      break;
    case 'device_left':   
      if(devices[msg.id]) devices[msg.id].status = 'Offline';
      if(selectedPopupId===msg.id) closePopup(); 
      break;
    case 'stream_added':  
      if(!streams[msg.name]) {
        streams[msg.name] = {online:true, volume:1.0}; 
        showToast(`New Mic active: ${msg.name}`, true);
      } else streams[msg.name].online = true;
      break;
    case 'stream_removed':
      if (streams[msg.name]) streams[msg.name].online = false; 
      if (pendingMic===msg.name) pendingMic=null; 
      break;
    case 'volume_changed': 
      if(devices[msg.device_id]) {
        devices[msg.device_id].volume = msg.volume; 
        
        if (msg.device_id === 'bgm-server-player') {
          const v = document.getElementById('bgmVolume');
          if (document.activeElement !== v) {
            v.value = msg.volume;
            document.getElementById('bgmVolumePct').textContent = Math.round(msg.volume * 100) + '%';
          }
          const powerBtn = document.getElementById('btnPower');
          if (msg.volume === 0) powerBtn.classList.remove('active');
          else powerBtn.classList.add('active');
        }
        
        if (selectedPopupId === msg.device_id || selectedPopupId === 'STR_' + msg.device_id) {
          const pVol = document.getElementById('popVol');
          if (pVol && document.activeElement !== pVol) {
            pVol.value = msg.volume;
            document.getElementById('popVolVal').textContent = Math.round(msg.volume * 100) + '%';
            const pMute = document.getElementById('popMute');
            if (pMute) pMute.style.background = msg.volume === 0 ? 'var(--accent-danger)' : 'transparent';
          }
        }
      }
      
      if (msg.device_id === myDeviceId && monitorMaster) {
        monitorMaster.gain.value = msg.volume;
      }
      // Do not re-render popup on volume_changed to avoid interrupting sliding
      break;
    case 'route_changed':
      if (devices[msg.speaker_id]) {
        const d=devices[msg.speaker_id];
        if (msg.connected) { if(!d.assigned_streams.includes(msg.source)) d.assigned_streams.push(msg.source); }
        else d.assigned_streams=d.assigned_streams.filter(s=>s!==msg.source);
      }
      if (msg.speaker_id === myDeviceId) {
        if (msg.connected) startMonitor(msg.source);
        else stopMonitor(msg.source);
      }
      break;
  }
  renderDiagram();
  if (selectedPopupId && !devices[selectedPopupId]) closePopup();
}

function formatTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

async function fetchPlayerState() {
  try {
    const res = await fetch('/api/player/state');
    if (!res.ok) return;
    const data = await res.json();
    
    window.playerState = data;
    
    if (data.playlist.length === 0) {
      document.getElementById('playerTitle').textContent = 'No Track Selected';
      document.getElementById('playerStatus').textContent = '0 tracks in queue';
      document.getElementById('bgmTimeline').value = 0;
      document.getElementById('timeCurrent').textContent = "0:00";
      document.getElementById('timeTotal').textContent = "0:00";
    } else {
      const track = data.playlist[data.current_idx];
      document.getElementById('playerTitle').textContent = track ? track.name : 'Unknown';
      document.getElementById('playerStatus').textContent = `${data.current_idx + 1} of ${data.playlist.length} tracks`;
      
      if (track) {
        document.getElementById('timeCurrent').textContent = formatTime(data.position_sec);
        document.getElementById('timeTotal').textContent = formatTime(track.duration_sec);
        const max = track.duration_sec || 1;
        document.getElementById('bgmTimeline').max = max;
        // Don't update slider if user is dragging it
        if (document.activeElement !== document.getElementById('bgmTimeline')) {
          document.getElementById('bgmTimeline').value = data.position_sec;
        }
      }
      
      // Render queue
      if (document.getElementById('queuePopup').style.display === 'flex') {
        renderQueue(data.playlist, data.current_idx);
      }
    }
    
    const icon = data.playing 
      ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`
      : `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
    document.getElementById('btnPlayPause').innerHTML = icon;
    
    // Status dot indicates connection to server player
    document.getElementById('playerWsDot').style.background = 'var(--accent-success)';
    
    if (data.loop_queue) {
       document.getElementById('btnRepeat').classList.add('active-state');
    } else {
       document.getElementById('btnRepeat').classList.remove('active-state');
    }
    
    if (data.shuffle) {
       document.getElementById('btnShuffle').classList.add('active-state');
    } else {
       document.getElementById('btnShuffle').classList.remove('active-state');
    }

    const isMuted = devices['bgm-server-player'] && devices['bgm-server-player'].volume === 0;
    const powerBtn = document.getElementById('btnPower');
    if (isMuted) {
      powerBtn.classList.remove('active');
    } else {
      powerBtn.classList.add('active');
    }
    
    if (devices['bgm-server-player']) {
      const vol = devices['bgm-server-player'].volume;
      const v = document.getElementById('bgmVolume');
      if (document.activeElement !== v) {
        v.value = vol;
        document.getElementById('bgmVolumePct').textContent = Math.round(vol * 100) + '%';
      }
    }
  } catch (e) {
    document.getElementById('playerWsDot').style.background = 'var(--text-muted)';
  }
}

async function sendPlayerCommand(action, value = null) {
  try {
    const body = { action };
    if (action === 'seek') body.time = parseFloat(value);
    if (action === 'seek_track' || action === 'remove_track') body.index = parseInt(value);
    if (action === 'move_up') { body.action = 'move_track'; body.index = parseInt(value); body.to_index = body.index - 1; }
    if (action === 'move_down') { body.action = 'move_track'; body.index = parseInt(value); body.to_index = body.index + 1; }
    
    await fetch('/api/player/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    setTimeout(fetchPlayerState, 100);
  } catch(e) {}
}

// ── Local Monitor WebAudio ───────────────────────────────────────────────────
window.activeMonitors = {};
let monitorCtx = null;
let monitorMaster = null;

document.addEventListener('click', () => {
  if (monitorCtx && monitorCtx.state === 'suspended') {
    monitorCtx.resume();
  }
});

async function startMonitor(streamName) {
  if (window.activeMonitors[streamName]) return;
  
  if (!monitorCtx) {
    monitorCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
    monitorMaster = monitorCtx.createGain();
    monitorMaster.connect(monitorCtx.destination);
    monitorMaster.gain.value = 1.0;
  }
  try {
    if (monitorCtx.state === 'suspended') await monitorCtx.resume();
  } catch(e) {}
  
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${proto}://${location.host}/ws/receiver/${encodeURIComponent(streamName)}`);
  socket.binaryType = 'arraybuffer';
  
  const gain = monitorCtx.createGain();
  gain.gain.value = 1.0; 
  gain.connect(monitorMaster);
  
  window.activeMonitors[streamName] = { socket, gain };
  let nextPlayTime = 0;
  
  socket.onopen = () => showToast(`Monitoring: ${streamName}`, true);
  
  socket.onmessage = (e) => {
    if (monitorCtx.state === 'suspended') return;
    const f32 = new Float32Array(e.data);
    const frames = f32.length / 2;
    const buffer = monitorCtx.createBuffer(2, frames, 48000);
    const left = buffer.getChannelData(0);
    const right = buffer.getChannelData(1);
    
    for (let i = 0; i < frames; i++) {
      left[i] = f32[i*2];
      right[i] = f32[i*2+1];
    }
    
    const src = monitorCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(gain);
    
    const currentTime = monitorCtx.currentTime;
    if (nextPlayTime < currentTime) {
      nextPlayTime = currentTime + 0.25; // 250ms buffer
    }
    src.start(nextPlayTime);
    nextPlayTime += buffer.duration;
  };
  
  socket.onclose = () => {
    stopMonitor(streamName);
  };
}

function stopMonitor(streamName) {
  if (window.activeMonitors[streamName]) {
    window.activeMonitors[streamName].socket.close();
    if (window.activeMonitors[streamName].gain) {
      window.activeMonitors[streamName].gain.disconnect();
    }
    delete window.activeMonitors[streamName];
  }
}

async function initController() {
  try {
    log('Registering controller device...');
    await fetch('/device/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id: myDeviceId, name: 'Local Speaker', role: 'speaker' })
    });
    log('Controller device registered successfully.');
  } catch(e) {
    log('Failed to register controller device: ' + e.message, 'err');
  }
  fetchPlayerState();
  setInterval(fetchPlayerState, 5000);
  connectWS();
}
initController();
</script>
