<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z // MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --neon-purple: #bf00ff;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(191,0,255,0.06);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
      --accent: var(--neon-purple);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050608;color:var(--text-main);font-family:var(--font-ui);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    body::after{content:" ";display:block;position:fixed;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),linear-gradient(90deg,rgba(255,0,0,0.05),rgba(0,255,0,0.02),rgba(0,0,255,0.05));background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;}
    .grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:30px 30px;}
    .hud{display:flex;flex-direction:column;height:100dvh;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));gap:8px;}

    /* Header */
    .header-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--bg-panel);border:1px solid var(--neon-purple);border-left:4px solid var(--neon-purple);clip-path:var(--clip-a);box-shadow:0 0 12px rgba(191,0,255,0.18);flex-shrink:0;}
    .brand h1{font-size:1.4rem;letter-spacing:3px;color:var(--neon-purple);text-transform:uppercase;line-height:1;}
    .brand span{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:0.8rem;}
    .role-badge{padding:3px 10px;border:1px solid var(--neon-purple);color:var(--neon-purple);font-size:0.7rem;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .nav-link{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);text-decoration:none;padding:3px 8px;border:1px solid rgba(0,240,255,0.2);}
    .nav-link:hover{color:var(--neon-cyan);border-color:var(--neon-cyan);}
    .ws-pill{font-family:var(--font-mono);font-size:0.68rem;padding:2px 8px;border:1px solid rgba(191,0,255,0.3);color:var(--text-muted);}
    .ws-pill.live{border-color:var(--neon-green);color:var(--neon-green);}

    /* Three-panel layout */
    .core{display:flex;flex:1;gap:8px;min-height:0;}

    /* Left: Device list */
    .panel-left{width:260px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex-shrink:0;}
    .panel{background:var(--bg-panel);border:1px solid rgba(191,0,255,0.18);padding:12px;clip-path:var(--clip-a);}
    .panel-hdr{font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-purple);text-transform:uppercase;border-bottom:1px dashed rgba(191,0,255,0.25);padding-bottom:5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
    .device-list{display:flex;flex-direction:column;gap:5px;}
    .dev-card{border:1px solid rgba(191,0,255,0.2);padding:8px 10px;cursor:pointer;clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);transition:background 0.15s,border-color 0.15s;}
    .dev-card:hover{background:rgba(191,0,255,0.07);border-color:rgba(191,0,255,0.5);}
    .dev-card.selected{background:rgba(191,0,255,0.12);border-color:var(--neon-purple);}
    .dev-card-row{display:flex;align-items:center;gap:6px;}
    .dev-name{font-family:var(--font-mono);font-size:0.8rem;color:var(--text-main);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .role-chip{font-family:var(--font-mono);font-size:0.58rem;padding:1px 5px;border:1px solid;clip-path:polygon(3px 0,100% 0,100% calc(100% - 3px),calc(100% - 3px) 100%,0 100%,0 3px);}
    .role-chip.mic{color:var(--neon-orange);border-color:var(--neon-orange);}
    .role-chip.speaker{color:var(--neon-cyan);border-color:var(--neon-cyan);}
    .role-chip.manager{color:var(--neon-purple);border-color:var(--neon-purple);}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
    .status-dot.online{background:var(--neon-green);box-shadow:0 0 5px var(--neon-green);}
    .status-dot.live{background:var(--neon-yellow);box-shadow:0 0 5px var(--neon-yellow);}
    .dev-streams-count{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);margin-top:2px;}
    .btn-remove{flex:0;background:transparent;border:1px solid rgba(255,0,60,0.3);color:rgba(255,0,60,0.6);padding:2px 6px;font-family:var(--font-mono);font-size:0.6rem;cursor:pointer;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);transition:all 0.15s;}
    .btn-remove:hover{border-color:var(--neon-magenta);color:var(--neon-magenta);background:rgba(255,0,60,0.08);}
    .no-devices{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);padding:8px 0;}

    /* Center: SVG Diagram */
    .diagram-wrap{flex:1;position:relative;background:radial-gradient(circle at center,rgba(191,0,255,0.04) 0%,transparent 60%),#000;border:1px solid rgba(191,0,255,0.15);clip-path:var(--clip-b);overflow:hidden;}
    .diagram-hint{position:absolute;bottom:10px;left:14px;font-family:var(--font-mono);font-size:0.65rem;color:rgba(191,0,255,0.5);pointer-events:none;}
    svg#diagram{width:100%;height:100%;}

    /* Right: Device controls */
    .panel-right{width:240px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex-shrink:0;}
    button{background:transparent;color:var(--text-main);border:1px solid rgba(191,0,255,0.35);padding:7px 10px;font-family:var(--font-mono);font-size:0.75rem;text-transform:uppercase;cursor:pointer;transition:all 0.15s;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);width:100%;}
    button:hover{background:rgba(191,0,255,0.1);border-color:var(--neon-purple);color:var(--neon-purple);}
    button:active{transform:scale(0.97);}
    button.primary{border-color:var(--neon-purple);color:var(--neon-purple);background:rgba(191,0,255,0.04);}
    button.primary:hover{background:var(--neon-purple);color:#fff;}
    button.danger{border-color:var(--neon-magenta);color:var(--neon-magenta);}
    button.danger:hover{background:var(--neon-magenta);color:#000;}
    button:disabled{opacity:0.3;cursor:not-allowed;}
    .vol-row{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin:6px 0;}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-purple);cursor:pointer;}
    .vol-val{min-width:36px;text-align:right;color:var(--neon-yellow);}
    .stream-check-list{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto;}
    .stream-check{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.72rem;cursor:pointer;padding:3px 0;}
    .stream-check input[type=checkbox]{accent-color:var(--neon-purple);width:13px;height:13px;flex-shrink:0;cursor:pointer;}
    .dk{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;}
    .dv{font-family:var(--font-mono);font-size:0.78rem;color:var(--neon-yellow);}
    .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
    .empty-panel{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);padding:16px 0;text-align:center;line-height:1.8;}
    .sep{height:1px;background:rgba(191,0,255,0.15);margin:6px 0;}

    /* Terminal log */
    .terminal{font-family:var(--font-mono);font-size:0.65rem;color:var(--neon-green);background:rgba(0,255,65,0.04);border:1px solid rgba(0,255,65,0.12);padding:7px;height:90px;overflow-y:auto;clip-path:var(--clip-b);flex-shrink:0;}
    .lg{margin-bottom:2px;word-break:break-all;}
    .lt{color:var(--text-muted);margin-right:4px;}
    .le{color:var(--neon-magenta);}
    .lw{color:var(--neon-yellow);}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    /* Responsive */
    @media(max-width:900px){
      .panel-left{width:200px;}
      .panel-right{width:200px;}
    }
    @media(max-width:680px){
      .core{flex-direction:column;}
      .panel-left,.panel-right{width:100%;flex:0 0 auto;max-height:220px;}
      .diagram-wrap{min-height:35vh;}
    }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>Audio_Sync_MGR</h1>
      <span>// MANAGER — Y4Z.DEV</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">▶ Sender</a>
      <a class="nav-link" href="/receiver">▶ Receiver</a>
      <span class="role-badge">MANAGER</span>
      <span class="ws-pill" id="wsPill">WS: CONNECTING</span>
    </div>
  </header>

  <main class="core">
    <!-- LEFT: device list -->
    <aside class="panel-left">
      <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0;">
        <div class="panel-hdr">
          <span>[01] Devices</span>
          <span id="devCount" style="color:var(--text-muted);">0</span>
        </div>
        <div id="deviceList" class="device-list">
          <div class="no-devices" id="noDevices">No devices connected.</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span>[02] Streams</span><span id="streamCount" style="color:var(--text-muted);">0</span></div>
        <div id="streamListLeft" style="display:flex;flex-direction:column;gap:4px;">
          <div style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);" id="noStreamsLeft">No streams.</div>
        </div>
      </div>
    </aside>

    <!-- CENTER: SVG diagram -->
    <section class="diagram-wrap">
      <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="diagram-hint" id="diagramHint">Click a MIC node, then a SPEAKER node to connect. Click a route line to disconnect.</div>
    </section>

    <!-- RIGHT: device controls -->
    <aside class="panel-right">
      <div class="panel" style="flex:1;">
        <div class="panel-hdr"><span>[03] Device Controls</span></div>
        <div id="controlPanel">
          <div class="empty-panel">Select a device<br>to see controls.</div>
        </div>
      </div>
      <div class="terminal" id="logBox"></div>
    </aside>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
const state = {
  devices:  {},   // id -> DeviceInfo
  streams:  [],   // string[]
  selected: null, // device id
  pending:  null, // device id of the mic waiting to be connected
};

// ─────────────────────────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────────────────────────
let ws = null;
function connectWs() {
  if (ws && ws.readyState < 2) return;
  ws = new WebSocket('wss://' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('wsPill').textContent = 'WS: LIVE';
    document.getElementById('wsPill').classList.add('live');
    log('WS connected.');
  };
  ws.onclose = () => {
    document.getElementById('wsPill').textContent = 'WS: OFFLINE';
    document.getElementById('wsPill').classList.remove('live');
    setTimeout(connectWs, 3000);
  };
  ws.onerror = () => { document.getElementById('wsPill').textContent = 'WS: ERROR'; };
  ws.onmessage = (ev) => {
    try { handleEvent(JSON.parse(ev.data)); } catch {}
  };
}

function handleEvent(msg) {
  switch (msg.type) {
    case 'snapshot':
      // Bulk load on connect
      state.streams = msg.streams || [];
      (msg.devices || []).forEach(d => { state.devices[d.id] = d; });
      renderAll();
      log('Snapshot: ' + Object.keys(state.devices).length + ' devices, ' + state.streams.length + ' streams.');
      break;
    case 'device_joined':
      state.devices[msg.device.id] = msg.device;
      renderDeviceList();
      renderDiagram();
      renderStreamListLeft();
      log('Device joined: ' + msg.device.name + ' [' + msg.device.role + ']');
      break;
    case 'device_left':
      delete state.devices[msg.id];
      if (state.selected === msg.id) { state.selected = null; renderControlPanel(); }
      renderDeviceList();
      renderDiagram();
      log('Device left: ' + msg.id.slice(0,8), 'warn');
      break;
    case 'stream_added':
      if (!state.streams.includes(msg.name)) state.streams.push(msg.name);
      renderStreamListLeft();
      renderDiagram();
      renderControlPanel();
      log('Stream added: ' + msg.name);
      break;
    case 'stream_removed':
      state.streams = state.streams.filter(s => s !== msg.name);
      renderStreamListLeft();
      renderDiagram();
      renderControlPanel();
      log('Stream removed: ' + msg.name, 'warn');
      break;
    case 'route_changed':
      // Update local device state
      const dev = state.devices[msg.speaker_id];
      if (dev) {
        if (msg.connected && !dev.assigned_streams.includes(msg.source)) {
          dev.assigned_streams.push(msg.source);
        } else if (!msg.connected) {
          dev.assigned_streams = dev.assigned_streams.filter(s => s !== msg.source);
        }
      }
      renderDiagram();
      renderControlPanel();
      break;
    case 'volume_changed':
      if (state.devices[msg.device_id]) state.devices[msg.device_id].volume = msg.volume;
      if (state.selected === msg.device_id) renderControlPanel();
      break;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────────────────────────────────────
function renderAll() {
  renderDeviceList();
  renderStreamListLeft();
  renderDiagram();
  renderControlPanel();
}

// Device list (left panel)
function renderDeviceList() {
  const list = document.getElementById('deviceList');
  const ph   = document.getElementById('noDevices');
  const devs = Object.values(state.devices);
  document.getElementById('devCount').textContent = devs.length;

  // Remove cards for departed devices
  list.querySelectorAll('.dev-card').forEach(el => {
    if (!state.devices[el.dataset.id]) el.remove();
  });

  if (devs.length === 0) {
    if (!ph) {
      const d = document.createElement('div');
      d.id = 'noDevices'; d.className = 'no-devices'; d.textContent = 'No devices connected.';
      list.appendChild(d);
    }
    return;
  }
  if (ph) ph.remove();

  devs.forEach(dev => {
    let card = list.querySelector('[data-id="' + dev.id + '"]');
    if (!card) {
      card = document.createElement('div');
      card.className = 'dev-card';
      card.dataset.id = dev.id;
      card.addEventListener('click', () => selectDevice(dev.id));
      list.appendChild(card);
    }
    if (state.selected === dev.id) card.classList.add('selected');
    else card.classList.remove('selected');
    const statusCls = dev.status === 'live' ? 'live' : dev.status === 'online' ? 'online' : '';
    const assignedCount = (dev.assigned_streams || []).length;
    card.innerHTML = `
      <div class="dev-card-row">
        <span class="status-dot ${statusCls}"></span>
        <span class="dev-name">${escHtml(dev.name)}</span>
        <span class="role-chip ${dev.role}">${dev.role.toUpperCase()}</span>
        <button class="btn-remove" onclick="event.stopPropagation();removeDevice('${dev.id}')" title="Remove device">✕</button>
      </div>
      <div class="dev-streams-count">${dev.role === 'speaker' ? assignedCount + ' stream(s) assigned' : dev.role === 'mic' ? 'source' : 'manager'}</div>
    `;
  });
}

// Stream list (left panel, [02])
function renderStreamListLeft() {
  const el = document.getElementById('streamListLeft');
  document.getElementById('streamCount').textContent = state.streams.length;
  el.innerHTML = '';
  if (state.streams.length === 0) {
    el.innerHTML = '<div id="noStreamsLeft" style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);">No streams.</div>';
    return;
  }
  state.streams.forEach(s => {
    const d = document.createElement('div');
    d.style.cssText = 'font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-orange);display:flex;align-items:center;gap:6px;';
    d.innerHTML = `<span style="color:var(--neon-orange);font-size:0.7rem;">◈</span><span>${escHtml(s)}</span>`;
    el.appendChild(d);
  });
}

// Control panel (right panel)
function renderControlPanel() {
  const el = document.getElementById('controlPanel');
  if (!state.selected || !state.devices[state.selected]) {
    el.innerHTML = '<div class="empty-panel">Select a device<br>to see controls.</div>';
    return;
  }
  const dev = state.devices[state.selected];
  const volPct = Math.round((dev.volume || 1.0) * 100);

  let streamsHtml = '';
  if (dev.role === 'speaker') {
    const assigned = dev.assigned_streams || [];
    streamsHtml = `
      <div class="sep"></div>
      <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;">Assign Streams</div>
      <div class="stream-check-list" id="streamChecks">
        ${ state.streams.length === 0
            ? '<div style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);">No streams available.</div>'
            : state.streams.map(s => `
              <label class="stream-check">
                <input type="checkbox" ${assigned.includes(s) ? 'checked' : ''}
                  onchange="toggleStream('${dev.id}','${s}',this.checked)">
                <span>${escHtml(s)}</span>
              </label>`).join('')
        }
      </div>
    `;
  }

  el.innerHTML = `
    <div class="data-grid">
      <div><div class="dk">NAME</div><div class="dv" style="font-size:0.72rem;">${escHtml(dev.name)}</div></div>
      <div><div class="dk">ROLE</div><div class="dv" style="text-transform:uppercase;">${dev.role}</div></div>
      <div><div class="dk">STATUS</div><div class="dv" style="text-transform:uppercase;">${dev.status}</div></div>
      <div><div class="dk">STREAMS</div><div class="dv">${(dev.assigned_streams||[]).length}</div></div>
    </div>
    <div class="sep"></div>
    <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;">Master Volume</div>
    <div class="vol-row">
      <input type="range" min="0" max="200" value="${volPct}" id="masterVolSlider"
        oninput="document.getElementById('masterVolVal').textContent=this.value+'%'">
      <span class="vol-val" id="masterVolVal">${volPct}%</span>
    </div>
    <button class="primary" style="margin-top:4px;" onclick="applyVolume('${dev.id}')">⬆ Set Volume</button>
    ${streamsHtml}
    <div class="sep"></div>
    <button class="danger" onclick="removeDevice('${dev.id}')">✕ Remove Device</button>
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// SVG Diagram
// ─────────────────────────────────────────────────────────────────────────────
function renderDiagram() {
  const svg  = document.getElementById('diagram');
  const W    = svg.clientWidth  || 600;
  const H    = svg.clientHeight || 400;
  svg.innerHTML = '';

  const mics     = Object.values(state.devices).filter(d => d.role === 'mic');
  const speakers = Object.values(state.devices).filter(d => d.role === 'speaker');

  const ns   = 'http://www.w3.org/2000/svg';
  const NODE = 52;    // node diameter
  const PR   = 22;    // server node radius
  const PAD  = 20;    // edge padding

  function mkText(parent, x, y, txt, col, sz) {
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', x); t.setAttribute('y', y);
    t.setAttribute('fill', col || '#d1d5db');
    t.setAttribute('font-family', 'Share Tech Mono, monospace');
    t.setAttribute('font-size', sz || 10);
    t.setAttribute('text-anchor', 'middle');
    t.textContent = txt;
    parent.appendChild(t); return t;
  }
  function mkCircle(parent, cx, cy, r, stroke, fill, sw) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy);
    c.setAttribute('r', r);   c.setAttribute('stroke', stroke || '#444');
    c.setAttribute('fill', fill || 'none');
    c.setAttribute('stroke-width', sw || 1.5);
    parent.appendChild(c); return c;
  }
  function mkLine(parent, x1, y1, x2, y2, col, sw, id) {
    const l = document.createElementNS(ns, 'line');
    l.setAttribute('x1', x1); l.setAttribute('y1', y1);
    l.setAttribute('x2', x2); l.setAttribute('y2', y2);
    l.setAttribute('stroke', col || '#444'); l.setAttribute('stroke-width', sw || 1.5);
    if (id) l.setAttribute('data-route', id);
    parent.appendChild(l); return l;
  }

  // Server node (center)
  const cx = W / 2;
  const cy = H / 2;
  const srvGrp = document.createElementNS(ns, 'g');
  mkCircle(srvGrp, cx, cy, PR + 8, 'rgba(191,0,255,0.4)', 'rgba(191,0,255,0.08)', 1);
  mkCircle(srvGrp, cx, cy, PR,     '#bf00ff',              'rgba(10,4,20,0.9)',    2);
  mkText(srvGrp, cx, cy + 4, 'SRV', '#bf00ff', 10);
  svg.appendChild(srvGrp);

  // Mic nodes (left column)
  const micNodePos = {};
  const micColX    = PAD + NODE / 2;
  const micSpacing = mics.length > 0 ? Math.min(80, (H - PAD * 2) / mics.length) : 80;
  const micStartY  = cy - ((mics.length - 1) * micSpacing) / 2;

  mics.forEach((dev, i) => {
    const nx = micColX;
    const ny = micStartY + i * micSpacing;
    micNodePos[dev.id] = { x: nx, y: ny };

    const grp = document.createElementNS(ns, 'g');
    grp.style.cursor = 'pointer';
    grp.dataset.devId = dev.id;
    grp.dataset.role  = 'mic';

    const isPending = state.pending === dev.id;
    mkCircle(grp, nx, ny, NODE/2 - 4, isPending ? '#fcee0a' : '#ff8800',
      isPending ? 'rgba(252,238,10,0.12)' : 'rgba(255,136,0,0.06)', isPending ? 2.5 : 1.5);
    if (isPending) {
      mkCircle(grp, nx, ny, NODE/2,    'rgba(252,238,10,0.3)', 'none', 1);
    }

    // Truncate name
    const label = dev.name.length > 10 ? dev.name.slice(0,9)+'…' : dev.name;
    mkText(grp, nx, ny + 3,  label,  isPending ? '#fcee0a' : '#ff8800', 9);
    mkText(grp, nx, ny + 16, 'MIC',  '#6b7280', 7);

    grp.addEventListener('click', () => onNodeClick(dev, 'mic'));
    svg.appendChild(grp);

    // Ghost line from mic to server
    mkLine(svg, nx + NODE/2 - 4, ny, cx - PR, cy, 'rgba(255,136,0,0.12)', 1);
  });

  // Speaker nodes (right column)
  const spkNodePos = {};
  const spkColX    = W - PAD - NODE / 2;
  const spkSpacing = speakers.length > 0 ? Math.min(80, (H - PAD * 2) / speakers.length) : 80;
  const spkStartY  = cy - ((speakers.length - 1) * spkSpacing) / 2;

  speakers.forEach((dev, i) => {
    const nx = spkColX;
    const ny = spkStartY + i * spkSpacing;
    spkNodePos[dev.id] = { x: nx, y: ny };

    const grp = document.createElementNS(ns, 'g');
    grp.style.cursor = 'pointer';
    grp.dataset.devId = dev.id;
    grp.dataset.role  = 'speaker';

    const isTarget  = state.pending !== null;
    const isSelected = state.selected === dev.id;
    mkCircle(grp, nx, ny, NODE/2 - 4, isSelected ? '#bf00ff' : '#00f0ff',
      isSelected ? 'rgba(191,0,255,0.1)' : 'rgba(0,240,255,0.06)',
      isSelected ? 2.5 : 1.5);
    if (isTarget && !isSelected) {
      mkCircle(grp, nx, ny, NODE/2, 'rgba(0,240,255,0.2)', 'none', 1);
    }

    const label = dev.name.length > 10 ? dev.name.slice(0,9)+'…' : dev.name;
    mkText(grp, nx, ny + 3,  label, isSelected ? '#bf00ff' : '#00f0ff', 9);
    mkText(grp, nx, ny + 16, 'SPK', '#6b7280', 7);

    grp.addEventListener('click', () => onNodeClick(dev, 'speaker'));
    svg.appendChild(grp);

    // Ghost line from server to speaker
    mkLine(svg, cx + PR, cy, nx - NODE/2 + 4, ny, 'rgba(0,240,255,0.10)', 1);
  });

  // Active route lines
  speakers.forEach(spk => {
    const assigned = spk.assigned_streams || [];
    if (assigned.length === 0) return;
    const sp = spkNodePos[spk.id];
    if (!sp) return;

    // Find mics that have a stream matching the assigned streams
    mics.forEach(mic => {
      // We treat mic→speaker route as active if any of the speaker's assigned_streams
      // were most recently produced by this mic (we don't have per-stream origin tracking
      // in the device model, so we draw a route for every assigned stream using the
      // server as the relay — draw mic→srv + srv→spk highlighted lines)
      // For simplicity, we connect all mics to all speakers that have assigned streams
      // via the server. Fine-grained per-stream routing is handled by checkboxes.
    });

    // Draw bright server→speaker line for each speaker with assigned streams
    const routeId = 'spk_' + spk.id;
    const line = mkLine(svg, cx + PR, cy, sp.x - NODE/2 + 4, sp.y,
      'rgba(0,240,255,0.7)', 2, routeId);
    line.style.cursor = 'pointer';
    line.addEventListener('click', () => disconnectSpeaker(spk.id));

    // Bright server label count
    mkText(svg, (cx + PR + sp.x - NODE/2 + 4) / 2, (cy + sp.y) / 2 - 6,
      assigned.length + ' stream' + (assigned.length > 1 ? 's' : ''), '#00f0ff', 8);
  });

  // Draw bright mic→server lines for mics whose streams are assigned somewhere
  const assignedStreamsGlobal = new Set();
  Object.values(state.devices).forEach(d => {
    if (d.role === 'speaker') (d.assigned_streams||[]).forEach(s => assignedStreamsGlobal.add(s));
  });
  mics.forEach(mic => {
    const mp = micNodePos[mic.id];
    if (!mp) return;
    // Highlight if any global assigned stream could be from this mic (heuristic: name match)
    const isActive = state.streams.some(s => assignedStreamsGlobal.has(s));
    if (isActive) {
      mkLine(svg, mp.x + NODE/2 - 4, mp.y, cx - PR, cy,
        'rgba(255,136,0,0.5)', 2);
    }
  });

  // Empty state label
  if (mics.length === 0 && speakers.length === 0) {
    mkText(svg, W/2, H/2 + PR + 24, 'No devices — connect a sender and receiver', '#6b7280', 11);
  } else if (mics.length === 0) {
    mkText(svg, W/4, H/2 + PR + 24, 'No mic sources', '#6b7280', 10);
  } else if (speakers.length === 0) {
    mkText(svg, 3*W/4, H/2 + PR + 24, 'No speakers', '#6b7280', 10);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Diagram interactions
// ─────────────────────────────────────────────────────────────────────────────
function onNodeClick(dev, role) {
  if (role === 'mic') {
    // Stage this mic as the pending source
    state.pending  = dev.id;
    state.selected = dev.id;
    renderDeviceList();
    renderDiagram();
    renderControlPanel();
    log('Select a speaker to route to: ' + dev.name, 'warn');
  } else if (role === 'speaker') {
    if (state.pending) {
      // Connect pending mic to this speaker:
      // Add all current streams that belong to the pending mic as assigned streams
      // Since we don't track per-stream origin, we assign all available streams.
      // (Granular assignment is available via the checkbox panel on the right.)
      const spk = state.devices[dev.id];
      if (spk) {
        const newStreams = [...new Set([...(spk.assigned_streams||[]), ...state.streams])];
        patchStreams(dev.id, newStreams).then(() => {
          log('Routed all streams → ' + dev.name);
        });
      }
      state.pending  = null;
      state.selected = dev.id;
    } else {
      state.selected = dev.id;
    }
    renderDeviceList();
    renderDiagram();
    renderControlPanel();
  }
}

function disconnectSpeaker(speakerId) {
  if (!confirm('Remove all stream assignments from this speaker?')) return;
  patchStreams(speakerId, []).then(() => {
    log('Cleared routes for: ' + (state.devices[speakerId]?.name || speakerId), 'warn');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Control panel actions
// ─────────────────────────────────────────────────────────────────────────────
function selectDevice(id) {
  state.pending  = null;
  state.selected = id;
  renderDeviceList();
  renderDiagram();
  renderControlPanel();
}

window.applyVolume = async function(id) {
  const slider = document.getElementById('masterVolSlider');
  if (!slider) return;
  const vol = parseFloat(slider.value) / 100;
  try {
    const res = await fetch('/device/' + encodeURIComponent(id) + '/volume', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ volume: vol }),
      signal: AbortSignal.timeout(5000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (state.devices[id]) state.devices[id].volume = vol;
    log('Volume set: ' + (state.devices[id]?.name || id) + ' → ' + Math.round(vol * 100) + '%');
  } catch (err) {
    log('Volume patch failed: ' + err.message, 'err');
  }
};

window.toggleStream = async function(deviceId, streamName, checked) {
  const dev = state.devices[deviceId];
  if (!dev) return;
  let updated;
  if (checked) {
    updated = [...new Set([...(dev.assigned_streams||[]), streamName])];
  } else {
    updated = (dev.assigned_streams||[]).filter(s => s !== streamName);
  }
  await patchStreams(deviceId, updated);
  log((checked ? 'Assigned' : 'Unassigned') + ' stream "' + streamName + '" → ' + dev.name, checked ? '' : 'warn');
};

async function patchStreams(id, streams) {
  try {
    const res = await fetch('/device/' + encodeURIComponent(id) + '/streams', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ streams }),
      signal: AbortSignal.timeout(5000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (state.devices[id]) state.devices[id].assigned_streams = streams;
    renderDiagram();
    renderControlPanel();
  } catch (err) {
    log('Stream patch failed: ' + err.message, 'err');
  }
}

window.removeDevice = async function(id) {
  const dev = state.devices[id];
  if (!dev) return;
  if (!confirm('Remove device "' + dev.name + '"?')) return;
  try {
    const res = await fetch('/device/' + encodeURIComponent(id), {
      method: 'DELETE',
      signal: AbortSignal.timeout(5000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    delete state.devices[id];
    if (state.selected === id) state.selected = null;
    renderAll();
    log('Removed device: ' + dev.name, 'warn');
  } catch (err) {
    log('Remove failed: ' + err.message, 'err');
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// Diagram resize
// ─────────────────────────────────────────────────────────────────────────────
const diagramWrap = document.querySelector('.diagram-wrap');
const resizeObserver = new ResizeObserver(() => renderDiagram());
resizeObserver.observe(diagramWrap);

// ─────────────────────────────────────────────────────────────────────────────
// Logging
// ─────────────────────────────────────────────────────────────────────────────
const logEl = document.getElementById('logBox');
function log(msg, type = '') {
  const d = document.createElement('div');
  d.className = 'lg' + (type === 'err' ? ' le' : type === 'warn' ? ' lw' : '');
  const t = new Date().toLocaleTimeString('en-US', { hour12: false });
  d.innerHTML = `<span class="lt">[${t}]</span>${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
connectWs();
log('MANAGER READY. Waiting for devices…');
</script>
</body>
</html>
