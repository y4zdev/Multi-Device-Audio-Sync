<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z // MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --neon-purple: #bf00ff;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(0,240,255,0.06);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;}
    body{background:#050608;color:var(--text-main);font-family:var(--font-ui);
         display:grid;grid-template-rows:52px 1fr;
         grid-template-columns:260px 1fr 280px;
         grid-template-areas:'hdr hdr hdr' 'left center right';}
    body::after{content:" ";display:block;position:fixed;inset:0;
      background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),
                 linear-gradient(90deg,rgba(255,0,0,0.04),rgba(0,255,0,0.02),rgba(0,0,255,0.04));
      background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;}
    .grid-bg{position:fixed;inset:0;z-index:-1;
      background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
                       linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
      background-size:30px 30px;}

    /* ── header ── */
    header{grid-area:hdr;display:flex;align-items:center;padding:0 14px;gap:12px;
           background:var(--bg-panel);border-bottom:1px solid var(--neon-cyan);
           box-shadow:0 0 14px rgba(0,240,255,0.12);}
    .brand h1{font-size:1.1rem;letter-spacing:3px;color:var(--neon-cyan);text-transform:uppercase;}
    .brand span{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);}
    .hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto;font-family:var(--font-mono);font-size:0.72rem;}
    .nav-link{color:var(--text-muted);text-decoration:none;padding:2px 7px;border:1px solid rgba(0,240,255,0.2);}
    .nav-link:hover{color:var(--neon-cyan);border-color:var(--neon-cyan);}
    .ws-badge{padding:2px 9px;font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;
              clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
    .ws-ok  {background:rgba(0,255,65,0.1); border:1px solid var(--neon-green);color:var(--neon-green);}
    .ws-err {background:rgba(255,0,60,0.1); border:1px solid var(--neon-magenta);color:var(--neon-magenta);}
    .ws-wait{background:rgba(107,114,128,0.1);border:1px solid var(--text-muted);color:var(--text-muted);}

    /* ── panels ── */
    .panel-wrap{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:10px;
                border-right:1px solid rgba(0,240,255,0.08);}
    #panelLeft  {grid-area:left;}
    #panelCenter{grid-area:center;border-right:none;padding:10px;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
    #panelRight {grid-area:right;border-right:none;border-left:1px solid rgba(0,240,255,0.08);}
    .panel-title{font-family:var(--font-mono);font-size:0.68rem;color:var(--neon-cyan);
                 letter-spacing:2px;text-transform:uppercase;
                 padding-bottom:6px;border-bottom:1px dashed rgba(0,240,255,0.2);margin-bottom:6px;}

    /* ── device cards ── */
    .dev-card{background:rgba(10,12,16,0.92);border:1px solid rgba(0,240,255,0.14);
              padding:10px;cursor:pointer;transition:border-color 0.15s;
              clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);}
    .dev-card:hover{border-color:rgba(0,240,255,0.5);}
    .dev-card.selected{border-color:var(--neon-cyan);box-shadow:0 0 10px rgba(0,240,255,0.15);}
    .dev-card.offline{border-color:rgba(107,114,128,0.25);opacity:0.55;}
    .dc-top{display:flex;align-items:center;gap:7px;}
    .dc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dot-on  {background:var(--neon-green);box-shadow:0 0 5px var(--neon-green);}
    .dot-off {background:var(--text-muted);}
    .dot-live{background:var(--neon-cyan);box-shadow:0 0 7px var(--neon-cyan);animation:blink 1.2s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .dc-name{flex:1;font-size:0.88rem;font-weight:700;color:var(--text-main);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .dc-role{font-family:var(--font-mono);font-size:0.6rem;padding:1px 5px;letter-spacing:1px;
             text-transform:uppercase;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);}
    .role-mic    {background:rgba(191,0,255,0.12);border:1px solid var(--neon-purple);color:var(--neon-purple);}
    .role-speaker{background:rgba(0,240,255,0.08);border:1px solid var(--neon-cyan);color:var(--neon-cyan);}
    .role-manager{background:rgba(252,238,10,0.08);border:1px solid var(--neon-yellow);color:var(--neon-yellow);}
    .dc-meta{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);margin-top:3px;}
    .dc-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
    .stream-chip{font-family:var(--font-mono);font-size:0.6rem;padding:1px 5px;
                 background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.2);color:var(--neon-cyan);
                 clip-path:polygon(3px 0,100% 0,100% calc(100% - 3px),calc(100% - 3px) 100%,0 100%,0 3px);}

    /* ── diagram ── */
    #diagram{flex:1;background:radial-gradient(circle at 50% 50%,rgba(0,240,255,0.04) 0%,transparent 65%),#000;
             border:1px solid rgba(0,240,255,0.15);clip-path:var(--clip-b);position:relative;overflow:hidden;}
    #diagramSvg{width:100%;height:100%;}
    .diag-hint{position:absolute;bottom:10px;left:14px;font-family:var(--font-mono);
               font-size:0.65rem;color:var(--neon-cyan);opacity:0.5;pointer-events:none;}
    .diag-mode{position:absolute;top:10px;right:14px;font-family:var(--font-mono);
               font-size:0.68rem;color:var(--neon-yellow);pointer-events:none;}

    /* ── right panel detail ── */
    .detail-section{display:flex;flex-direction:column;gap:6px;}
    .detail-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
    .detail-val{font-size:0.88rem;font-weight:700;color:var(--text-main);}
    .vol-row{display:flex;align-items:center;gap:8px;}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-cyan);cursor:pointer;}
    .vol-val{font-family:var(--font-mono);font-size:0.75rem;color:var(--neon-cyan);min-width:38px;text-align:right;}
    .assign-row{display:flex;align-items:center;gap:8px;padding:5px 7px;
                background:rgba(0,0,0,0.4);border:1px solid rgba(0,240,255,0.1);
                clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
    .assign-row input[type=checkbox]{accent-color:var(--neon-cyan);width:14px;height:14px;cursor:pointer;}
    .assign-row label{flex:1;font-family:var(--font-mono);font-size:0.75rem;color:var(--text-main);cursor:pointer;}
    .btn-remove{width:100%;padding:6px;background:rgba(255,0,60,0.06);border:1px solid var(--neon-magenta);
                color:var(--neon-magenta);font-family:var(--font-mono);font-size:0.72rem;letter-spacing:1px;
                cursor:pointer;text-transform:uppercase;transition:all 0.15s;
                clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);}
    .btn-remove:hover{background:var(--neon-magenta);color:#fff;}
    .empty-hint{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);text-align:center;padding:16px;}
    .sep{border:none;border-top:1px dashed rgba(0,240,255,0.1);margin:4px 0;}

    @media(max-width:900px){
      body{grid-template-columns:1fr;grid-template-rows:52px auto auto auto;
           grid-template-areas:'hdr' 'left' 'center' 'right';
           overflow:auto;height:auto;}
      #panelCenter{min-height:50vw;}
    }
  </style>
</head>
<body>
<div class="grid-bg"></div>

<header>
  <div class="brand">
    <h1>Audio_Sync_LINK</h1>
    <span>// MANAGER — Y4Z.DEV</span>
  </div>
  <div class="hdr-right">
    <a class="nav-link" href="/sender">&#x25B6; Sender</a>
    <a class="nav-link" href="/receiver">&#x25B6; Speaker</a>
    <span id="wsBadge" class="ws-badge ws-wait">connecting&#x2026;</span>
  </div>
</header>

<!-- LEFT: device list -->
<div class="panel-wrap" id="panelLeft">
  <div class="panel-title">&#x25A0; Devices</div>
  <div id="deviceList"><div class="empty-hint">no devices</div></div>
</div>

<!-- CENTER: diagram -->
<div id="panelCenter">
  <div class="panel-title" style="display:flex;justify-content:space-between;">
    <span>&#x25A0; Routing Diagram</span>
    <span id="diagStreamCount" style="color:var(--neon-yellow);">0 streams</span>
  </div>
  <div id="diagram">
    <svg id="diagramSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="diag-hint" id="diagHint">click MIC &#x2192; click SPEAKER to route</div>
    <div class="diag-mode" id="diagMode">MODE: IDLE</div>
  </div>
</div>

<!-- RIGHT: device detail -->
<div class="panel-wrap" id="panelRight">
  <div class="panel-title">&#x25A0; Device Detail</div>
  <div id="deviceDetail"><div class="empty-hint">select a device</div></div>
</div>

<script>
'use strict';
// ── state ─────────────────────────────────────────────────────────────────────
const OFFLINE_MS = 15_000;
let devices    = {};  // id → DeviceInfo
let streams    = new Set();
let selectedId = null;
let ws         = null;
// diagram interaction
let pendingMic = null;  // id of mic clicked, waiting for speaker click

// ── DOM ───────────────────────────────────────────────────────────────────────
const elDevList   = document.getElementById('deviceList');
const elDetail    = document.getElementById('deviceDetail');
const elWsBadge   = document.getElementById('wsBadge');
const elDiagSvg   = document.getElementById('diagramSvg');
const elDiagHint  = document.getElementById('diagHint');
const elDiagMode  = document.getElementById('diagMode');
const elStreamCnt = document.getElementById('diagStreamCount');

// ── helpers ───────────────────────────────────────────────────────────────────
function isOffline(dev) { return dev.last_seen && (Date.now() - dev.last_seen) > OFFLINE_MS; }
function dotClass(dev) {
  if (isOffline(dev))          return 'dot-off';
  if (dev.status === 'live')   return 'dot-live';
  return 'dot-on';
}
function roleClass(r) { return {mic:'role-mic',speaker:'role-speaker',manager:'role-manager'}[r]||'role-manager'; }

// ── render device list ────────────────────────────────────────────────────────
function renderDevices() {
  const list = Object.values(devices);
  if (list.length === 0) { elDevList.innerHTML = '<div class="empty-hint">no devices</div>'; return; }
  elDevList.innerHTML = '';
  list.forEach(dev => {
    const off  = isOffline(dev);
    const card = document.createElement('div');
    card.className = 'dev-card' + (off?' offline':'') + (dev.id===selectedId?' selected':'');
    card.dataset.id = dev.id;
    const chips = (dev.assigned_streams||[]).map(s=>`<span class="stream-chip">${s}</span>`).join('');
    const ago   = dev.last_seen ? Math.round((Date.now()-dev.last_seen)/1000)+'s ago' : 'never';
    card.innerHTML = `
      <div class="dc-top">
        <span class="dc-dot ${dotClass(dev)}"></span>
        <span class="dc-name">${dev.name}</span>
        <span class="dc-role ${roleClass(dev.role)}">${dev.role}</span>
      </div>
      <div class="dc-meta">vol: ${(dev.volume*100).toFixed(0)}% &middot; ${ago} &middot; ${dev.id.slice(0,8)}&hellip;</div>
      ${chips?'<div class="dc-chips">'+chips+'</div>':''}`;
    card.addEventListener('click', () => selectDevice(dev.id));
    elDevList.appendChild(card);
  });
}

// ── render diagram ────────────────────────────────────────────────────────────
function renderDiagram() {
  const svg = elDiagSvg;
  const W = svg.clientWidth  || svg.parentElement.clientWidth  || 600;
  const H = svg.clientHeight || svg.parentElement.clientHeight || 400;
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  elStreamCnt.textContent = streams.size + ' stream' + (streams.size===1?'':'s');

  // defs: arrow marker + glow filter
  svg.innerHTML = `
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,240,255,0.8)"/>
      </marker>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-hot" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>`;

  const mics = Object.values(devices).filter(d => d.role==='mic');
  const spks = Object.values(devices).filter(d => d.role==='speaker');
  const cx   = W/2, cy = H/2;
  const LX   = 90,  RX = W-90;
  const NODE_R = 28;

  // position nodes
  const nodePos = {};  // id → {x,y}

  function placeNodes(list, x) {
    const gap = Math.min(80, (H-60) / Math.max(list.length,1));
    const totalH = (list.length-1)*gap;
    const startY = cy - totalH/2;
    list.forEach((d,i) => { nodePos[d.id] = {x, y: startY + i*gap}; });
  }
  placeNodes(mics, LX);
  placeNodes(spks, RX);
  nodePos['__router__'] = {x: cx, y: cy};

  // draw connection lines (speaker.assigned_streams → find mic with that stream name)
  const streamToMicId = {};
  mics.forEach(m => {
    // mic streams are inferred from stream registry: stream name === mic stream name
    streams.forEach(s => {
      // if stream name starts with or equals mic name (heuristic), associate
      if (!streamToMicId[s]) streamToMicId[s] = m.id;
    });
  });
  // better: use stream name directly if only one mic, else map by order
  if (mics.length === 1) {
    streams.forEach(s => { streamToMicId[s] = mics[0].id; });
  }

  // draw routes: speaker assigned_streams → back to originating mic
  const drawnRoutes = new Set();
  spks.forEach(spk => {
    (spk.assigned_streams||[]).forEach(sname => {
      const micId = streamToMicId[sname];
      if (!micId || !nodePos[micId] || !nodePos[spk.id]) return;
      const key = micId+'->'+spk.id+'::'+sname;
      if (drawnRoutes.has(key)) return;
      drawnRoutes.add(key);
      const p1 = nodePos[micId], p2 = nodePos[spk.id];
      const mx1 = p1.x + NODE_R + 10, mx2 = p2.x - NODE_R - 10;
      const cmx = (mx1+mx2)/2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${mx1},${p1.y} C${cmx},${p1.y} ${cmx},${p2.y} ${mx2},${p2.y}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(0,240,255,0.55)');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('marker-end','url(#arr)');
      path.setAttribute('filter','url(#glow)');
      path.style.cursor = 'pointer';
      path.addEventListener('click', () => disconnectRoute(micId, spk.id, sname));
      // animated dash
      const pLen = path.getTotalLength ? path.getTotalLength() : 200;
      path.setAttribute('stroke-dasharray', pLen);
      path.setAttribute('stroke-dashoffset', pLen);
      path.style.animation = 'dashIn 0.6s ease forwards';
      svg.appendChild(path);
      // route label
      const lx = (mx1+mx2)/2, ly = (p1.y+p2.y)/2 - 8;
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', lx); txt.setAttribute('y', ly);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family',"'Share Tech Mono',monospace");
      txt.setAttribute('font-size','9');
      txt.setAttribute('fill','rgba(0,240,255,0.6)');
      txt.textContent = sname;
      svg.appendChild(txt);
    });
  });

  // draw router node (center)
  const rn = document.createElementNS('http://www.w3.org/2000/svg','g');
  rn.innerHTML = `
    <polygon points="${cx},${cy-22} ${cx+22},${cy} ${cx},${cy+22} ${cx-22},${cy}"
             fill="rgba(0,240,255,0.06)" stroke="rgba(0,240,255,0.5)" stroke-width="1.5" filter="url(#glow)"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="'Share Tech Mono',monospace"
          font-size="8" fill="rgba(0,240,255,0.8)">ROUTER</text>`;
  svg.appendChild(rn);

  // draw pending mic selection highlight
  if (pendingMic && nodePos[pendingMic]) {
    const pp = nodePos[pendingMic];
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',pp.x); ring.setAttribute('cy',pp.y); ring.setAttribute('r', NODE_R+6);
    ring.setAttribute('fill','none'); ring.setAttribute('stroke',"rgba(252,238,10,0.8)"); ring.setAttribute('stroke-width','2');
    ring.setAttribute('stroke-dasharray','4 3'); ring.setAttribute('filter','url(#glow-hot)');
    svg.appendChild(ring);
  }

  // draw mic nodes
  mics.forEach(dev => {
    const p   = nodePos[dev.id];
    const off = isOffline(dev);
    const col = off ? '#6b7280' : (dev.id===pendingMic ? '#fcee0a' : '#bf00ff');
    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';
    const hexPts = hexPoints(p.x, p.y, NODE_R);
    g.innerHTML = `
      <polygon points="${hexPts}" fill="rgba(191,0,255,0.08)" stroke="${col}"
               stroke-width="${dev.id===pendingMic?2.5:1.5}" filter="url(#${off?'':'glow'})"/>
      <text x="${p.x}" y="${p.y-2}" text-anchor="middle" font-family="'Share Tech Mono',monospace"
            font-size="9" fill="${col}">MIC</text>
      <text x="${p.x}" y="${p.y+10}" text-anchor="middle" font-family="'Rajdhani',sans-serif"
            font-size="11" font-weight="700" fill="${off?'#6b7280':'#d1d5db'}">${truncate(dev.name,10)}</text>`;
    g.addEventListener('click', () => onMicClick(dev.id));
    svg.appendChild(g);
  });

  // draw speaker nodes
  spks.forEach(dev => {
    const p   = nodePos[dev.id];
    const off = isOffline(dev);
    const col = off ? '#6b7280' : '#00f0ff';
    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'pointer';
    g.innerHTML = `
      <rect x="${p.x-NODE_R}" y="${p.y-NODE_R}" width="${NODE_R*2}" height="${NODE_R*2}"
            rx="4" fill="rgba(0,240,255,0.06)" stroke="${col}"
            stroke-width="1.5" filter="url(#${off?'':'glow'})"/>
      <text x="${p.x}" y="${p.y-2}" text-anchor="middle" font-family="'Share Tech Mono',monospace"
            font-size="9" fill="${col}">SPK</text>
      <text x="${p.x}" y="${p.y+10}" text-anchor="middle" font-family="'Rajdhani',sans-serif"
            font-size="11" font-weight="700" fill="${off?'#6b7280':'#d1d5db'}">${truncate(dev.name,10)}</text>`;
    g.addEventListener('click', () => onSpkClick(dev.id));
    svg.appendChild(g);
  });

  // empty state
  if (mics.length===0 && spks.length===0) {
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx); t.setAttribute('y',cy);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family',"'Share Tech Mono',monospace");
    t.setAttribute('font-size','13');
    t.setAttribute('fill','rgba(107,114,128,0.6)');
    t.textContent = 'no devices online';
    svg.appendChild(t);
  }
}

// css anim for lines
const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes dashIn { to { stroke-dashoffset: 0; } }
  @keyframes routePulse { 0%,100%{stroke-opacity:0.55} 50%{stroke-opacity:1} }
`;
document.head.appendChild(styleEl);

function hexPoints(cx, cy, r) {
  return Array.from({length:6},(_,i)=>{
    const a = Math.PI/180*(60*i-30);
    return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
  }).join(' ');
}
function truncate(s,n) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

// ── diagram interactions ──────────────────────────────────────────────────────
function onMicClick(id) {
  if (isOffline(devices[id])) return;
  pendingMic = id;
  elDiagMode.textContent = 'MODE: SELECT SPEAKER';
  elDiagHint.textContent = 'now click a SPEAKER node to route';
  selectDevice(id);
  renderDiagram();
}

function onSpkClick(id) {
  if (isOffline(devices[id])) return;
  if (pendingMic) {
    // find what stream(s) the mic has active
    const micStreams = Array.from(streams).filter(s => {
      // use the stream name heuristic — any stream counts from that mic
      return true; // we'll let manager pick all current streams from mic
    });
    // just use all active streams as the route source
    const toAssign = Array.from(streams);
    if (toAssign.length === 0) { pendingMic=null; elDiagMode.textContent='MODE: IDLE'; return; }
    const spk = devices[id];
    const current = new Set(spk.assigned_streams||[]);
    toAssign.forEach(s => current.add(s));
    fetch('/device/'+id+'/streams', {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ streams: Array.from(current) })
    }).then(() => {
      if (devices[id]) devices[id].assigned_streams = Array.from(current);
      pendingMic = null;
      elDiagMode.textContent = 'MODE: IDLE';
      elDiagHint.textContent = 'click MIC → click SPEAKER to route';
      renderDiagram();
      if (selectedId === id) renderDetail();
    });
  } else {
    selectDevice(id);
  }
}

function disconnectRoute(micId, spkId, streamName) {
  const spk = devices[spkId];
  if (!spk) return;
  const newStreams = (spk.assigned_streams||[]).filter(s => s !== streamName);
  fetch('/device/'+spkId+'/streams', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ streams: newStreams })
  }).then(() => {
    if (devices[spkId]) devices[spkId].assigned_streams = newStreams;
    renderDiagram();
    if (selectedId===spkId) renderDetail();
  });
}

// ── device detail ─────────────────────────────────────────────────────────────
function selectDevice(id) {
  selectedId = id;
  renderDevices();
  renderDetail();
}

function renderDetail() {
  const dev = devices[selectedId];
  if (!dev) { elDetail.innerHTML = '<div class="empty-hint">select a device</div>'; return; }

  const off = isOffline(dev);
  const assignRows = Array.from(streams).map(s => {
    const chk = (dev.assigned_streams||[]).includes(s) ? 'checked' : '';
    return `<div class="assign-row">
      <input type="checkbox" id="asgn_${s}" data-stream="${s}" ${chk}>
      <label for="asgn_${s}">${s}</label>
    </div>`;
  }).join('');

  elDetail.innerHTML = `
    <hr class="sep">
    <div class="detail-section">
      <div class="detail-label">Name</div>
      <div class="detail-val">${dev.name} <span class="dc-role ${roleClass(dev.role)}">${dev.role}</span></div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Status</div>
      <div class="detail-val" style="display:flex;align-items:center;gap:7px;">
        <span class="dc-dot ${dotClass(dev)}" style="display:inline-block;"></span>
        <span style="font-family:var(--font-mono);font-size:0.8rem;">${off?'OFFLINE':dev.status.toUpperCase()}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Master Volume</div>
      <div class="vol-row">
        <input type="range" id="volSlider" min="0" max="2" step="0.05" value="${dev.volume}">
        <span class="vol-val" id="volDisplay">${(dev.volume*100).toFixed(0)}%</span>
      </div>
    </div>
    ${streams.size > 0 ? `
    <div class="detail-section">
      <div class="detail-label">Assign Streams</div>
      <div id="assignBlock">
        ${assignRows || '<div class="empty-hint">no streams</div>'}
      </div>
    </div>` : ''}
    <div class="detail-section" style="margin-top:8px;">
      <button class="btn-remove" id="btnRemoveDev">&#x2715; Remove Device</button>
    </div>`;

  // volume slider
  let volT = null;
  const sl = document.getElementById('volSlider');
  const vd = document.getElementById('volDisplay');
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    vd.textContent = (v*100).toFixed(0)+'%';
    if (devices[selectedId]) devices[selectedId].volume = v;
    clearTimeout(volT);
    volT = setTimeout(() => {
      fetch('/device/'+selectedId+'/volume', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({volume:v})
      });
    }, 150);
  });

  // assign checkboxes
  document.querySelectorAll('#assignBlock input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const assigned = Array.from(document.querySelectorAll('#assignBlock input:checked')).map(c=>c.dataset.stream);
      fetch('/device/'+selectedId+'/streams', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({streams:assigned})
      });
      if (devices[selectedId]) devices[selectedId].assigned_streams = assigned;
      renderDiagram();
    });
  });

  document.getElementById('btnRemoveDev').addEventListener('click', () => {
    fetch('/device/'+selectedId, {method:'DELETE'}).then(() => {
      delete devices[selectedId]; selectedId=null;
      renderDevices(); renderDiagram(); renderDetail();
    });
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function setWs(state) {
  const m = {ok:['ws-badge ws-ok','LIVE'],err:['ws-badge ws-err','OFFLINE'],wait:['ws-badge ws-wait','CONNECTING…']};
  const [cls,txt] = m[state]||m.wait;
  elWsBadge.className=cls; elWsBadge.textContent=txt;
}

function connectWS() {
  setWs('wait');
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { setWs('ok'); };
  ws.onclose = () => { setWs('err'); setTimeout(connectWS,3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    let msg; try { msg=JSON.parse(e.data); } catch { return; }
    applyEvent(msg);
  };
}

function applyEvent(msg) {
  switch(msg.type) {
    case 'snapshot':
      devices={}; (msg.devices||[]).forEach(d=>{devices[d.id]=d;});
      streams=new Set(msg.streams||[]); break;
    case 'device_joined': if(msg.device) devices[msg.device.id]=msg.device; break;
    case 'device_left':   delete devices[msg.id]; if(selectedId===msg.id) selectedId=null; break;
    case 'stream_added':  streams.add(msg.name);    break;
    case 'stream_removed':streams.delete(msg.name); break;
    case 'volume_changed': if(devices[msg.device_id]) devices[msg.device_id].volume=msg.volume; break;
    case 'route_changed':
      if (devices[msg.speaker_id]) {
        const d=devices[msg.speaker_id];
        if (msg.connected) { if(!d.assigned_streams.includes(msg.source)) d.assigned_streams.push(msg.source); }
        else d.assigned_streams=d.assigned_streams.filter(s=>s!==msg.source);
      } break;
  }
  renderDevices();
  renderDiagram();
  if (selectedId && devices[selectedId]) renderDetail();
  else if (selectedId && !devices[selectedId]) { selectedId=null; elDetail.innerHTML='<div class="empty-hint">select a device</div>'; }
}

// periodic offline re-render
setInterval(()=>{ renderDevices(); renderDiagram(); if(selectedId&&devices[selectedId]) renderDetail(); }, 5000);

// resize diagram on window resize
window.addEventListener('resize', ()=>{ setTimeout(renderDiagram,50); });

connectWS();
</script>
