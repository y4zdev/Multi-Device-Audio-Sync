<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z.LINK // CYBER-SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(0,240,255,0.06);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#050608;color:var(--text-main);
      font-family:var(--font-ui);min-height:100dvh;
      display:flex;flex-direction:column;overflow:hidden;
    }
    body::after{
      content:" ";display:block;position:fixed;inset:0;
      background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),
                 linear-gradient(90deg,rgba(255,0,0,0.05),rgba(0,255,0,0.02),rgba(0,0,255,0.05));
      background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;
    }
    .grid-bg{
      position:fixed;inset:0;z-index:-1;
      background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
                       linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
      background-size:30px 30px;
    }
    .hud{display:flex;flex-direction:column;height:100dvh;
         padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right))
                 max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));gap:8px;}
    .header-bar{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 15px;background:var(--bg-panel);
      border:1px solid var(--neon-cyan);border-left:4px solid var(--neon-cyan);
      clip-path:var(--clip-a);box-shadow:0 0 12px rgba(0,240,255,0.15);
    }
    .brand h1{font-size:1.4rem;letter-spacing:3px;color:var(--neon-cyan);text-transform:uppercase;line-height:1;}
    .brand span{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:0.8rem;}
    .role-badge{
      padding:3px 10px;border:1px solid;font-size:0.7rem;
      clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    }
    .role-badge.receiver{border-color:var(--neon-cyan);color:var(--neon-cyan);}
    .role-badge.sender{border-color:var(--neon-orange);color:var(--neon-orange);}
    .sys-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);}
    .sys-dot.live{background:var(--neon-green);box-shadow:0 0 8px var(--neon-green);}
    .sys-dot.warn{background:var(--neon-yellow);box-shadow:0 0 8px var(--neon-yellow);animation:blink 1s infinite;}
    .sys-dot.err{background:var(--neon-magenta);box-shadow:0 0 8px var(--neon-magenta);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .core{display:flex;flex:1;gap:8px;min-height:0;}
    .viz-wrap{
      flex:1;position:relative;
      background:radial-gradient(circle at center,rgba(0,240,255,0.04) 0%,transparent 60%),#000;
      border:1px solid rgba(0,240,255,0.2);clip-path:var(--clip-b);overflow:hidden;
    }
    canvas{width:100%;height:100%;display:block;}
    .viz-label{
      position:absolute;bottom:10px;left:14px;
      font-family:var(--font-mono);font-size:0.7rem;color:var(--neon-cyan);opacity:0.6;
    }
    .side{width:330px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .panel{
      background:var(--bg-panel);
      border:1px solid rgba(0,240,255,0.18);
      padding:14px;clip-path:var(--clip-a);
    }
    .panel-hdr{
      font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-cyan);
      text-transform:uppercase;border-bottom:1px dashed rgba(0,240,255,0.25);
      padding-bottom:5px;margin-bottom:10px;display:flex;justify-content:space-between;
    }
    .btn-row{display:flex;flex-wrap:wrap;gap:6px;}
    button{
      flex:1;min-width:70px;background:transparent;color:var(--text-main);
      border:1px solid rgba(0,240,255,0.35);padding:7px 10px;
      font-family:var(--font-mono);font-size:0.78rem;text-transform:uppercase;
      cursor:pointer;transition:all 0.18s ease;
      clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);
    }
    button:hover{background:rgba(0,240,255,0.1);border-color:var(--neon-cyan);text-shadow:0 0 5px var(--neon-cyan);}
    button:active{transform:scale(0.97);}
    button.primary{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,240,255,0.04);}
    button.primary:hover{background:var(--neon-cyan);color:#000;}
    button.danger{border-color:var(--neon-magenta);color:var(--neon-magenta);}
    button.danger:hover{background:var(--neon-magenta);color:#000;text-shadow:none;}
    button.warn-btn{border-color:var(--neon-orange);color:var(--neon-orange);}
    button.warn-btn:hover{background:var(--neon-orange);color:#000;text-shadow:none;}
    button.active-btn{background:rgba(0,240,255,0.18);border-color:var(--neon-cyan);color:var(--neon-cyan);}
    button:disabled{opacity:0.35;cursor:not-allowed;}
    .stream-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
    .stream-card{
      border:1px solid rgba(0,240,255,0.2);padding:8px 10px;
      display:flex;align-items:center;gap:8px;
      clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
      transition:background 0.2s;
    }
    .stream-card:hover{background:rgba(0,240,255,0.05);}
    .stream-card input[type=checkbox]{accent-color:var(--neon-cyan);width:14px;height:14px;cursor:pointer;}
    .stream-name{flex:1;font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);}
    .stream-state{font-family:var(--font-mono);font-size:0.65rem;width:70px;text-align:right;}
    .stream-state.live{color:var(--neon-green);}
    .stream-state.warn{color:var(--neon-yellow);}
    .stream-state.err{color:var(--neon-magenta);}
    .vol-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-cyan);height:4px;cursor:pointer;}
    .vol-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);min-width:28px;text-align:right;}
    .sender-card{
      border:1px solid rgba(255,136,0,0.3);padding:8px 10px;
      display:flex;flex-direction:column;gap:4px;
      clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    }
    .sender-card-row{display:flex;align-items:center;gap:8px;}
    .vu-bar{flex:1;height:6px;background:rgba(255,136,0,0.1);overflow:hidden;}
    .vu-fill{height:100%;width:0%;background:var(--neon-orange);box-shadow:0 0 8px var(--neon-orange);transition:width 0.08s linear;}
    .field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
    .field label{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;}
    .field input,.field select{
      background:rgba(0,0,0,0.5);border:1px solid rgba(0,240,255,0.3);
      color:var(--text-main);padding:6px 8px;font-family:var(--font-mono);
      font-size:0.8rem;width:100%;outline:none;
      clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    }
    .field input:focus,.field select:focus{border-color:var(--neon-cyan);}
    .field select option{background:#0a0c10;}
    .data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .dk{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;}
    .dv{font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .terminal{
      font-family:var(--font-mono);font-size:0.68rem;color:var(--neon-green);
      background:rgba(0,255,65,0.04);border:1px solid rgba(0,255,65,0.15);
      padding:8px;height:110px;overflow-y:auto;clip-path:var(--clip-b);
    }
    .lg{margin-bottom:3px;word-break:break-all;}
    .lt{color:var(--text-muted);margin-right:4px;}
    .le{color:var(--neon-magenta);}
    .lw{color:var(--neon-yellow);}
    .energy-track{height:4px;background:rgba(0,240,255,0.08);margin-top:8px;}
    .energy-fill{height:100%;width:0%;background:var(--neon-cyan);box-shadow:0 0 8px var(--neon-cyan);transition:width 0.1s linear;}
    .reconnect-overlay{
      position:fixed;inset:0;background:rgba(5,6,8,0.88);z-index:100;
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    }
    .reconnect-overlay.show{display:flex;}
    .reconnect-msg{font-family:var(--font-mono);font-size:1rem;color:var(--neon-yellow);text-align:center;}
    .reconnect-sub{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);}
    .spin{
      width:40px;height:40px;border:2px solid rgba(0,240,255,0.2);
      border-top:2px solid var(--neon-cyan);border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none!important;}
    audio{display:none;}
    @media(max-width:800px){
      .core{flex-direction:column;}
      .side{width:100%;flex:0 0 auto;}
      .viz-wrap{min-height:35vh;}
    }
  </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="reconnect-overlay" id="reconnectOverlay">
  <div class="spin"></div>
  <div class="reconnect-msg">SERVER_OFFLINE</div>
  <div class="reconnect-sub" id="reconnectSub">Attempting reconnect in <span id="reconnectCountdown">5</span>s...</div>
</div>

<div class="hud">
  <header class="header-bar">
    <div class="brand">
      <h1>Audio_Sync_LINK</h1>
      <span>// BY Y4Z.DEV</span>
    </div>
    <div class="header-right">
      <span class="role-badge" id="roleBadge">RECEIVER</span>
      <span class="sys-dot" id="sysDot"></span>
      <span id="sysText" style="font-family:var(--font-mono);font-size:0.8rem;">IDLE</span>
    </div>
  </header>

  <main class="core">
    <section class="viz-wrap">
      <canvas id="viz"></canvas>
      <div class="viz-label">› <span id="vizLabel">AWAITING_SIGNAL</span></div>
    </section>
    <aside class="side" id="sidePanel"></aside>
  </main>
</div>

<script>
// ── ROLE ──────────────────────────────────────────────────────────────────────
const ROLE = new URLSearchParams(location.search).get('role') === 'sender' ? 'sender' : 'receiver';
document.getElementById('roleBadge').textContent = ROLE.toUpperCase();
document.getElementById('roleBadge').className   = 'role-badge ' + ROLE;
document.title = ROLE === 'sender' ? 'Y4Z // SENDER' : 'Y4Z // RECEIVER';

// ── CANVAS VISUALIZER ─────────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
let analyserNodes = [];
let vizMode = 'spectrum';

function resizeCanvas() {
  const r = canvas.parentNode.getBoundingClientRect();
  const d = window.devicePixelRatio || 1;
  canvas.width  = r.width  * d;
  canvas.height = r.height * d;
  ctx.setTransform(d,0,0,d,0,0);
}
window.addEventListener('resize', resizeCanvas);

function vizLoop() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,240,255,0.05)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<w;x+=40){ctx.moveTo(x,0);ctx.lineTo(x,h);}
  for(let y=0;y<h;y+=40){ctx.moveTo(0,y);ctx.lineTo(w,y);}
  ctx.stroke();
  if(analyserNodes.length===0){
    ctx.fillStyle='rgba(0,240,255,0.15)';
    ctx.fillRect(0,h/2-1,w,2);
  } else {
    const colors=['#00f0ff','#ff003c','#fcee0a','#00ff41','#ff8800','#bf00ff'];
    analyserNodes.forEach((an,idx)=>{
      const col=colors[idx%colors.length];
      if(vizMode==='spectrum'){
        const data=new Uint8Array(an.frequencyBinCount);
        an.getByteFrequencyData(data);
        const bars=60,step=Math.floor(data.length/bars),bw=w/bars;
        const cy=h/2;
        ctx.fillStyle='rgba(0,240,255,0.3)';ctx.fillRect(0,cy-1,w,2);
        for(let i=0;i<bars;i++){
          let s=0;for(let j=0;j<step;j++)s+=data[i*step+j]||0;
          const norm=Math.pow(s/step/255,1.5);
          const bh=Math.max(2,norm*(h*0.4));
          ctx.fillStyle=col;ctx.shadowBlur=8*norm;ctx.shadowColor=col;
          ctx.fillRect(i*bw+1+(idx*2),cy-bh,bw-2,bh);
          ctx.fillRect(i*bw+1+(idx*2),cy,bw-2,bh);
        }
        ctx.shadowBlur=0;
      } else {
        const data=new Uint8Array(an.fftSize);
        an.getByteTimeDomainData(data);
        ctx.beginPath();ctx.lineWidth=1.5;ctx.strokeStyle=col;
        ctx.shadowBlur=10;ctx.shadowColor=col;
        for(let i=0;i<data.length;i++){
          const x=(i/(data.length-1))*w;
          const y=(data[i]/128)*h*0.4+h*(0.1+idx*0.15);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();ctx.shadowBlur=0;
      }
    });
  }
  requestAnimationFrame(vizLoop);
}

// ── LOGGER ────────────────────────────────────────────────────────────────────
let logEl = null;
function log(msg, type='') {
  if(!logEl) return;
  const d=document.createElement('div');
  d.className='lg'+(type==='err'?' le':type==='warn'?' lw':'');
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  d.innerHTML=`<span class="lt">[${t}]</span>${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop=logEl.scrollHeight;
}

// ── SYS STATE ─────────────────────────────────────────────────────────────────
const sysDot  = document.getElementById('sysDot');
const sysText = document.getElementById('sysText');
function setSys(text, level='idle') {
  sysText.textContent=text;
  sysDot.className='sys-dot '+(level==='live'?'live':level==='warn'?'warn':level==='err'?'err':'');
}

// ── SERVER HEALTH ─────────────────────────────────────────────────────────────
const overlay     = document.getElementById('reconnectOverlay');
const countdownEl = document.getElementById('reconnectCountdown');
let serverWasDown  = false;
let reconnectTimer = null;
let autoReconnectFn = null;

async function checkServer() {
  try {
    await fetch('/streams',{signal:AbortSignal.timeout(3000)});
    if(serverWasDown){
      serverWasDown=false;
      overlay.classList.remove('show');
      log('Server back online. Reconnecting...','warn');
      if(autoReconnectFn) autoReconnectFn();
    }
  } catch {
    if(!serverWasDown){
      serverWasDown=true;
      overlay.classList.add('show');
      log('Server unreachable. Auto-reconnect active.','err');
    }
  }
}
function startHealthLoop(){ setInterval(checkServer,5000); }
function scheduleReconnect(fn,delayMs=2000){ clearTimeout(reconnectTimer); reconnectTimer=setTimeout(fn,delayMs); }

// ── WEBRTC HELPERS ────────────────────────────────────────────────────────────
function makePC(){
  return new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
}
async function sendOffer(endpoint,body){
  const res=await fetch(endpoint,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body),signal:AbortSignal.timeout(10000)
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── RECEIVER ROLE ─────────────────────────────────────────────────────────────
function initReceiver() {
  const side = document.getElementById('sidePanel');
  side.innerHTML = `
    <div class="panel">
      <div class="panel-hdr"><span>[01] Streams</span><span id="streamCount">0 found</span></div>
      <div class="stream-list" id="streamList"><div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">Fetching streams...</div></div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="primary" id="connectBtn">Connect Selected</button>
        <button id="refreshBtn">Refresh</button>
        <button class="warn-btn" id="forcePlayBtn" style="display:none;">Force Play</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span>[02] Status</span></div>
      <div class="data-grid">
        <div><div class="dk">NET.STATE</div><div class="dv" id="netState">OFFLINE</div></div>
        <div><div class="dk">ICE</div><div class="dv" id="iceState">STANDBY</div></div>
        <div><div class="dk">TRACKS</div><div class="dv" id="trackCount">0</div></div>
        <div><div class="dk">PLAYBACK</div><div class="dv" id="playbackState">HALTED</div></div>
      </div>
      <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span>[03] Active Streams</span></div>
      <div id="activeStreamsList" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>
    <div class="terminal" id="logBox"></div>
  `;
  logEl = document.getElementById('logBox');

  let pc = null;
  let audioCtx = null;
  let activeStreams = {};
  let pendingAudioEls = [];
  let selectedStreams = new Set();
  let backoff = 2000;

  // Force Play: resume AudioContext and replay all audio elements
  document.getElementById('forcePlayBtn').addEventListener('click', () => {
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
    pendingAudioEls.forEach(a => a.play().catch(()=>{}));
    pendingAudioEls = [];
    document.getElementById('forcePlayBtn').style.display='none';
    log('Force play triggered.');
  });

  async function fetchStreams(){
    try{
      const r=await fetch('/streams',{signal:AbortSignal.timeout(3000)});
      const d=await r.json();
      return d.streams||[];
    } catch{ return []; }
  }

  async function renderStreamList(){
    const streams=await fetchStreams();
    const listEl=document.getElementById('streamList');
    document.getElementById('streamCount').textContent=streams.length+' found';
    if(streams.length===0){
      listEl.innerHTML='<div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">No streams available.</div>';
      return;
    }
    listEl.innerHTML='';
    streams.forEach(name=>{
      const card=document.createElement('div');
      card.className='stream-card';
      const isActive=!!activeStreams[name];
      card.innerHTML=`
        <input type="checkbox" id="chk_${name}" ${selectedStreams.has(name)||isActive?'checked':''}>
        <span class="stream-name">${name}</span>
        <span class="stream-state ${isActive?'live':''}">${isActive?'● LIVE':'○ IDLE'}</span>
      `;
      card.querySelector('input').addEventListener('change',e=>{
        if(e.target.checked) selectedStreams.add(name);
        else selectedStreams.delete(name);
      });
      if(selectedStreams.has(name)||isActive) selectedStreams.add(name);
      listEl.appendChild(card);
    });
  }

  async function connect(){
    if(selectedStreams.size===0){
      const streams=await fetchStreams();
      streams.forEach(s=>selectedStreams.add(s));
    }
    if(selectedStreams.size===0){ log('No streams to connect to.','warn'); return; }

    setSys('CONNECTING','warn');
    document.getElementById('netState').textContent='INIT';

    try{
      if(pc){ pc.close(); pc=null; }
      // Clear previous analyser nodes and active stream cards
      analyserNodes=[];
      document.getElementById('activeStreamsList').innerHTML='';
      activeStreams={};
      document.getElementById('trackCount').textContent='0';

      pc=makePC();

      pc.oniceconnectionstatechange=()=>{
        document.getElementById('iceState').textContent=pc.iceConnectionState.toUpperCase();
      };

      pc.onconnectionstatechange=()=>{
        const s=pc.connectionState;
        document.getElementById('netState').textContent=s.toUpperCase();
        if(s==='connected'){ setSys('ONLINE','live'); backoff=2000; log('Connected to '+[...selectedStreams].join(', ')); }
        if(s==='failed'||s==='disconnected'){
          setSys('LINK_FAIL','err');
          log('Link lost. Reconnecting in '+(backoff/1000)+'s...','err');
          scheduleReconnect(connect, backoff);
          backoff=Math.min(backoff*2,30000);
        }
      };

      let trackIdx=0;
      const activeEl=document.getElementById('activeStreamsList');

      pc.ontrack=(event)=>{
        const stream=event.streams[0];
        const trackNames=[...selectedStreams];
        const name=trackNames[trackIdx]||'stream_'+trackIdx;
        trackIdx++;
        document.getElementById('trackCount').textContent=trackIdx;

        if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        if(audioCtx.state==='suspended') audioCtx.resume();

        const audio=document.createElement('audio');
        audio.srcObject=stream;
        audio.playsInline=true;
        document.body.appendChild(audio);

        const srcNode=audioCtx.createMediaStreamSource(stream);
        const analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        analyser.smoothingTimeConstant=0.8;
        srcNode.connect(analyser);
        analyserNodes.push(analyser);

        const gain=audioCtx.createGain();
        srcNode.connect(gain);
        gain.connect(audioCtx.destination);

        activeStreams[name]={audio,srcNode,analyser,gain};

        audio.play().then(()=>{
          document.getElementById('playbackState').textContent='ACTIVE';
          document.getElementById('vizLabel').textContent='RX // '+Object.keys(activeStreams).join(' + ');
          log('Track live: '+name);
        }).catch(()=>{
          pendingAudioEls.push(audio);
          document.getElementById('forcePlayBtn').style.display='';
          log('Autoplay blocked — tap Force Play','warn');
        });

        // Per-stream card with volume
        const wrapper=document.createElement('div');
        wrapper.style.cssText='display:flex;flex-direction:column;gap:4px;width:100%;';
        const card=document.createElement('div');
        card.id='active_'+name;
        card.className='stream-card';
        card.innerHTML=`<span class="stream-name">${name}</span><span class="stream-state live">● LIVE</span>`;
        const volRow=document.createElement('div');
        volRow.className='vol-row';
        volRow.innerHTML=`<input type="range" min="0" max="1" step="0.01" value="1"><span class="vol-label">100%</span>`;
        volRow.querySelector('input').addEventListener('input',e=>{
          gain.gain.value=parseFloat(e.target.value);
          volRow.querySelector('.vol-label').textContent=Math.round(e.target.value*100)+'%';
        });
        wrapper.appendChild(card);
        wrapper.appendChild(volRow);
        activeEl.appendChild(wrapper);
      };

      [...selectedStreams].forEach(()=>pc.addTransceiver('audio',{direction:'recvonly'}));

      const offer=await pc.createOffer();
      await pc.setLocalDescription(offer);

      log('Sending offer for: '+[...selectedStreams].join(', '));
      const answer=await sendOffer('/receiver/offer',{
        streams:[...selectedStreams],
        sdp:pc.localDescription
      });
      await pc.setRemoteDescription(answer);
      log('Remote SDP accepted.');

    } catch(err){
      setSys('FAIL','err');
      log('Connection failed: '+err.message,'err');
      scheduleReconnect(connect,backoff);
      backoff=Math.min(backoff*2,30000);
    }
  }

  autoReconnectFn=()=>{ backoff=2000; connect(); };

  document.getElementById('connectBtn').addEventListener('click',()=>{ backoff=2000; connect(); });
  document.getElementById('refreshBtn').addEventListener('click',renderStreamList);

  renderStreamList();
  setInterval(renderStreamList,5000);
  log('RECEIVER INIT. Awaiting command.');
}

// ── SENDER ROLE ───────────────────────────────────────────────────────────────
function initSender() {
  const side = document.getElementById('sidePanel');
  side.innerHTML = `
    <div class="panel">
      <div class="panel-hdr"><span>[01] New Stream</span></div>
      <div class="field">
        <label>Stream Name</label>
        <input type="text" id="streamName" placeholder="e.g. game, mic, music" maxlength="32">
      </div>
      <div class="field">
        <label>Source</label>
        <select id="sourceType">
          <option value="system">System Audio (server-side cpal)</option>
          <option value="browser">Browser Mic (getUserMedia)</option>
          <option value="display">Display Audio (getDisplayMedia)</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="primary" id="startStreamBtn">Start Stream</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span>[02] Active Streams</span><span id="senderStreamCount">0</span></div>
      <div id="senderStreamList" class="stream-list">
        <div class="no-streams" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);">No active streams.</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span>[03] Status</span></div>
      <div class="data-grid">
        <div><div class="dk">STREAMS</div><div class="dv" id="senderNetState">0 ACTIVE</div></div>
        <div><div class="dk">SERVER</div><div class="dv" id="senderSrvState">ONLINE</div></div>
      </div>
    </div>
    <div class="terminal" id="logBox"></div>
  `;
  logEl = document.getElementById('logBox');

  const activeConnections = {};
  let backoff = 2000;

  function updateSenderCount(){
    const n=Object.keys(activeConnections).length;
    document.getElementById('senderStreamCount').textContent=n;
    document.getElementById('senderNetState').textContent=n+' ACTIVE';
  }

  function renderSenderCard(name){
    const list=document.getElementById('senderStreamList');
    const existing=list.querySelector('.no-streams');
    if(existing) existing.remove();
    const card=document.createElement('div');
    card.id='scard_'+name;
    card.className='sender-card';
    card.innerHTML=`
      <div class="sender-card-row">
        <span style="font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-orange);flex:1;">● ${name}</span>
        <button class="danger" style="flex:0;min-width:60px;padding:3px 6px;font-size:0.7rem;" onclick="stopStream('${name}')">Stop</button>
      </div>
      <div class="vu-bar"><div class="vu-fill" id="vu_${name}"></div></div>
    `;
    list.appendChild(card);
  }

  window.stopStream=function(name){
    const conn=activeConnections[name];
    if(conn){
      if(conn.pc) conn.pc.close();
      if(conn.stream) conn.stream.getTracks().forEach(t=>t.stop());
      if(conn.analyserNode) analyserNodes=analyserNodes.filter(a=>a!==conn.analyserNode);
      delete activeConnections[name];
    }
    fetch('/stream/'+encodeURIComponent(name),{method:'DELETE'}).catch(()=>{});
    const card=document.getElementById('scard_'+name);
    if(card) card.remove();
    updateSenderCount();
    log('Stream stopped: '+name,'warn');
  };

  async function startStream(){
    const name  =document.getElementById('streamName').value.trim();
    const source=document.getElementById('sourceType').value;
    if(!name){ log('Enter a stream name first.','warn'); return; }
    if(activeConnections[name]){ log('Stream "'+name+'" already running.','warn'); return; }

    setSys('BROADCASTING','live');
    log('Starting stream: '+name+' (source='+source+')');

    if(source==='system'){
      try{
        const dummyPc=makePC();
        dummyPc.addTransceiver('audio',{direction:'sendrecv'});
        const offer=await dummyPc.createOffer();
        await dummyPc.setLocalDescription(offer);
        await sendOffer('/sender/offer',{name,source:'system',sdp:dummyPc.localDescription});
        activeConnections[name]={pc:dummyPc,stream:null,analyserNode:null};
        renderSenderCard(name);
        updateSenderCount();
        log('System capture stream registered: '+name);
      } catch(err){
        log('Failed to register system stream: '+err.message,'err');
        setSys('IDLE','idle');
      }
      return;
    }

    let stream;
    try{
      if(source==='browser'){
        stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      } else {
        stream=await navigator.mediaDevices.getDisplayMedia({audio:true,video:true});
        stream.getVideoTracks().forEach(t=>t.stop());
      }
    } catch(err){
      log('Media capture failed: '+err.message,'err');
      setSys('IDLE','idle');
      return;
    }

    try{
      const pc2=makePC();
      stream.getAudioTracks().forEach(t=>pc2.addTrack(t,stream));

      const audioCtxS=new(window.AudioContext||window.webkitAudioContext)();
      const src2=audioCtxS.createMediaStreamSource(stream);
      const an2=audioCtxS.createAnalyser();
      an2.fftSize=256;
      src2.connect(an2);
      analyserNodes.push(an2);

      pc2.onconnectionstatechange=()=>{
        if(pc2.connectionState==='failed'||pc2.connectionState==='disconnected'){
          log('Sender PC lost for '+name+'. Reconnecting...','warn');
          delete activeConnections[name];
          analyserNodes=analyserNodes.filter(a=>a!==an2);
          scheduleReconnect(()=>startStream(),backoff);
          backoff=Math.min(backoff*2,30000);
        }
        if(pc2.connectionState==='connected'){ backoff=2000; }
      };

      const offer=await pc2.createOffer();
      await pc2.setLocalDescription(offer);
      const answer=await sendOffer('/sender/offer',{name,source,sdp:pc2.localDescription});
      await pc2.setRemoteDescription(answer);

      activeConnections[name]={pc:pc2,stream,analyserNode:an2};
      renderSenderCard(name);
      updateSenderCount();
      log('Stream live: '+name);

      // VU meter animation
      function vuTick(){
        if(!activeConnections[name]) return;
        const data=new Uint8Array(an2.frequencyBinCount);
        an2.getByteFrequencyData(data);
        const avg=data.reduce((a,b)=>a+b,0)/data.length;
        const vuFill=document.getElementById('vu_'+name);
        if(vuFill) vuFill.style.width=Math.min(100,avg/255*100*2.5)+'%';
        requestAnimationFrame(vuTick);
      }
      vuTick();

    } catch(err){
      log('Stream start failed: '+err.message,'err');
      setSys('IDLE','idle');
    }
  }

  autoReconnectFn=()=>{
    document.getElementById('senderSrvState').textContent='ONLINE';
    log('Server back online.','warn');
  };

  document.getElementById('startStreamBtn').addEventListener('click',startStream);
  log('SENDER INIT. Ready to broadcast.');
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
resizeCanvas();
requestAnimationFrame(vizLoop);
if(ROLE==='receiver') initReceiver();
else initSender();
startHealthLoop();
</script>
</body>
