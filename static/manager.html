<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z // MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10,12,16,0.92);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --neon-orange: #ff8800;
      --neon-purple: #bf00ff;
      --accent: var(--neon-magenta);
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(255,0,60,0.05);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-a: polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
      --clip-b: polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050608;color:var(--text-main);font-family:var(--font-ui);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
    body::after{content:" ";display:block;position:fixed;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.22) 50%),linear-gradient(90deg,rgba(255,0,0,0.05),rgba(0,0,255,0.02),rgba(255,0,60,0.04));background-size:100% 2px,3px 100%;pointer-events:none;z-index:999;}
    .grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:30px 30px;}
    .hud{display:flex;flex-direction:column;height:100dvh;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));gap:8px;}

    /* header */
    .header-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--bg-panel);border:1px solid var(--neon-magenta);border-left:4px solid var(--neon-magenta);clip-path:var(--clip-a);box-shadow:0 0 14px rgba(255,0,60,0.14);flex-shrink:0;}
    .brand h1{font-size:1.4rem;letter-spacing:3px;color:var(--neon-magenta);text-transform:uppercase;line-height:1;}
    .brand span{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);}
    .header-right{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:0.8rem;}
    .role-badge{padding:3px 10px;border:1px solid var(--neon-magenta);color:var(--neon-magenta);font-size:0.7rem;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .nav-link{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);text-decoration:none;padding:3px 8px;border:1px solid rgba(255,0,60,0.2);transition:all 0.15s;}
    .nav-link:hover{color:var(--neon-magenta);border-color:var(--neon-magenta);}
    .ws-badge{font-family:var(--font-mono);font-size:0.7rem;padding:3px 10px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);}
    .ws-ok  {border:1px solid var(--neon-green);color:var(--neon-green);}
    .ws-err {border:1px solid var(--neon-magenta);color:var(--neon-magenta);}
    .ws-wait{border:1px solid var(--text-muted);color:var(--text-muted);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    /* 3-column layout */
    .core{display:flex;flex:1;gap:8px;min-height:0;}
    .col{display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
    .col-left {width:240px;flex-shrink:0;}
    .col-center{flex:1;min-width:0;}
    .col-right {width:260px;flex-shrink:0;}

    /* panels */
    .panel{background:var(--bg-panel);border:1px solid rgba(255,0,60,0.18);padding:12px;clip-path:var(--clip-a);}
    .panel-hdr{font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-magenta);text-transform:uppercase;border-bottom:1px dashed rgba(255,0,60,0.25);padding-bottom:5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
    .panel-cyan{border-color:rgba(0,240,255,0.18);}
    .panel-cyan .panel-hdr{color:var(--neon-cyan);border-bottom-color:rgba(0,240,255,0.25);}
    .panel-orange{border-color:rgba(255,136,0,0.2);}
    .panel-orange .panel-hdr{color:var(--neon-orange);border-bottom-color:rgba(255,136,0,0.3);}

    /* device cards */
    .dev-card{border:1px solid rgba(255,0,60,0.2);padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;gap:4px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);transition:border-color 0.15s,background 0.15s;}
    .dev-card:hover{border-color:rgba(255,0,60,0.5);background:rgba(255,0,60,0.04);}
    .dev-card.selected{border-color:var(--neon-magenta);background:rgba(255,0,60,0.06);}
    .dev-card.offline{opacity:0.45;filter:grayscale(0.7);}
    .dc-row{display:flex;align-items:center;gap:6px;}
    .dc-name{flex:1;font-family:var(--font-mono);font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .dc-role{font-size:0.62rem;padding:1px 5px;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);text-transform:uppercase;font-family:var(--font-mono);}
    .role-mic    {border:1px solid #8b5cf6;color:#8b5cf6;background:rgba(139,92,246,0.1);}
    .role-speaker{border:1px solid var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,240,255,0.06);}
    .role-manager{border:1px solid var(--neon-magenta);color:var(--neon-magenta);background:rgba(255,0,60,0.06);}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dot-on  {background:var(--neon-green);box-shadow:0 0 5px var(--neon-green);}
    .dot-off {background:#374151;}
    .dot-live{background:var(--neon-cyan);box-shadow:0 0 6px var(--neon-cyan);animation:blink 1.4s infinite;}
    .dc-meta{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);}
    .stream-chip{display:inline-block;font-size:0.6rem;padding:1px 5px;border:1px solid rgba(0,240,255,0.25);color:var(--neon-cyan);margin-right:3px;font-family:var(--font-mono);}

    /* diagram canvas area */
    .diagram-wrap{flex:1;position:relative;background:radial-gradient(circle at 50% 50%,rgba(255,0,60,0.03) 0%,transparent 70%),#000;border:1px solid rgba(255,0,60,0.15);clip-path:var(--clip-b);min-height:0;overflow:hidden;}
    #diagram{width:100%;height:100%;display:block;cursor:crosshair;}
    .diagram-hint{position:absolute;bottom:10px;left:14px;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);pointer-events:none;}
    .diagram-title{position:absolute;top:10px;left:14px;font-family:var(--font-mono);font-size:0.72rem;color:var(--neon-magenta);opacity:0.7;pointer-events:none;}

    /* right panel detail */
    .dk{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px;}
    .dv{font-family:var(--font-mono);font-size:0.82rem;color:var(--neon-yellow);}
    .detail-section{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
    .vol-row{display:flex;align-items:center;gap:8px;}
    .vol-row input[type=range]{flex:1;accent-color:var(--neon-magenta);cursor:pointer;}
    .vol-val{font-family:var(--font-mono);font-size:0.75rem;color:var(--neon-magenta);min-width:38px;text-align:right;}
    .assign-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid rgba(0,240,255,0.12);margin-bottom:4px;clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);}
    .assign-item input[type=checkbox]{accent-color:var(--neon-cyan);width:14px;height:14px;cursor:pointer;}
    .assign-item label{flex:1;font-family:var(--font-mono);font-size:0.78rem;color:var(--text-main);cursor:pointer;}
    .btn-sm{padding:5px 10px;font-size:0.7rem;}
    .btn-danger{border-color:var(--neon-magenta);color:var(--neon-magenta);}
    .btn-danger:hover{background:var(--neon-magenta);color:#000;}
    .empty-msg{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);padding:12px 0;text-align:center;}

    @media(max-width:1000px){
      .core{flex-direction:column;}
      .col-left,.col-right{width:100%;}
      .diagram-wrap{min-height:280px;}
    }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="hud">

  <header class="header-bar">
    <div class="brand">
      <h1>Audio_Sync_LINK</h1>
      <span>// MANAGER — Y4Z.DEV</span>
    </div>
    <div class="header-right">
      <a class="nav-link" href="/sender">▶ Sender</a>
      <a class="nav-link" href="/receiver">▶ Receiver</a>
      <span class="role-badge">MANAGER</span>
      <span id="wsBadge" class="ws-badge ws-wait">CONNECTING</span>
    </div>
  </header>

  <main class="core">

    <!-- LEFT: device list -->
    <div class="col col-left">
      <div class="panel">
        <div class="panel-hdr"><span>[01] Devices</span><span id="devCountBadge" style="color:var(--neon-yellow);">0</span></div>
        <div id="devList"><div class="empty-msg">no devices</div></div>
      </div>
      <div class="panel panel-cyan">
        <div class="panel-hdr"><span>[02] Streams</span><span id="streamCountBadge" style="color:var(--neon-yellow);">0</span></div>
        <div id="streamListEl"><div class="empty-msg">no streams</div></div>
      </div>
    </div>

    <!-- CENTER: diagram -->
    <div class="col col-center">
      <div class="panel" style="padding:6px;">
        <div class="panel-hdr" style="margin-bottom:4px;"><span>[03] Routing Diagram</span><span id="diagramHint" style="color:var(--text-muted);font-size:0.65rem;">click source → speaker to connect</span></div>
      </div>
      <div class="diagram-wrap" style="flex:1;">
        <div class="diagram-title">// SIGNAL FLOW</div>
        <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="diagram-hint" id="diagramStatus">idle — no routes</div>
      </div>
    </div>

    <!-- RIGHT: device detail -->
    <div class="col col-right">
      <div class="panel panel-orange" id="detailPanel">
        <div class="panel-hdr"><span>[04] Device Detail</span></div>
        <div id="detailContent"><div class="empty-msg">select a device</div></div>
      </div>
    </div>

  </main>
</div>

<script>
'use strict';

// ── constants ──────────────────────────────────────────────────────────────
const OFFLINE_MS = 15_000;

// ── state ──────────────────────────────────────────────────────────────────
let devices = {};       // id → DeviceInfo
let streams = new Set();
let selectedId = null;
let ws = null;
// diagram interaction: pending source click waiting for speaker click
let pendingSource = null;

// ── DOM ────────────────────────────────────────────────────────────────────
const elDevList     = document.getElementById('devList');
const elStreamList  = document.getElementById('streamListEl');
const elDevCnt      = document.getElementById('devCountBadge');
const elStmCnt      = document.getElementById('streamCountBadge');
const elDetail      = document.getElementById('detailContent');
const elWsBadge     = document.getElementById('wsBadge');
const elDiagStatus  = document.getElementById('diagramStatus');
const svgEl         = document.getElementById('diagram');

// ── helpers ────────────────────────────────────────────────────────────────
function isOffline(d) { return d.last_seen && (Date.now() - d.last_seen) > OFFLINE_MS; }

function dotClass(d) {
  if (isOffline(d))        return 'dot dot-off';
  if (d.status === 'live') return 'dot dot-live';
  return 'dot dot-on';
}
function roleClass(r) {
  return ({mic:'role-mic',speaker:'role-speaker',manager:'role-manager'})[r]||'role-manager';
}
function seenAgo(d) {
  if (!d.last_seen) return 'never';
  const s = Math.round((Date.now()-d.last_seen)/1000);
  return s < 60 ? s+'s' : Math.round(s/60)+'m';
}

// ── render device list ─────────────────────────────────────────────────────
function renderDevices() {
  const list = Object.values(devices);
  elDevCnt.textContent = list.length;
  if (list.length === 0) { elDevList.innerHTML = '<div class="empty-msg">no devices</div>'; return; }
  elDevList.innerHTML = '';
  list.forEach(dev => {
    const offline = isOffline(dev);
    const card = document.createElement('div');
    card.className = 'dev-card' + (offline?' offline':'') + (dev.id===selectedId?' selected':'');
    card.dataset.id = dev.id;
    const chips = (dev.assigned_streams||[]).map(s=>`<span class="stream-chip">${s}</span>`).join('');
    card.innerHTML = `
      <div class="dc-row">
        <span class="${dotClass(dev)}"></span>
        <span class="dc-name">${dev.name}</span>
        <span class="dc-role ${roleClass(dev.role)}">${dev.role}</span>
      </div>
      <div class="dc-meta">vol:${Math.round(dev.volume*100)}% · ${seenAgo(dev)} · ${dev.id.slice(0,6)}…</div>
      ${chips?'<div style="margin-top:2px;">'+chips+'</div>':''}`;
    card.addEventListener('click', () => selectDevice(dev.id));
    elDevList.appendChild(card);
  });
}

// ── render stream list ─────────────────────────────────────────────────────
function renderStreams() {
  elStmCnt.textContent = streams.size;
  if (streams.size === 0) { elStreamList.innerHTML = '<div class="empty-msg">no streams</div>'; return; }
  elStreamList.innerHTML = '';
  streams.forEach(name => {
    const row = document.createElement('div');
    row.style.cssText = 'font-family:var(--font-mono);font-size:0.78rem;color:var(--neon-cyan);padding:4px 0;display:flex;align-items:center;gap:6px;';
    row.innerHTML = `<span style="color:var(--neon-green);animation:blink 1.4s infinite;">●</span>${name}`;
    elStreamList.appendChild(row);
  });
}

// ── select device ──────────────────────────────────────────────────────────
function selectDevice(id) {
  selectedId = id;
  renderDevices();
  renderDetail();
  drawDiagram();
}

// ── detail panel ───────────────────────────────────────────────────────────
function renderDetail() {
  const dev = devices[selectedId];
  if (!dev) { elDetail.innerHTML = '<div class="empty-msg">select a device</div>'; return; }

  const assignRows = Array.from(streams).map(s => {
    const chk = (dev.assigned_streams||[]).includes(s);
    return `<div class="assign-item">
      <input type="checkbox" id="asgn-${s}" data-stream="${s}" ${chk?'checked':''}>
      <label for="asgn-${s}">${s}</label>
    </div>`;
  }).join('');

  elDetail.innerHTML = `
    <div class="detail-section">
      <div class="dk">NAME</div>
      <div class="dv">${dev.name} <span class="dc-role ${roleClass(dev.role)}" style="display:inline;">${dev.role}</span></div>
    </div>
    <div class="detail-section">
      <div class="dk">STATUS</div>
      <div class="dv" style="display:flex;align-items:center;gap:6px;">
        <span class="${dotClass(dev)}"></span>
        <span>${isOffline(dev)?'OFFLINE':dev.status.toUpperCase()}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="dk">MASTER VOLUME</div>
      <div class="vol-row">
        <input type="range" id="volSlider" min="0" max="2" step="0.05" value="${dev.volume}">
        <span class="vol-val" id="volVal">${Math.round(dev.volume*100)}%</span>
      </div>
    </div>
    ${streams.size>0?`
    <div class="detail-section">
      <div class="dk">ASSIGN STREAMS</div>
      ${assignRows||'<div class="empty-msg">no streams</div>'}
    </div>`:''}
    <div style="margin-top:8px;">
      <button class="btn-sm btn-danger" id="btnRemoveDev">Remove Device</button>
    </div>`;

  let volTimer = null;
  const slider = document.getElementById('volSlider');
  const volVal = document.getElementById('volVal');
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    volVal.textContent = Math.round(v*100)+'%';
    if (dev) dev.volume = v;
    clearTimeout(volTimer);
    volTimer = setTimeout(() => {
      fetch('/device/'+selectedId+'/volume', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({volume:v})
      });
    }, 150);
  });

  document.querySelectorAll('.assign-item input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const assigned = Array.from(document.querySelectorAll('.assign-item input:checked')).map(c=>c.dataset.stream);
      fetch('/device/'+selectedId+'/streams', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({streams:assigned})
      });
      if (devices[selectedId]) { devices[selectedId].assigned_streams = assigned; drawDiagram(); }
    });
  });

  document.getElementById('btnRemoveDev').addEventListener('click', () => {
    fetch('/device/'+selectedId, {method:'DELETE'}).then(() => {
      delete devices[selectedId]; selectedId = null;
      renderDevices(); renderDetail(); drawDiagram();
    });
  });
}

// ── SVG diagram ────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl_(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  return el;
}

function drawDiagram() {
  const svg = svgEl;
  svg.innerHTML = '';
  const W = svg.clientWidth  || svg.parentElement.clientWidth  || 600;
  const H = svg.clientHeight || svg.parentElement.clientHeight || 400;

  // defs: glow filter
  const defs = svgEl_('defs',{});
  const filt = svgEl_('filter',{id:'glow',x:'-40%',y:'-40%',width:'180%',height:'180%'});
  const fe1  = svgEl_('feGaussianBlur',{stdDeviation:'3',result:'blur'});
  const fe2  = svgEl_('feMerge',{});
  const mn1  = svgEl_('feMergeNode',{in:'blur'});
  const mn2  = svgEl_('feMergeNode',{in:'SourceGraphic'});
  fe2.appendChild(mn1); fe2.appendChild(mn2);
  filt.appendChild(fe1); filt.appendChild(fe2);
  defs.appendChild(filt);
  svg.appendChild(defs);

  const allDevs = Object.values(devices);
  const mics     = allDevs.filter(d => d.role === 'mic');
  const speakers = allDevs.filter(d => d.role === 'speaker');

  // layout constants
  const cX = W / 2;
  const cY = H / 2;
  const nodeW = 110;
  const nodeH = 36;
  const leftX = 40;
  const rightX = W - leftX - nodeW;

  // draw active stream routes as lines first (behind nodes)
  speakers.forEach(spk => {
    (spk.assigned_streams||[]).forEach(streamName => {
      // find mic that has this stream name matching a known stream
      const srcMic = mics.find(m =>
        streams.has(streamName) &&
        // try matching stream name to device name or just draw from any source
        (m.name === streamName || streams.has(streamName))
      );
      // use center node as relay point always
      const spkIdx = speakers.indexOf(spk);
      const spkTotal = speakers.length;
      const spkY = spkTotal <= 1 ? cY : cY + (spkIdx - (spkTotal-1)/2) * 56;
      const spkAnchorX = rightX;
      const spkAnchorY = spkY + nodeH/2;

      // line from center to speaker
      const line2 = svgEl_('line', {
        x1: cX+30, y1: cY,
        x2: spkAnchorX, y2: spkAnchorY,
        stroke: '#00f0ff', 'stroke-width':'1.5',
        'stroke-dasharray':'4 3', opacity:'0.6',
        filter:'url(#glow)'
      });
      line2.dataset.speaker = spk.id;
      line2.dataset.stream  = streamName;
      line2.style.cursor = 'pointer';
      line2.addEventListener('click', () => disconnectRoute(spk.id, streamName));
      svg.appendChild(line2);

      // line from left to center (for any active stream)
      if (streams.has(streamName)) {
        const micIdx = Math.min(mics.length-1, 0);
        const micTotal = Math.max(mics.length, 1);
        const micY = micTotal <= 1 ? cY : cY + (micIdx - (micTotal-1)/2) * 56;
        const line1 = svgEl_('line', {
          x1: leftX+nodeW, y1: micY+nodeH/2,
          x2: cX-30, y2: cY,
          stroke: '#ff8800', 'stroke-width':'1.5',
          'stroke-dasharray':'4 3', opacity:'0.5',
          filter:'url(#glow)'
        });
        svg.appendChild(line1);
      }
    });
  });

  // center server node
  const serverG = svgEl_('g', { transform: `translate(${cX-40},${cY-20})`, style:'cursor:default' });
  const serverRect = svgEl_('rect', { x:0, y:0, width:80, height:40, fill:'rgba(255,0,60,0.08)',
    stroke:'#ff003c', 'stroke-width':'1.5', rx:'2', filter:'url(#glow)' });
  const serverTxt = svgEl_('text', { x:40, y:15, 'text-anchor':'middle',
    fill:'#ff003c', 'font-family':'Share Tech Mono,monospace', 'font-size':'9', 'font-weight':'bold' });
  serverTxt.textContent = 'SERVER';
  const serverTxt2 = svgEl_('text', { x:40, y:28, 'text-anchor':'middle',
    fill:'rgba(255,0,60,0.6)', 'font-family':'Share Tech Mono,monospace', 'font-size':'8' });
  serverTxt2.textContent = 'RELAY';
  serverG.appendChild(serverRect); serverG.appendChild(serverTxt); serverG.appendChild(serverTxt2);
  svg.appendChild(serverG);

  // active streams floating below center
  let sIdx = 0;
  streams.forEach(name => {
    const sy = cY + 52 + sIdx * 22;
    const stG = svgEl_('g', { transform:`translate(${cX-50},${sy-10})` });
    const stR = svgEl_('rect', { x:0,y:0,width:100,height:20,fill:'rgba(0,240,255,0.05)',
      stroke:'rgba(0,240,255,0.3)','stroke-width':'1',rx:'2' });
    const stT = svgEl_('text', { x:50, y:13, 'text-anchor':'middle',
      fill:'#00f0ff','font-family':'Share Tech Mono,monospace','font-size':'9' });
    stT.textContent = '▸ '+name;
    // dashed line to server
    const stLine = svgEl_('line', { x1:50,y1:0, x2:50, y2:-52-sIdx*22+10,
      stroke:'rgba(0,240,255,0.2)','stroke-width':'1','stroke-dasharray':'2 3' });
    stG.appendChild(stLine); stG.appendChild(stR); stG.appendChild(stT);
    svg.appendChild(stG);
    sIdx++;
  });

  // draw mic nodes (left column)
  mics.forEach((mic, i) => {
    const total = mics.length;
    const y = total <= 1 ? cY - nodeH/2 : cY + (i - (total-1)/2) * 56 - nodeH/2;
    const offline = isOffline(mic);
    const color = offline ? '#374151' : '#8b5cf6';
    const isSelected = mic.id === pendingSource;

    const g = svgEl_('g', { transform:`translate(${leftX},${y})`, style:'cursor:pointer' });
    const rect = svgEl_('rect', { x:0,y:0,width:nodeW,height:nodeH,
      fill: isSelected ? 'rgba(139,92,246,0.2)' : 'rgba(139,92,246,0.06)',
      stroke: isSelected ? '#bf00ff' : color, 'stroke-width': isSelected?'2':'1',
      rx:'2', filter: offline?'':'url(#glow)' });
    const nameT = svgEl_('text', { x:8, y:14, fill: color,
      'font-family':'Share Tech Mono,monospace', 'font-size':'9', 'font-weight':'bold' });
    nameT.textContent = '⬤ ' + mic.name.slice(0,12);
    const roleT = svgEl_('text', { x:8, y:26, fill:'rgba(139,92,246,0.6)',
      'font-family':'Share Tech Mono,monospace', 'font-size':'7.5' });
    roleT.textContent = 'MIC/SOURCE';
    g.appendChild(rect); g.appendChild(nameT); g.appendChild(roleT);

    // click: set as pending source
    g.addEventListener('click', () => {
      pendingSource = mic.id;
      elDiagStatus.textContent = 'source selected: '+mic.name+' — now click a speaker to connect';
      drawDiagram();
    });
    svg.appendChild(g);

    // line to center
    const lineColor = offline ? 'rgba(55,65,81,0.4)' : 'rgba(139,92,246,0.35)';
    const connLine = svgEl_('line', {
      x1: leftX+nodeW, y1: y+nodeH/2,
      x2: cX-40, y2: cY,
      stroke: lineColor, 'stroke-width':'1', 'stroke-dasharray':'3 4'
    });
    svg.insertBefore(connLine, serverG);
  });

  // draw speaker nodes (right column)
  speakers.forEach((spk, i) => {
    const total = speakers.length;
    const y = total <= 1 ? cY - nodeH/2 : cY + (i - (total-1)/2) * 56 - nodeH/2;
    const offline = isOffline(spk);
    const color = offline ? '#374151' : '#00f0ff';
    const isSelected = spk.id === selectedId;

    const g = svgEl_('g', { transform:`translate(${rightX},${y})`, style:'cursor:pointer' });
    const rect = svgEl_('rect', { x:0,y:0,width:nodeW,height:nodeH,
      fill: isSelected ? 'rgba(0,240,255,0.12)' : 'rgba(0,240,255,0.04)',
      stroke: isSelected ? '#00f0ff' : color, 'stroke-width': isSelected?'2':'1',
      rx:'2', filter: offline?'':'url(#glow)' });
    const nameT = svgEl_('text', { x:8, y:14, fill: color,
      'font-family':'Share Tech Mono,monospace', 'font-size':'9', 'font-weight':'bold' });
    nameT.textContent = '⬤ ' + spk.name.slice(0,12);
    const roleT = svgEl_('text', { x:8, y:26, fill:'rgba(0,240,255,0.5)',
      'font-family':'Share Tech Mono,monospace', 'font-size':'7.5' });
    roleT.textContent = 'SPEAKER';
    g.appendChild(rect); g.appendChild(nameT); g.appendChild(roleT);

    g.addEventListener('click', () => {
      selectDevice(spk.id);
      if (pendingSource) {
        // connect: find streams that belong to the pending source
        const srcDev = devices[pendingSource];
        if (srcDev) {
          // connect all available streams to this speaker
          const toAssign = Array.from(streams);
          if (toAssign.length > 0) {
            const existing = spk.assigned_streams || [];
            const merged = [...new Set([...existing, ...toAssign])];
            fetch('/device/'+spk.id+'/streams', {
              method:'PATCH', headers:{'Content-Type':'application/json'},
              body:JSON.stringify({streams:merged})
            }).then(() => {
              if (devices[spk.id]) devices[spk.id].assigned_streams = merged;
              elDiagStatus.textContent = 'connected: '+srcDev.name+' → '+spk.name;
              pendingSource = null;
              drawDiagram(); renderDetail();
            });
          } else {
            elDiagStatus.textContent = 'no active streams to connect';
            pendingSource = null;
          }
        }
      }
    });
    svg.appendChild(g);

    // line center to speaker
    const lineColor = offline ? 'rgba(55,65,81,0.4)' : 'rgba(0,240,255,0.2)';
    const connLine = svgEl_('line', {
      x1: cX+40, y1: cY,
      x2: rightX, y2: y+nodeH/2,
      stroke: lineColor, 'stroke-width':'1', 'stroke-dasharray':'3 4'
    });
    svg.insertBefore(connLine, serverG);
  });

  // empty state
  if (mics.length === 0 && speakers.length === 0) {
    const msg = svgEl_('text', { x: W/2, y: H/2, 'text-anchor':'middle',
      fill:'rgba(255,0,60,0.3)', 'font-family':'Share Tech Mono,monospace', 'font-size':'12' });
    msg.textContent = 'no devices — open sender & receiver first';
    svg.appendChild(msg);
  }
}

function disconnectRoute(speakerId, streamName) {
  const spk = devices[speakerId];
  if (!spk) return;
  const newStreams = (spk.assigned_streams||[]).filter(s => s !== streamName);
  fetch('/device/'+speakerId+'/streams', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({streams:newStreams})
  }).then(() => {
    if (devices[speakerId]) devices[speakerId].assigned_streams = newStreams;
    elDiagStatus.textContent = 'disconnected: '+streamName+' from '+(spk.name||speakerId);
    drawDiagram(); renderDetail();
  });
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function setWsBadge(state) {
  const map = { ok:['ws-ok','LIVE'], err:['ws-err','DISCONNECTED'], wait:['ws-wait','CONNECTING'] };
  const [cls,txt] = map[state]||map.wait;
  elWsBadge.className = 'ws-badge ' + cls;
  elWsBadge.textContent = txt;
}

function connectWS() {
  setWsBadge('wait');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { setWsBadge('ok'); };
  ws.onclose = () => { setWsBadge('err'); setTimeout(connectWS, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    handleEvent(msg);
  };
}

function handleEvent(msg) {
  switch(msg.type) {
    case 'snapshot':
      devices = {};
      (msg.devices||[]).forEach(d => devices[d.id]=d);
      streams = new Set(msg.streams||[]);
      break;
    case 'device_joined':
      if(msg.device) devices[msg.device.id]=msg.device;
      break;
    case 'device_left':
      delete devices[msg.id];
      if(selectedId===msg.id){selectedId=null;}
      if(pendingSource===msg.id){pendingSource=null;}
      break;
    case 'stream_added':
      streams.add(msg.name); break;
    case 'stream_removed':
      streams.delete(msg.name); break;
    case 'volume_changed':
      if(devices[msg.device_id]) devices[msg.device_id].volume=msg.volume; break;
    case 'route_changed':
      if(devices[msg.speaker_id]) {
        const d=devices[msg.speaker_id];
        if(!d.assigned_streams) d.assigned_streams=[];
        if(msg.connected){if(!d.assigned_streams.includes(msg.source))d.assigned_streams.push(msg.source);}
        else d.assigned_streams=d.assigned_streams.filter(s=>s!==msg.source);
      }
      break;
  }
  renderDevices(); renderStreams(); drawDiagram();
  if(selectedId && devices[selectedId]) renderDetail();
  else if(selectedId && !devices[selectedId]){selectedId=null;elDetail.innerHTML='<div class="empty-msg">select a device</div>';}
}

// ── periodic offline tick ──────────────────────────────────────────────────
setInterval(() => { renderDevices(); if(selectedId&&devices[selectedId]) renderDetail(); }, 5000);

// ── resize diagram ─────────────────────────────────────────────────────────
const ro = new ResizeObserver(() => drawDiagram());
ro.observe(svgEl.parentElement);

// ── init ───────────────────────────────────────────────────────────────────
connectWS();
</script>
