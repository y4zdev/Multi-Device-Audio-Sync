<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AirLink // MANAGER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-hover: #2563eb;
      --accent-danger: #ef4444;
      --accent-success: #22c55e;
      --accent-warning: #f59e0b;
      --accent-purple: #a855f7;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      display: grid;
      grid-template-rows: 72px 1fr;
      grid-template-columns: 1fr;
      grid-template-areas: 'hdr' 'center';
      gap: 16px;
      padding: 16px;
    }
    
    .bg-static {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.04), transparent 50%),
                  radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.03), transparent 50%);
    }

    /* ── header ── */
    header {
      grid-area: hdr;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    
    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .brand span {
      font-size: 0.8rem;
      color: var(--accent-primary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .hdr-right { display: flex; align-items: center; gap: 24px; margin-left: auto; font-size: 0.85rem; font-weight: 500; }
    .nav-link { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--text-main); }
    
    .ws-badge {
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
    }
    .ws-ok { color: var(--accent-success); border-color: rgba(34, 197, 94, 0.3); background: rgba(34, 197, 94, 0.1); }
    .ws-err { color: var(--accent-danger); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
    .ws-wait { color: var(--text-muted); }

    /* ── panels ── */
    .panel-wrap {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panelCenter { grid-area: center; }
    
    .panel-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .node-popup {
      position: absolute; background: var(--bg-panel); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px; width: 280px; z-index: 100;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none; flex-direction: column; gap: 12px;
      pointer-events: auto;
    }
    .np-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .np-title { font-weight: 600; font-size: 0.95rem; color: #fff; margin-bottom: 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .np-role { font-size: 0.7rem; font-weight: 500; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; display:inline-block; }
    .np-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display:flex; align-items:center; justify-content:center; }
    .np-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
    
    .np-vol-row { display: flex; align-items: center; gap: 12px; margin-top:4px; }
    .np-vol-row input[type=range] { flex: 1; accent-color: var(--accent-primary); cursor: pointer; }
    .np-vol-val { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); min-width: 44px; text-align: right; }
    
    .np-btn-remove {
      width: 100%; padding: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--accent-danger); font-size: 0.85rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top:8px;
    }
    .np-btn-remove:hover { background: rgba(239, 68, 68, 0.2); }
    .role-mic { background: rgba(168, 85, 247, 0.1); color: var(--accent-purple); border: 1px solid rgba(168, 85, 247, 0.2); }
    .role-speaker { background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); border: 1px solid rgba(59, 130, 246, 0.2); }
    .role-controller { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); border: 1px solid rgba(245, 158, 11, 0.2); }

    /* ── diagram (Center) ── */
    #diagram { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    #diagramSvg { width: 100%; height: 100%; flex: 1; user-select: none; }
    .diag-hint { position: absolute; bottom: 20px; left: 20px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; pointer-events: none; }
    .diag-mode { position: absolute; top: 20px; right: 20px; font-size: 0.75rem; color: var(--accent-warning); font-weight: 600; pointer-events: none; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; }

    .toolbar {
      position: absolute; bottom: 24px; right: 24px;
      background: rgba(15, 15, 20, 0.85); border: 1px solid rgba(255,255,255,0.1);
      padding: 8px; border-radius: 16px; display: flex; gap: 8px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .tool-btn {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 12px; cursor: pointer; color: var(--text-muted);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }
    .tool-btn.active { background: var(--accent-primary); color: #000; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

    /* ── right panel detail ── */
    .detail-content { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .detail-section { display: flex; flex-direction: column; gap: 8px; }
    .detail-label { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; }
    .detail-val { font-size: 0.95rem; font-weight: 500; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
    
    .vol-row { display: flex; align-items: center; gap: 12px; }
    .vol-row input[type=range] { flex: 1; accent-color: var(--accent-primary); cursor: pointer; }
    .vol-val { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-main); min-width: 44px; text-align: right; }
    
    .assign-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; }
    .assign-row input[type=checkbox] { accent-color: var(--accent-primary); width: 16px; height: 16px; cursor: pointer; }
    .assign-row label { flex: 1; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    
    .btn-remove {
      width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--accent-danger); font-size: 0.85rem; font-weight: 600; border-radius: 8px;
      cursor: pointer; transition: all 0.2s; margin-top: auto;
    }
    .btn-remove:hover { background: rgba(239, 68, 68, 0.2); }
    .empty-hint { font-size: 0.85rem; color: var(--text-muted); text-align: center; padding: 20px; }
    
    hr.sep { border: none; border-top: 1px solid var(--border-color); margin: 8px 0; }

    /* Toast Container */
    #toastContainer { position: fixed; top: 96px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; pointer-events: none; }
    .toast { background: var(--bg-panel); border: 1px solid var(--border-color); backdrop-filter: blur(16px); padding: 12px 16px; border-radius: 12px; color: #fff; font-size: 0.85rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s forwards; pointer-events: auto; display: flex; align-items: center; gap: 12px; }
    .toast.out { animation: toastOut 0.3s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(50px); } }

    @media (max-width: 1000px) {
      body {
        grid-template-rows: 72px 1fr;
        grid-template-areas: 'hdr' 'center';
      }
    }
  </style>
</head>
<body>
<div class="bg-static"></div>
<div id="toastContainer"></div>

<header>
  <div class="brand">
    <h1>AirLink</h1>
    <span>Controller</span>
  </div>
  <div class="hdr-right">
    <a class="nav-link" href="/sender">Sender</a>
    <a class="nav-link" href="/receiver">Receiver</a>
    <a class="nav-link" href="/controller">Controller</a>
    <a class="nav-link" href="/admin">Admin</a>
    <div class="user-profile" style="width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color);" title="User Profile" onclick="window.location.href='/logout'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </div>
</header>

<!-- CENTER: diagram -->
<div class="panel-wrap" id="panelCenter">
  <div class="panel-title">
    <span>Routing Diagram</span>
    <div style="display:flex;gap:16px;align-items:center;">
      <span id="diagStreamCount" style="color:var(--text-muted); font-weight:500; font-size:0.8rem;">0 streams</span>
      <span id="wsBadge" class="ws-badge ws-wait">Connecting...</span>
    </div>
  </div>
  <div id="diagram">
    <div class="toolbar" id="toolbar">
      <button class="tool-btn" id="toolAlign" title="Auto Align" onclick="autoAlign()">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      </button>
      <button class="tool-btn active" id="toolSelect" title="Select / Move" onclick="setTool('select')">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      </button>
      <button class="tool-btn" id="toolConnect" title="Connect Nodes" onclick="setTool('connect')">
         <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
      </button>
    </div>
    <svg id="diagramSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="diag-hint" id="diagHint">Drag nodes to organize. Use Connect tool to route.</div>
    <div class="diag-mode" id="diagMode" style="display:none;"></div>
    <div id="devicePopup" class="node-popup"></div>
  </div>
</div>

<script>
'use strict';
// ── state ─────────────────────────────────────────────────────────────────────
const OFFLINE_MS = 15_000;
let devices    = {};  
let streams    = {};
let selectedId = null;
let ws         = null;
let pendingMic = null;  

let currentTool = 'select';
let customPos = JSON.parse(localStorage.getItem('airlink_pos')||'{}');

function setTool(t) {
  currentTool = t;
  document.getElementById('toolSelect').classList.toggle('active', t==='select');
  document.getElementById('toolConnect').classList.toggle('active', t==='connect');
  pendingMic = null;
  elDiagMode.style.display = t==='connect' ? 'block' : 'none';
  elDiagMode.textContent = t==='connect' ? 'CONNECT MODE: Click Mic, then Speaker' : '';
  elDiagHint.textContent = t==='connect' ? 'Select a MIC source node to begin routing.' : 'Drag nodes to organize. Click to select.';
  renderDiagram();
}

function autoAlign() {
  const H = elDiagSvg.clientHeight || 400;
  const W = elDiagSvg.clientWidth || 600;
  const cy = H / 2;
  
  const streamNodes = Object.keys(streams);
  const gapMics = Math.min(90, (H-80) / Math.max(streamNodes.length, 1));
  const startYMics = cy - ((streamNodes.length-1)*gapMics)/2;
  streamNodes.forEach((id, i) => { customPos['STR_'+id] = { x: 100, y: startYMics + i*gapMics }; });

  const spks = Object.values(devices).filter(d => d.role !== 'controller');
  const gapSpks = Math.min(90, (H-80) / Math.max(spks.length, 1));
  const startYSpks = cy - ((spks.length-1)*gapSpks)/2;
  spks.forEach((dev, i) => { customPos[dev.id] = { x: W - 100, y: startYSpks + i*gapSpks }; });

  localStorage.setItem('airlink_pos', JSON.stringify(customPos));
  renderDiagram();
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const elWsBadge   = document.getElementById('wsBadge');
const elDiagSvg   = document.getElementById('diagramSvg');
const elDiagHint  = document.getElementById('diagHint');
const elDiagMode  = document.getElementById('diagMode');
const elStreamCnt = document.getElementById('diagStreamCount');

// ── helpers ───────────────────────────────────────────────────────────────────
function isOffline(dev) { return String(dev.status).toLowerCase() === 'offline'; }
function roleClass(r) { return {mic:'role-mic',speaker:'role-speaker',controller:'role-controller'}[r]||'role-controller'; }

function showToast(msg, isMic=false) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const t = document.createElement('div');
  t.className = 'toast';
  const iconCol = isMic ? 'var(--accent-purple)' : 'var(--accent-primary)';
  t.innerHTML = `<div style="width: 8px; height: 8px; border-radius: 50%; background: ${iconCol}; box-shadow: 0 0 8px ${iconCol};"></div><div>${msg}</div>`;
  container.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 4000);
}

// ── render diagram ────────────────────────────────────────────────────────────
function renderDiagram() {
  const svg = elDiagSvg;
  const W = svg.clientWidth  || svg.parentElement.clientWidth  || 600;
  const H = svg.clientHeight || svg.parentElement.clientHeight || 400;
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  elStreamCnt.textContent = Object.keys(streams).filter(k => streams[k].online).length + ' active streams';

  svg.innerHTML = `
    <defs>
      <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(59, 130, 246, 0.8)"/>
      </marker>
    </defs>`;

  const spks = Object.values(devices).filter(d => d.role !== 'controller');

  const streamNodesSet = new Set(Object.keys(streams));
  spks.forEach(spk => {
    (spk.assigned_streams||[]).forEach(s => streamNodesSet.add(s));
  });
  const streamNodes = Array.from(streamNodesSet);

  const cy = H / 2;
  const LX = 100;
  const RX = W - 100;
  const NODE_R = 30;

  function placeNodes(list, defaultX, isStream) {
    const gap = Math.min(90, (H-80) / Math.max(list.length,1));
    const totalH = (list.length-1)*gap;
    const startY = cy - totalH/2;
    list.forEach((item, i) => {
      const id = isStream ? 'STR_'+item : item.id;
      if (!customPos[id]) customPos[id] = { x: defaultX, y: startY + i*gap };
    });
  }
  placeNodes(streamNodes, LX, true);
  placeNodes(spks, RX, false);

  const drawnRoutes = new Set();
  spks.forEach(spk => {
    (spk.assigned_streams||[]).forEach(sname => {
      const sId = 'STR_'+sname;
      if (!customPos[sId] || !customPos[spk.id]) return;
      const key = sId+'->'+spk.id;
      if (drawnRoutes.has(key)) return;
      drawnRoutes.add(key);
      const p1 = customPos[sId], p2 = customPos[spk.id];
      const mx1 = p1.x + NODE_R + 10, mx2 = p2.x - NODE_R - 10;
      const cmx = (mx1+mx2)/2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${mx1},${p1.y} C${cmx},${p1.y} ${cmx},${p2.y} ${mx2},${p2.y}`);
      path.setAttribute('fill','none');
      
      const isSrcActive = streams[sname]?.online;
      const isSpkActive = !isOffline(spk);
      const isActiveFlow = isSrcActive && isSpkActive;
      
      path.setAttribute('stroke', isActiveFlow ? 'rgba(59, 130, 246, 0.8)' : 'rgba(107, 114, 128, 0.4)');
      path.setAttribute('stroke-width','2');
      if (isActiveFlow) {
        path.setAttribute('marker-end','url(#arr)');
        path.setAttribute('stroke-dasharray', '8 4');
        path.style.animation = 'flowAnim 0.8s linear infinite';
      } else {
        path.setAttribute('stroke-dasharray', 'none');
      }

      path.style.cursor = 'pointer';
      path.addEventListener('click', (e) => { e.stopPropagation(); disconnectRoute(sname, spk.id); });
      svg.appendChild(path);
      
      const lx = (mx1+mx2)/2, ly = (p1.y+p2.y)/2 - 10;
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', lx); txt.setAttribute('y', ly);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('font-family',"'Inter', sans-serif");
      txt.setAttribute('font-size','10');
      txt.setAttribute('font-weight','500');
      txt.setAttribute('fill', isActiveFlow ? 'rgba(255, 255, 255, 0.8)' : 'rgba(107, 114, 128, 0.8)');
      txt.textContent = sname;
      svg.appendChild(txt);
    });
  });



  if (pendingMic && customPos['STR_'+pendingMic]) {
    const pp = customPos['STR_'+pendingMic];
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx',pp.x); ring.setAttribute('cy',pp.y); ring.setAttribute('r', NODE_R+8);
    ring.setAttribute('fill','none'); ring.setAttribute('stroke',"var(--accent-warning)"); ring.setAttribute('stroke-width','2');
    ring.setAttribute('stroke-dasharray','4 4');
    svg.appendChild(ring);
  }

  streamNodes.forEach(sname => {
    const p   = customPos['STR_'+sname];
    const isSrcActive = streams[sname]?.online;
    const col = isSrcActive ? (sname===pendingMic ? 'var(--accent-warning)' : 'var(--accent-purple)') : 'var(--accent-danger)';
    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = currentTool==='select'?'grab':'pointer';
    g.setAttribute('data-node', 'STR_'+sname);
    g.innerHTML = `
      <circle cx="${p.x}" cy="${p.y}" r="${NODE_R}" fill="rgba(255,255,255,0.02)" stroke="${col}" stroke-width="${sname===pendingMic?2.5:1.5}"/>
      <text x="${p.x}" y="${p.y-4}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="10" fill="${col}">MIC</text>
      <text x="${p.x}" y="${p.y+10}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="500" font-size="10" fill="${isSrcActive?'#d1d5db':'#6b7280'}">${truncate(sname,12)}</text>`;
    svg.appendChild(g);
  });

  spks.forEach(dev => {
    const p   = customPos[dev.id];
    const off = isOffline(dev);
    const col = off ? 'var(--accent-danger)' : 'var(--accent-primary)';
    const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = currentTool==='select'?'grab':'pointer';
    g.setAttribute('data-node', dev.id);
    g.innerHTML = `
      <rect x="${p.x-NODE_R}" y="${p.y-NODE_R}" width="${NODE_R*2}" height="${NODE_R*2}" rx="8" fill="rgba(255,255,255,0.02)" stroke="${col}" stroke-width="1.5" />
      <text x="${p.x}" y="${p.y-4}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="10" fill="${col}">SPK</text>
      <text x="${p.x}" y="${p.y+10}" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="500" font-size="10" fill="${off?'#6b7280':'#d1d5db'}">${truncate(dev.name,12)}</text>`;
    svg.appendChild(g);
  });
}

const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes dashIn { to { stroke-dashoffset: 0; } }
  @keyframes flowAnim { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
`;
document.head.appendChild(styleEl);

// ── Drag & Interaction ────────────────────────────────────────────────────────
let isDragging = false;
let dragNodeId = null;

elDiagSvg.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const target = e.target.closest('g[data-node]');
  if (target) {
    const id = target.dataset.node;
    selectDevice(id);
  }
});

elDiagSvg.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  const target = e.target.closest('g[data-node]');
  if (!target) {
    pendingMic = null; 
    if(currentTool==='connect') {
       elDiagMode.textContent = 'CONNECT MODE: Click Mic, then Speaker';
       elDiagHint.textContent = 'Select a MIC source node to begin routing.';
    }
    renderDiagram();
    return;
  }
  const id = target.dataset.node;

  if (currentTool === 'select') {
    isDragging = true;
    dragNodeId = id;
  } else if (currentTool === 'connect') {
    if (id.startsWith('STR_')) {
      pendingMic = id.slice(4);
      elDiagMode.textContent = 'CONNECT MODE: Select Speaker Destination';
      elDiagHint.textContent = 'Now click a SPEAKER node to route audio.';
      renderDiagram();
    } else {
      if (pendingMic) onSpkClick(id);
    }
  }
});

elDiagSvg.addEventListener('mousemove', (e) => {
  if (isDragging && dragNodeId && currentTool === 'select') {
    const pt = elDiagSvg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(elDiagSvg.getScreenCTM().inverse());
    customPos[dragNodeId] = { x: svgP.x, y: svgP.y };
    renderDiagram();
  }
});

const stopDrag = () => {
  if (isDragging) {
    isDragging = false;
    dragNodeId = null;
    localStorage.setItem('airlink_pos', JSON.stringify(customPos));
  }
};
elDiagSvg.addEventListener('mouseup', stopDrag);
elDiagSvg.addEventListener('mouseleave', stopDrag);

function truncate(s,n) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

// ── logic wrappers ────────────────────────────────────────────────────────────

function onStreamClick(sname) {
  setTool('connect');
  pendingMic = sname;
  elDiagMode.textContent = 'CONNECT MODE: Select Speaker Destination';
  elDiagHint.textContent = 'Now click a SPEAKER node to route audio.';
  renderDiagram();
}

function onSpkClick(id) {
  if (isOffline(devices[id])) return;
  if (pendingMic) {
    const spk = devices[id];
    const current = new Set(spk.assigned_streams||[]);
    current.add(pendingMic);
    fetch('/device/'+id+'/streams', {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ streams: Array.from(current) })
    }).then(() => {
      if (devices[id]) devices[id].assigned_streams = Array.from(current);
      pendingMic = null;
      elDiagMode.textContent = 'IDLE';
      elDiagHint.textContent = 'Click a MIC, then click a SPEAKER to route.';
      renderDiagram();
      if (selectedId === id) renderDetail();
    });
  } else {
    selectDevice(id);
  }
}

function disconnectRoute(streamName, spkId) {
  const spk = devices[spkId];
  if (!spk) return;
  const newStreams = (spk.assigned_streams||[]).filter(s => s !== streamName);
  fetch('/device/'+spkId+'/streams', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ streams: newStreams })
  }).then(() => {
    if (devices[spkId]) devices[spkId].assigned_streams = newStreams;
    renderDiagram();
  });
}

// ── popup ─────────────────────────────────────────────────────────────────────
let selectedPopupId = null;

function selectDevice(id) {
  const isMic = id.startsWith('STR_');
  const dName = isMic ? id.slice(4) : null;
  const dev = isMic ? { 
    id, name: dName, role: 'mic', volume: streams[dName]?.volume ?? 1.0, 
    status: streams[dName]?.online ? 'online' : 'offline', assigned_streams: [] 
  } : devices[id];
  if (!dev) return;

  selectedPopupId = id;
  const popup = document.getElementById('devicePopup');
  const p = customPos[id];
  if (!p) return;
  
  // calculate center of screen vs node
  const svgRect = elDiagSvg.getBoundingClientRect();
  let left = p.x + 30; // offset right
  if (left + 280 > svgRect.width) left = p.x - 310; // flip left if offscreen
  
  popup.style.left = left + 'px';
  popup.style.top = (p.y - 40) + 'px';
  popup.style.display = 'flex';
  
  const off = isOffline(dev);
  
  popup.innerHTML = `
    <div class="np-header">
      <div style="flex:1; min-width:0; margin-right:8px;">
        <div class="np-title">${dev.name}</div>
        <span class="np-role ${roleClass(dev.role)}">${dev.role}</span>
        <span style="font-size:0.7rem; color:${off?'var(--accent-danger)':'var(--accent-success)'}; margin-left:6px; font-weight:600;">${off?'OFFLINE':'ONLINE'}</span>
      </div>
      <button class="np-close" onclick="closePopup()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    
    <div class="np-vol-row">
      <input type="range" id="popVol" min="0" max="1" step="0.05" value="${dev.volume}">
      <span class="np-vol-val" id="popVolVal">${(dev.volume*100).toFixed(0)}%</span>
      <button id="popMute" style="padding:4px 8px; font-size:0.75rem; border-radius:4px; border:1px solid var(--border-color); background:${dev.volume===0?'var(--accent-danger)':'transparent'}; color:var(--text-main); cursor:pointer;">MUTE</button>
    </div>
    
    <button class="np-btn-remove" id="popRemove">Delete Device Data</button>
  `;

  let volT = null;
  const sl = document.getElementById('popVol');
  const vd = document.getElementById('popVolVal');
  const bm = document.getElementById('popMute');
  let lastVol = dev.volume > 0 ? dev.volume : 1.0;

  function pushVol(v) {
    vd.textContent = (v*100).toFixed(0)+'%';
    bm.style.background = v===0 ? 'var(--accent-danger)' : 'transparent';
    if (isMic) {
      streams[dName].volume = v;
      // We send this to backend (although backend handles it loosely, sender will apply it)
      clearTimeout(volT);
      volT = setTimeout(() => {
        fetch('/device/'+dName+'/volume', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({volume:v}) }).catch(e=>{});
      }, 150);
    } else {
      if (devices[id]) devices[id].volume = v;
      clearTimeout(volT);
      volT = setTimeout(() => {
        fetch('/device/'+id+'/volume', {
          method:'PATCH', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({volume:v})
        });
      }, 150);
    }
  }

  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    if (v > 0) lastVol = v;
    pushVol(v);
  });

  bm.addEventListener('click', () => {
    const isMuted = isMic ? (streams[dName]?.volume === 0) : (devices[id].volume === 0);
    const newVol = isMuted ? lastVol : 0;
    sl.value = newVol;
    pushVol(newVol);
  });

  document.getElementById('popRemove').addEventListener('click', () => {
    if (isMic) {
      delete streams[dName];
      closePopup();
      renderDiagram();
    } else {
      fetch('/device/'+id, {method:'DELETE'}).then(() => {
        closePopup();
        delete devices[id];
        renderDiagram();
      });
    }
  });
}

function closePopup() {
  selectedPopupId = null;
  document.getElementById('devicePopup').style.display = 'none';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function setWs(state) {
  const m = {ok:['ws-badge ws-ok','Connected'],err:['ws-badge ws-err','Offline'],wait:['ws-badge ws-wait','Connecting...']};
  const [cls,txt] = m[state]||m.wait;
  elWsBadge.className=cls; elWsBadge.textContent=txt;
}

function connectWS() {
  setWs('wait');
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { setWs('ok'); };
  ws.onclose = () => { setWs('err'); setTimeout(connectWS,3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    let msg; try { msg=JSON.parse(e.data); } catch { return; }
    applyEvent(msg);
  };
}

function applyEvent(msg) {
  switch(msg.type) {
    case 'snapshot':
      const newIds = new Set((msg.devices||[]).map(d=>d.id));
      Object.keys(devices).forEach(id => { if(devices[id].role !== 'controller' && !newIds.has(id)) delete devices[id]; });
      (msg.devices||[]).forEach(d=>{ if(!devices[d.id]) devices[d.id]=d; else Object.assign(devices[d.id],d); });
      
      const newStreams = new Set(msg.streams||[]);
      Object.keys(streams).forEach(s => { if(!newStreams.has(s)) delete streams[s]; });
      (msg.streams||[]).forEach(s=>{ if(!streams[s]) streams[s]={online:true, volume:1.0}; else streams[s].online=true; }); 
      break;
    case 'device_joined': 
      if(msg.device) {
        if (msg.device.role !== 'controller') {
          Object.values(devices).forEach(d => {
            if (d.id !== msg.device.id && d.name === msg.device.name && d.role === msg.device.role) {
              if (isOffline(d)) {
                delete devices[d.id];
                if(customPos[d.id]) { customPos[msg.device.id] = customPos[d.id]; delete customPos[d.id]; }
              }
            }
          });
        }
        if(!devices[msg.device.id]) devices[msg.device.id]=msg.device; else Object.assign(devices[msg.device.id],msg.device);
        if(msg.device.role !== 'controller') showToast(`New Speaker joined: ${msg.device.name}`);
      }
      break;
    case 'device_updated':
      if (msg.device) {
        if(!devices[msg.device.id]) devices[msg.device.id]=msg.device; else Object.assign(devices[msg.device.id],msg.device);
      }
      break;
    case 'device_left':   
      if(devices[msg.id]) devices[msg.id].status = 'Offline';
      if(selectedPopupId===msg.id) closePopup(); 
      break;
    case 'stream_added':  
      if(!streams[msg.name]) {
        streams[msg.name] = {online:true, volume:1.0}; 
        showToast(`New Mic active: ${msg.name}`, true);
      } else streams[msg.name].online = true;
      break;
    case 'stream_removed':
      if (streams[msg.name]) streams[msg.name].online = false; 
      if (pendingMic===msg.name) pendingMic=null; 
      break;
    case 'volume_changed': 
      if(devices[msg.device_id]) devices[msg.device_id].volume=msg.volume; 
      // Do not re-render popup on volume_changed to avoid interrupting sliding
      break;
    case 'route_changed':
      if (devices[msg.speaker_id]) {
        const d=devices[msg.speaker_id];
        if (msg.connected) { if(!d.assigned_streams.includes(msg.source)) d.assigned_streams.push(msg.source); }
        else d.assigned_streams=d.assigned_streams.filter(s=>s!==msg.source);
      } break;
  }
  renderDiagram();
  if (selectedPopupId && !devices[selectedPopupId]) closePopup();
}

setInterval(()=>{ renderDiagram(); }, 5000);
window.addEventListener('resize', ()=>{ setTimeout(renderDiagram,50); });

connectWS();
</script>
