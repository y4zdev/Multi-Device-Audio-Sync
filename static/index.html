<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Y4Z.LINK // CYBER-SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --bg-panel: rgba(10, 12, 16, 0.85);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff003c;
      --neon-yellow: #fcee0a;
      --neon-green: #00ff41;
      --text-main: #d1d5db;
      --text-muted: #6b7280;
      --grid-line: rgba(0, 240, 255, 0.08);
      --font-ui: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --clip-angle: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
      --clip-reverse: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-ui);
      overflow: hidden;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* CRT Scanline Overlay */
    body::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 999;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    /* Grid Background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
      opacity: 0.5;
    }

    /* Layout */
    .hud-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      gap: 10px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 10px 15px;
      background: var(--bg-panel);
      border: 1px solid var(--neon-cyan);
      border-left: 4px solid var(--neon-cyan);
      clip-path: var(--clip-angle);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }

    .brand h1 {
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin: 0;
      line-height: 1;
    }
    .brand span {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-sys {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
    .status-sys .dot {
      width: 8px; height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      box-shadow: 0 0 5px var(--text-muted);
    }
    .status-sys .dot.live { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
    .status-sys .dot.warn { background: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }
    .status-sys .dot.err { background: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta); }

    /* Core Layout Split */
    .core-area {
      display: flex;
      flex: 1;
      gap: 10px;
      min-height: 0; /* allows flex children to shrink */
    }

    .visualizer-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, rgba(0,240,255,0.05) 0%, transparent 60%), #000;
      border: 1px solid rgba(0, 240, 255, 0.3);
      clip-path: var(--clip-reverse);
      overflow: hidden;
      display: flex;
    }
    canvas { width: 100%; height: 100%; display: block; }

    /* Side Panel */
    .side-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .panel-box {
      background: var(--bg-panel);
      border: 1px solid rgba(0, 240, 255, 0.2);
      padding: 15px;
      clip-path: var(--clip-angle);
    }

    .panel-header {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px dashed rgba(0, 240, 255, 0.3);
      padding-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    /* Cyber Buttons */
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      flex: 1;
      min-width: 80px;
      background: transparent;
      color: var(--text-main);
      border: 1px solid rgba(0, 240, 255, 0.4);
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
      transition: all 0.2s ease;
    }
    button:hover { background: rgba(0, 240, 255, 0.1); border-color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); }
    button:active { transform: scale(0.98); }
    button.primary { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,240,255,0.05); }
    button.primary:hover { background: var(--neon-cyan); color: #000; }
    button.danger { border-color: var(--neon-magenta); color: var(--neon-magenta); }
    button.danger:hover { background: var(--neon-magenta); color: #000; text-shadow: none; }
    button.active { background: rgba(0, 240, 255, 0.2); border-color: var(--neon-cyan); color: var(--neon-cyan); }
    
    /* Diagnostics Grid */
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .data-item {
      display: flex;
      flex-direction: column;
    }
    .data-k { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
    .data-v { font-family: var(--font-mono); font-size: 0.85rem; color: var(--neon-yellow); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

    /* Toggles */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .toggle-label { font-family: var(--font-mono); font-size: 0.8rem; }
    .cyber-switch {
      position: relative; width: 40px; height: 20px;
    }
    .cyber-switch input { display: none; }
    .cyber-slider {
      position: absolute; inset: 0; border: 1px solid rgba(0, 240, 255, 0.4);
      background: rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s;
    }
    .cyber-slider::before {
      content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
      background: var(--text-muted); transition: 0.2s;
    }
    .cyber-switch input:checked + .cyber-slider { border-color: var(--neon-cyan); }
    .cyber-switch input:checked + .cyber-slider::before {
      transform: translateX(20px); background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan);
    }

    /* Terminal Logs */
    .terminal-logs {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--neon-green);
      background: rgba(0, 255, 65, 0.05);
      border: 1px solid rgba(0, 255, 65, 0.2);
      padding: 10px;
      height: 120px;
      overflow-y: auto;
      clip-path: var(--clip-reverse);
    }
    .log-line { margin-bottom: 4px; word-wrap: break-word; }
    .log-time { color: var(--text-muted); margin-right: 5px; }
    .log-err { color: var(--neon-magenta); }
    .log-warn { color: var(--neon-yellow); }

    /* Energy Bar */
    .energy-bar-wrap { margin-top: auto; padding: 10px; }
    .energy-label { font-family: var(--font-mono); font-size: 0.7rem; display: flex; justify-content: space-between; margin-bottom: 4px; color: var(--neon-cyan);}
    .energy-track { width: 100%; height: 6px; background: rgba(0,240,255,0.1); position: relative; overflow: hidden; }
    .energy-fill { height: 100%; background: var(--neon-cyan); width: 0%; box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.1s linear;}

    /* Utilities */
    .hidden { display: none !important; }
    audio { display: none; }

    @media (max-width: 800px) {
      .core-area { flex-direction: column; }
      .side-panel { width: 100%; flex: 0 0 auto; }
      .visualizer-container { min-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  
  <div class="hud-wrapper">
    <header class="header-bar">
      <div class="brand">
        <h1>Audio_Sync_LINK</h1>
        <span>// BY Y4Z.DEV</span>
      </div>
      <div class="status-sys">
        <span id="dot" class="dot"></span>
        <span id="statusText">SYS.IDLE</span>
      </div>
    </header>

    <main class="core-area">
      
      <section class="visualizer-container">
        <canvas id="visualizer"></canvas>
        <div style="position: absolute; bottom: 10px; left: 15px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--neon-cyan); opacity: 0.6;">
          > <span id="vizLabel">AWAITING_SIGNAL...</span>
        </div>
      </section>

      <aside class="side-panel">
        
        <div class="panel-box">
          <div class="panel-header"><span>[01] Transport</span></div>
          <div class="btn-group">
            <button id="connectBtn" class="primary">Initialize</button>
            <button id="playBtn" class="hidden" style="color:var(--neon-yellow); border-color:var(--neon-yellow);">Force Play</button>
            <button id="stopBtn" class="danger">Terminate</button>
          </div>
        </div>

        <div class="panel-box">
          <div class="panel-header"><span>[02] Sys_Readout</span> <span id="energyValue">0%</span></div>
          <div class="data-grid">
            <div class="data-item"><span class="data-k">NET.STATE</span><span class="data-v" id="transportVal">OFFLINE</span></div>
            <div class="data-item"><span class="data-k">ICE.PROTO</span><span class="data-v" id="iceVal">STANDBY</span></div>
            <div class="data-item"><span class="data-k">MEDIA.TRK</span><span class="data-v" id="trackVal">NULL</span></div>
            <div class="data-item"><span class="data-k">PLAYBACK</span><span class="data-v" id="playbackVal">HALTED</span></div>
          </div>
          
          <div class="energy-bar-wrap">
            <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
          </div>
        </div>

        <div class="panel-box">
          <div class="panel-header"><span>[03] Config</span></div>
          
          <div class="toggle-row">
            <span class="toggle-label">MODE: SPECTRUM</span>
            <div class="btn-group" style="width: auto;">
              <button id="modeSpectrumBtn" class="active" style="min-width: 40px; padding: 4px;">SPC</button>
              <button id="modeWaveBtn" style="min-width: 40px; padding: 4px;">WAV</button>
            </div>
          </div>

          <div class="toggle-row">
            <span class="toggle-label">SYS.WAKELOCK</span>
            <label class="cyber-switch">
              <input type="checkbox" id="wakeLockToggle">
              <span class="cyber-slider"></span>
            </label>
          </div>
          <div class="data-v" id="heroWake" style="font-size:0.65rem; text-align:right; margin-bottom:8px;">INACTIVE</div>

          <div class="toggle-row">
            <span class="toggle-label">PWR.SAVE</span>
            <label class="cyber-switch">
              <input type="checkbox" id="powerToggle">
              <span class="cyber-slider"></span>
            </label>
          </div>
          
          <div class="toggle-row" style="margin-top: 10px;">
             <button id="fullscreenBtn" style="width:100%;">TOGGLE_FULLSCREEN</button>
          </div>
        </div>

        <div class="terminal-logs" id="logs"></div>

      </aside>
    </main>
    <audio id="audioPlayer" playsinline></audio>
  </div>

  <script>
    // Elements
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const logs = document.getElementById('logs');
    
    const connectBtn = document.getElementById('connectBtn');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    const modeSpectrumBtn = document.getElementById('modeSpectrumBtn');
    const modeWaveBtn = document.getElementById('modeWaveBtn');
    const wakeLockToggle = document.getElementById('wakeLockToggle');
    const powerToggle = document.getElementById('powerToggle');
    
    const elements = {
      dot: document.getElementById('dot'),
      statusText: document.getElementById('statusText'),
      vizLabel: document.getElementById('vizLabel'),
      transportVal: document.getElementById('transportVal'),
      iceVal: document.getElementById('iceVal'),
      trackVal: document.getElementById('trackVal'),
      playbackVal: document.getElementById('playbackVal'),
      heroWake: document.getElementById('heroWake'),
      energyFill: document.getElementById('energyFill'),
      energyValue: document.getElementById('energyValue'),
      audioPlayer: document.getElementById('audioPlayer')
    };

    // State
    const state = {
      vizMode: 'spectrum',
      powerSave: false,
      pageVisible: true,
      isMobile: false
    };

    let pc = null, wakeLock = null, audioCtx = null, analyser = null, sourceNode = null, animationId = null;

    // Utils
    function log(msg, type = '') {
      const line = document.createElement('div');
      line.className = `log-line ${type === 'err' ? 'log-err' : type === 'warn' ? 'log-warn' : ''}`;
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      line.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    }

    function setSysState(text, level = 'idle') {
      elements.statusText.textContent = `SYS.${text}`;
      elements.dot.className = 'dot ' + level;
    }

    function updateEnergy(percent) {
      const v = Math.min(100, Math.max(0, Math.round(percent)));
      elements.energyFill.style.width = `${v}%`;
      elements.energyValue.textContent = `${v}%`;
    }

    // WakeLock API - Mobile safe implementation
    async function handleWakeLock() {
      if (!wakeLockToggle.checked) {
        if (wakeLock) {
            try { await wakeLock.release(); } catch(e) {}
            wakeLock = null;
        }
        elements.heroWake.textContent = 'INACTIVE';
        log('Wakelock released.', 'warn');
        return;
      }

      if (!('wakeLock' in navigator)) {
        elements.heroWake.textContent = 'UNSUPPORTED (HTTPS/API REQ)';
        elements.heroWake.style.color = 'var(--neon-magenta)';
        wakeLockToggle.checked = false;
        log('WakeLock API not supported by this browser.', 'err');
        return;
      }

      try {
        wakeLock = await navigator.wakeLock.request('screen');
        elements.heroWake.textContent = 'ACTIVE';
        elements.heroWake.style.color = 'var(--neon-cyan)';
        log('Wakelock acquired.', 'ok');
        
        wakeLock.addEventListener('release', () => {
          if(wakeLockToggle.checked) {
              elements.heroWake.textContent = 'DROPPED_BY_SYS';
              log('System forced wakelock release.', 'warn');
          }
        });
      } catch (err) {
        elements.heroWake.textContent = 'DENIED';
        wakeLockToggle.checked = false;
        log(`Wakelock denied: ${err.message}`, 'err');
      }
    }

    // Canvas / Render Logic
    function resize() {
      const rect = canvas.parentNode.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawGrid(w, h) {
      if(state.powerSave) return;
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for(let x=0; x<w; x+=40) { ctx.moveTo(x,0); ctx.lineTo(x,h); }
      for(let y=0; y<h; y+=40) { ctx.moveTo(0,y); ctx.lineTo(w,y); }
      ctx.stroke();
    }

    function renderCyberSpectrum(w, h, data) {
      const bars = state.powerSave ? 40 : 80;
      const step = Math.floor(data.length / bars);
      const barW = w / bars;
      const centerY = h / 2;
      let total = 0;

      // Draw center laser
      ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
      ctx.fillRect(0, centerY - 1, w, 2);

      for (let i = 0; i < bars; i++) {
        let sum = 0;
        for (let j = 0; j < step; j++) sum += data[i * step + j] || 0;
        const raw = sum / step;
        total += raw;
        
        const norm = Math.pow(raw / 255, 1.5);
        const barH = Math.max(2, norm * (h * 0.45));
        const x = i * barW;

        ctx.fillStyle = `hsl(183, 100%, ${Math.min(100, 30 + norm*50)}%)`;
        if(!state.powerSave) {
          ctx.shadowBlur = 10 * norm;
          ctx.shadowColor = '#00f0ff';
        }
        
        // Mirror Y-axis
        ctx.fillRect(x + 1, centerY - barH, barW - 2, barH);
        ctx.fillRect(x + 1, centerY, barW - 2, barH);
        ctx.shadowBlur = 0;
      }
      updateEnergy((total / bars / 255) * 100);
    }

    function renderCyberWave(w, h, data) {
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#ff003c';
      if(!state.powerSave) { ctx.shadowBlur = 15; ctx.shadowColor = '#ff003c'; }

      let totalAmp = 0;
      for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const norm = data[i] / 128.0;
        const y = (norm * h/2) * 0.8 + (h*0.1);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        totalAmp += Math.abs(data[i] - 128);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Ghost trail (cyan offset)
      if(!state.powerSave) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(0, 240, 255, 0.5)';
          for (let i = 0; i < data.length; i++) {
            const x = (i / (data.length - 1)) * w;
            const norm = data[i] / 128.0;
            const y = (norm * h/2) * 0.8 + (h*0.1);
            if (i === 0) ctx.moveTo(x-4, y); else ctx.lineTo(x-4, y);
          }
          ctx.stroke();
      }

      updateEnergy((totalAmp / data.length / 128) * 100);
    }

    function loop() {
      if (!state.pageVisible) return;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      drawGrid(w, h);

      if (analyser && elements.playbackVal.textContent === 'ACTIVE') {
        if (state.vizMode === 'spectrum') {
          const data = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(data);
          renderCyberSpectrum(w, h, data);
        } else {
          const data = new Uint8Array(analyser.fftSize);
          analyser.getByteTimeDomainData(data);
          renderCyberWave(w, h, data);
        }
      } else {
         // Standby line
         ctx.fillStyle = 'rgba(0,240,255,0.2)';
         ctx.fillRect(0, h/2 - 1, w, 2);
         updateEnergy(0);
      }
      animationId = requestAnimationFrame(loop);
    }

    // WebRTC Logic
    async function startConnection() {
      connectBtn.disabled = true;
      playBtn.classList.add('hidden');
      setSysState('CONNECTING', 'warn');
      elements.transportVal.textContent = 'INIT_HANDSHAKE';
      elements.iceVal.textContent = 'GATHERING';
      
      try {
        if (pc) pc.close();
        if(wakeLockToggle.checked) await handleWakeLock();

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        
        pc.oniceconnectionstatechange = () => {
          elements.iceVal.textContent = pc.iceConnectionState.toUpperCase();
        };

        pc.onconnectionstatechange = () => {
          const cs = pc.connectionState.toUpperCase();
          elements.transportVal.textContent = cs;
          if (cs === 'CONNECTED') { setSysState('ONLINE', 'live'); log('P2P Link established.', 'ok'); }
          else if (cs === 'FAILED' || cs === 'DISCONNECTED') { setSysState('LINK_FAIL', 'err'); log('Link lost.', 'err'); }
        };

        pc.addTransceiver('audio', { direction: 'recvonly' });

        pc.ontrack = (event) => {
          const stream = event.streams[0];
          elements.audioPlayer.srcObject = stream;
          elements.trackVal.textContent = 'A_TRACK_RCV';
          
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          if (sourceNode) { try{ sourceNode.disconnect(); }catch(e){} }
          
          sourceNode = audioCtx.createMediaStreamSource(stream);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = state.powerSave ? 128 : 256;
          analyser.smoothingTimeConstant = 0.8;
          sourceNode.connect(analyser);

          elements.audioPlayer.play().then(() => {
            elements.playbackVal.textContent = 'ACTIVE';
            elements.vizLabel.textContent = `RX_FREQ_ANALYSIS // ${state.vizMode.toUpperCase()}`;
            log('Audio stream active.', 'ok');
          }).catch(e => {
            elements.playbackVal.textContent = 'AUTOPLAY_BLOCK';
            playBtn.classList.remove('hidden');
            log('Autoplay blocked. Manual override required.', 'warn');
          });
        };

        log('Generating local SDP...');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        log('Transmitting to relay...');
        const res = await fetch('/offer', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(pc.localDescription)
        });

        if (!res.ok) throw new Error(`ERR_CODE: ${res.status}`);
        const answer = await res.json();
        await pc.setRemoteDescription(answer);
        log('Remote SDP accepted.', 'ok');

      } catch (err) {
        setSysState('FAIL', 'err');
        elements.transportVal.textContent = 'ERROR';
        log(`Handshake failed: ${err.message}`, 'err');
      } finally {
        connectBtn.disabled = false;
      }
    }

    function stopConnection() {
      if(pc) { pc.close(); pc = null; }
      if(elements.audioPlayer.srcObject) {
        elements.audioPlayer.srcObject.getTracks().forEach(t => t.stop());
        elements.audioPlayer.srcObject = null;
      }
      setSysState('IDLE', 'idle');
      elements.transportVal.textContent = 'OFFLINE';
      elements.iceVal.textContent = 'STANDBY';
      elements.trackVal.textContent = 'NULL';
      elements.playbackVal.textContent = 'HALTED';
      elements.vizLabel.textContent = 'AWAITING_SIGNAL...';
      log('Connection manually terminated.', 'warn');
    }

    // Listeners
    connectBtn.addEventListener('click', startConnection);
    stopBtn.addEventListener('click', stopConnection);
    playBtn.addEventListener('click', () => {
      elements.audioPlayer.play();
      audioCtx?.resume();
      elements.playbackVal.textContent = 'ACTIVE';
      playBtn.classList.add('hidden');
      log('Manual override applied.', 'ok');
    });

    modeSpectrumBtn.addEventListener('click', () => {
      state.vizMode = 'spectrum';
      modeSpectrumBtn.classList.add('active');
      modeWaveBtn.classList.remove('active');
      if(elements.playbackVal.textContent === 'ACTIVE') elements.vizLabel.textContent = 'RX_FREQ_ANALYSIS // SPECTRUM';
    });
    modeWaveBtn.addEventListener('click', () => {
      state.vizMode = 'wave';
      modeWaveBtn.classList.add('active');
      modeSpectrumBtn.classList.remove('active');
      if(elements.playbackVal.textContent === 'ACTIVE') elements.vizLabel.textContent = 'RX_FREQ_ANALYSIS // WAVEFORM';
    });

    wakeLockToggle.addEventListener('change', handleWakeLock);
    
    powerToggle.addEventListener('change', (e) => {
      state.powerSave = e.target.checked;
      if(analyser) analyser.fftSize = state.powerSave ? 128 : 256;
      log(`PWR.SAVE = ${state.powerSave ? 'ON' : 'OFF'}`);
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    window.addEventListener('resize', resize);
    document.addEventListener('visibilitychange', () => {
      state.pageVisible = document.visibilityState === 'visible';
      if(state.pageVisible && wakeLockToggle.checked) handleWakeLock();
    });

    // Boot
    log('CYBER_SYS V2 BOOT SEQUENCE INITIATED...');
    log('AWAITING USER COMMAND.');
    resize();
    requestAnimationFrame(loop);

  </script>
</body>
</html>
